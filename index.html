<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexS ULTRA FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
overflow:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100vh;
background:#000;
border-right:1px solid #222;
padding-top:20px;
overflow:auto;
z-index:1000;
}

.logo{
text-align:center;
font-size:24px;
font-weight:bold;
color:#00d4ff;
margin-bottom:10px;
}

#loginUserInfo{
margin:10px;
padding:10px;
background:#111;
border:1px solid #222;
border-radius:8px;
line-height:1.7;
font-size:13px;
}

.nav-btn{
padding:15px 20px;
cursor:pointer;
border-left:4px solid transparent;
transition:.2s;
}

.nav-btn:hover{
background:#111;
}

.nav-btn.active{
background:#111;
border-left:4px solid #00d4ff;
color:#00d4ff;
}

.main{
margin-left:240px;
height:100vh;
overflow:auto;
padding:20px;
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
margin-bottom:20px;
overflow:auto;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

input,select,button{
padding:11px;
border:none;
outline:none;
border-radius:6px;
font-size:14px;
}

input,select{
background:#000;
color:#fff;
border:1px solid #333;
}

select{
min-width:180px;
cursor:pointer;
}

button{
background:#00d4ff;
color:#000;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
text-align:center;
font-size:13px;
white-space:nowrap;
}

th{
background:#000;
color:#00d4ff;
position:sticky;
top:0;
}

.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:350px;
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #333;
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:#00d4ff;
}

.login-box input{
width:100%;
margin-bottom:10px;
}

.login-box button{
width:100%;
margin-bottom:10px;
}

.small-link{
text-align:center;
font-size:13px;
color:#00d4ff;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="login-page">

<div class="login-box">

<div id="loginBox">

<h2>NexS Login</h2>

<input type="text" id="loginId" placeholder="Employee ID">

<button onclick="login()">LOGIN</button>

<div class="small-link" onclick="showRegister()">
New Registration
</div>

</div>

<div id="registerBox" style="display:none;">

<h2>Registration</h2>

<input type="text" id="regName" placeholder="Full Name">
<input type="text" id="regId" placeholder="Employee ID">

<button onclick="register()">SAVE USER</button>

<div class="small-link" onclick="showLogin()">
Back To Login
</div>

</div>

</div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<div class="sidebar">

<div class="logo">NexS</div>

<div id="loginUserInfo"></div>

<div class="nav-btn active" onclick="openTab('tray',this)">
📦 Tray
</div>

<div class="nav-btn" onclick="openTab('shipment',this)">
🚛 Shipment
</div>

<div class="nav-btn" onclick="openTab('history',this)">
🕒 History
</div>

<div class="nav-btn" onclick="openTab('dashboard',this)">
📊 Dashboard
</div>

<div class="nav-btn" onclick="logout()">
🚪 Logout
</div>

</div>

<div class="main">

<!-- TRAY -->

<div id="tray" class="tab active">

<div class="card">

<div class="row">

<select id="trayLocation"></select>

<input type="text" id="trayInput" placeholder="Tray Scan">

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Tray</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="trayTable"></tbody>

</table>

</div>

</div>

<!-- SHIPMENT -->

<div id="shipment" class="tab">

<div class="card">

<div class="row">

<select id="shipmentAgency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>

<input type="text" id="shipmentInput" placeholder="Shipment Max 23">

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Shipment</th>
<th>Agency</th>
<th>User</th>
</tr>
</thead>

<tbody id="shipmentTable"></tbody>

</table>

</div>

</div>

<!-- HISTORY -->

<div id="history" class="tab">

<div class="card">

<div class="row">

<input type="date" id="fromDate">
<input type="date" id="toDate">

<select id="historyType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<input type="text" id="historySearch" placeholder="Search">

<button onclick="applyHistory()">Filter</button>

<button onclick="exportHistory()">Export CSV</button>

<button onclick="deleteHistory()">Delete</button>

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tab">

<div class="card">

<div class="row">

<input type="date" id="dashFrom">
<input type="date" id="dashTo">

<select id="dashType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<button onclick="renderDashboard()">
Apply Filter
</button>

</div>

</div>

<div class="card">
<h3>📦 Location Hourly Productivity</h3>
<table id="locationHourlyTable"></table>
</div>

<div class="card">
<h3>👤 Person Wise Productivity</h3>
<table id="personWiseTable"></table>
</div>

<div class="card">
<h3>⏱ Person + Hourly Productivity</h3>
<table id="personHourlyTable"></table>
</div>

</div>

</div>

</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
authDomain:"nexs-guddu-30k.firebaseapp.com",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com",
projectId:"nexs-guddu-30k",
storageBucket:"nexs-guddu-30k.appspot.com",
messagingSenderId:"634684833271",
appId:"1:634684833271:web:31a25a2c5301fa108142f2"
});

firebase.database().goOnline();

const db=firebase.database();

let currentUser={};
let trayData=[];
let shipmentData=[];
let allData=[];

const locations=[
"ICU ENTRY",
"MEI ENTRY",
"OMT ENTRY",
"LO SEND TO ICU",
"LO SEND TO MEI",
"ORDER SEND TO MAIN LINE FOR FT",
"ORDER SEND TO MAIN LINE FOR QC",
"ORDER SEND TO MAIN LINE FOR PACKING",
"TLP SEND TO MEI",
"QC FAIL SEND TO MEI",
"FRAME QC FAIL SEND TO MAIN LINE",
"SEND TO MEI FOR REVIEW",
"CS LOCATION",
"SMALL DIA LOCATION",
"LO QC FAIL LOCATION (JIT)",
...Array.from({length:10},(_,i)=>`OMT RACK ${String(i+1).padStart(2,"0")}`),
...Array.from({length:10},(_,i)=>`ICU TROLLEY ${i+1}`),
...Array.from({length:10},(_,i)=>`OMT TROLLEY ${i+1}`),
"ICU HOLD",
"MEI HOLD",
"PACKING HOLD",
"QC HOLD",
"DISPATCH HOLD"
];

locations.forEach(l=>{
document.getElementById("trayLocation").innerHTML+=`<option>${l}</option>`;
});

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function register(){

const name=regName.value.trim();
const id=regId.value.trim();

if(!name || !id){
alert("Fill all fields");
return;
}

db.ref("Users/"+id).set({
name,id
}).then(()=>{
alert("Registration Successful");
showLogin();
});

}

function login(){

const id=loginId.value.trim();

db.ref("Users/"+id).once("value")
.then(snap=>{

if(!snap.exists()){
alert("ID Not Found");
return;
}

currentUser=snap.val();

loginUserInfo.innerHTML=`
<div><b>Name:</b> ${currentUser.name}</div>
<div><b>ID:</b> ${currentUser.id}</div>
`;

loginPage.style.display="none";
app.style.display="block";

startRealtime();

});

}

function logout(){
location.reload();
}

function openTab(id,el){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

document.querySelectorAll(".nav-btn")
.forEach(n=>n.classList.remove("active"));

el.classList.add("active");

}

function formatDate(d){

const dt=new Date(d);

return `${String(dt.getDate()).padStart(2,"0")}/${String(dt.getMonth()+1).padStart(2,"0")}/${dt.getFullYear()}`;

}

function formatTime(d){
return new Date(d).toLocaleTimeString();
}

function startRealtime(){

db.ref("tray").on("value",snap=>{

trayData=[];

snap.forEach(c=>{
trayData.push({
key:c.key,
type:"TRAY",
...c.val()
});
});

renderTray();
mergeData();

});

db.ref("shipment").on("value",snap=>{

shipmentData=[];

snap.forEach(c=>{
shipmentData.push({
key:c.key,
type:"SHIPMENT",
...c.val()
});
});

renderShipment();
mergeData();

});

}

function mergeData(){

allData=[...trayData,...shipmentData];

allData.sort((a,b)=>b.timestamp-a.timestamp);

applyHistory();
renderDashboard();

}

function renderTray(){

trayTable.innerHTML="";

[...trayData]
.sort((a,b)=>b.timestamp-a.timestamp)
.slice(0,20)
.forEach(d=>{

trayTable.innerHTML+=`
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>
`;

});

}

function renderShipment(){

shipmentTable.innerHTML="";

[...shipmentData]
.sort((a,b)=>b.timestamp-a.timestamp)
.slice(0,20)
.forEach(d=>{

shipmentTable.innerHTML+=`
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.shipmentId}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>
`;

});

}

setInterval(()=>{

if(
document.getElementById("tray")
.classList.contains("active")
){
trayInput.focus();
}

},300);

trayInput.addEventListener("keydown",e=>{

if(e.key!=="Enter") return;

const val=trayInput.value.trim().toUpperCase();

if(val.length!==7){
trayInput.value="";
return;
}

const now=Date.now();

db.ref("tray").push({
barcode:val,
location:trayLocation.value,
user:currentUser.name,
userId:currentUser.id,
date:formatDate(now),
time:formatTime(now),
timestamp:now
});

trayInput.value="";

});

shipmentInput.addEventListener("keydown",e=>{

if(e.key!=="Enter") return;

const val=shipmentInput.value.trim().toUpperCase();

if(val.length>23){
shipmentInput.value="";
return;
}

const now=Date.now();

db.ref("shipment").push({
shipmentId:val,
location:shipmentAgency.value,
user:currentUser.name,
userId:currentUser.id,
date:formatDate(now),
time:formatTime(now),
timestamp:now
});

shipmentInput.value="";

});

function applyHistory(){

historyTable.innerHTML="";

let filtered=[...allData];

const type=historyType.value;
const search=historySearch.value.toUpperCase();

filtered=filtered.filter(d=>{

if(type!=="ALL" && d.type!==type){
return false;
}

const id=(d.barcode||d.shipmentId||"").toUpperCase();

return id.includes(search);

});

filtered.forEach(d=>{

historyTable.innerHTML+=`
<tr>
<td>${d.type}</td>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode||d.shipmentId}</td>
<td>${d.location}</td>
<td>${d.user}</td>
</tr>
`;

});

}

function renderDashboard(){

const hours=[
"12AM","1AM","2AM","3AM","4AM","5AM",
"6AM","7AM","8AM","9AM","10AM","11AM",
"12PM","1PM","2PM","3PM","4PM","5PM",
"6PM","7PM","8PM","9PM","10PM","11PM"
];

let locMap={};
let personMap={};
let personHourMap={};

allData.forEach(d=>{

const dt=new Date(d.timestamp);
const h=dt.getHours();

if(!locMap[d.location]){
locMap[d.location]=Array(24).fill(0);
}

locMap[d.location][h]++;

const user=`${d.user} (${d.userId})`;

personMap[user]=(personMap[user]||0)+1;

if(!personHourMap[user]){
personHourMap[user]=Array(24).fill(0);
}

personHourMap[user][h]++;

});

locationHourlyTable.innerHTML=`
<tr>
<th>Location</th>
${hours.map(h=>`<th>${h}</th>`).join("")}
</tr>
`;

Object.entries(locMap).forEach(([k,v])=>{

locationHourlyTable.innerHTML+=`
<tr>
<td>${k}</td>
${v.map(x=>`<td>${x}</td>`).join("")}
</tr>
`;

});

personWiseTable.innerHTML=`
<tr>
<th>User</th>
<th>Total</th>
</tr>
`;

Object.entries(personMap).forEach(([k,v])=>{

personWiseTable.innerHTML+=`
<tr>
<td>${k}</td>
<td>${v}</td>
</tr>
`;

});

personHourlyTable.innerHTML=`
<tr>
<th>User</th>
${hours.map(h=>`<th>${h}</th>`).join("")}
</tr>
`;

Object.entries(personHourMap).forEach(([k,v])=>{

personHourlyTable.innerHTML+=`
<tr>
<td>${k}</td>
${v.map(x=>`<td>${x}</td>`).join("")}
</tr>
`;

});

}

function exportHistory(){

let csv="Type,Date,Time,ID,Location,User\n";

allData.forEach(d=>{

csv+=`${d.type},${d.date},${d.time},${d.barcode||d.shipmentId},${d.location},${d.user}\n`;

});

downloadCSV(csv,"history.csv");

}

function deleteHistory(){

if(!confirm("Delete All History?")) return;

db.ref("tray").remove();
db.ref("shipment").remove();

}

function downloadCSV(csv,name){

const a=document.createElement("a");

a.href=URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download=name;
a.click();

}

</script>

</body>
</html>
