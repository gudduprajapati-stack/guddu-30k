<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS Step 3 Final</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:220px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;color:#888;cursor:pointer}
.nav.active{color:#00d4ff}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
input,select{width:100%;padding:10px;margin:8px 0;background:#000;color:#fff;border:1px solid #444}
button{padding:10px;background:#00d4ff;border:none;margin-top:10px}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:10px;border-bottom:1px solid #333;text-align:center}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111;padding:25px;width:320px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
<div class="box">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p style="cursor:pointer;color:#00d4ff" onclick="showReg()">New Registration</p>
</div>
</div>

<!-- REGISTER -->
<div id="regBox" class="center" style="display:none">
<div class="box">
<h2>Register</h2>
<input id="regName" placeholder="Full Name">
<input id="regId" placeholder="Employee ID">
<button onclick="register()">Save</button>
<p style="cursor:pointer" onclick="showLogin()">Back</p>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%">

<div class="sidebar">
<h3 id="user"></h3>

<div class="nav active" onclick="openTab('tray',this)">📦 Tray</div>
<div class="nav" onclick="openTab('shipment',this)">🚛 Shipment</div>
<div class="nav" onclick="logout()">🚪 Logout</div>

</div>

<div class="main">

<!-- TRAY PAGE -->
<div id="tray" class="tab active">
<h2>📦 Tray Scan</h2>

<select id="loc"></select>
<input id="trayBox" placeholder="MT76921">

<table>
<thead>
<tr>
<th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th>
</tr>
</thead>
<tbody id="trayData"></tbody>
</table>
</div>

<!-- SHIPMENT PAGE -->
<div id="shipment" class="tab">
<h2>🚛 Shipment Scan</h2>

<select id="agency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>

<input id="shipBox" placeholder="Enter 23 Digit ID">

<table>
<thead>
<tr>
<th>Date</th><th>Time</th><th>Shipment ID</th><th>Agency</th><th>User</th>
</tr>
</thead>
<tbody id="shipData"></tbody>
</table>
</div>

</div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// LOCATIONS
const LOCATIONS=["ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION"];
loc.innerHTML=LOCATIONS.map(x=>`<option>${x}</option>`).join('');

let user={};

// SWITCH LOGIN
function showReg(){loginBox.style.display="none";regBox.style.display="flex"}
function showLogin(){regBox.style.display="none";loginBox.style.display="flex"}

// REGISTER
function register(){
let name=regName.value.trim();
let id=regId.value.trim();
if(!name||!id)return alert("Fill all");

db.ref("Users/"+id).set({name,empId:id}).then(()=>{
alert("Done");showLogin();
});
}

// LOGIN
function login(){
let id=loginId.value.trim();
if(!id)return alert("Enter ID");

db.ref("Users/"+id).once("value",s=>{
if(!s.exists())return alert("Not found");

user.name=s.val().name;
user.id=id;

loginBox.style.display="none";
app.style.display="flex";

document.getElementById("user").innerText=user.name+" ("+user.id+")";

startRealtime();
});
}

// LOGOUT
function logout(){location.reload()}

// TAB SWITCH
function openTab(tab,el){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
document.getElementById(tab).classList.add("active");
el.classList.add("active");
}

// REALTIME
function startRealtime(){

db.ref("LiveScans").on("value",snap=>{
trayData.innerHTML="";
snap.forEach(c=>{
let d=c.val();
trayData.innerHTML = `
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>` + trayData.innerHTML;
});
});

db.ref("ShipmentScans").on("value",snap=>{
shipData.innerHTML="";
snap.forEach(c=>{
let d=c.val();
shipData.innerHTML = `
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.shipId}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>` + shipData.innerHTML;
});
});

}

// TRAY SCAN
trayBox.onkeydown=e=>{
if(e.key==="Enter" && trayBox.value){
db.ref("LiveScans").push({
barcode:trayBox.value.toUpperCase(),
location:loc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
trayBox.value="";
}
};

// SHIPMENT SCAN
shipBox.onkeydown=e=>{
if(e.key==="Enter"){
let val=shipBox.value.trim().toUpperCase();

if(val.length!==23){
alert("Enter 23 digit shipment ID");
return;
}

db.ref("ShipmentScans").push({
shipId:val,
location:agency.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});

shipBox.value="";
}
};

</script>

</body>
</html>
