<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexS System</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
:root { --primary:#00d4ff; --bg:#0a0a0a; --card:#161616; --text:#fff; }
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff;display:flex}

/* LOGIN */
#auth{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center}
.card{background:#161616;padding:30px;border-radius:10px;width:300px;text-align:center}
input{width:100%;padding:10px;margin:10px 0;background:#000;border:1px solid #444;color:#fff}
button{padding:10px;width:100%;background:#00d4ff;border:none;color:#000;font-weight:bold;cursor:pointer}

/* MAIN */
.sidebar{width:220px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;cursor:pointer;color:#888}
.nav.active{color:#00d4ff;background:#111}

.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
</style>
</head>

<body>

<!-- 🔐 LOGIN / REGISTER -->
<div id="auth">

<div class="card" id="loginBox">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="toggleAuth(true)" style="cursor:pointer">New Registration</p>
</div>

<div class="card" id="regBox" style="display:none">
<h2>Register</h2>
<input id="regName" placeholder="Full Name">
<input id="regId" placeholder="Employee ID">
<button onclick="register()">Register</button>
<p onclick="toggleAuth(false)" style="cursor:pointer">Back to Login</p>
</div>

</div>

<!-- 🏠 MAIN APP -->
<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName">---</h3>

<div class="nav active" onclick="openTab('tray',this)">📦 Tray Scan</div>
<div class="nav" onclick="openTab('shipment',this)">🚛 Shipment Scan</div>
<div class="nav" onclick="openTab('history',this)">🕒 History Hub</div>
<div class="nav" onclick="openTab('dashboard',this)">📊 Dashboard</div>
<div class="nav" onclick="logout()">🔓 Logout</div>
</div>

<div class="main" id="main" style="display:none">

<div id="tray" class="tab active">
<h2>Tray Scan Page</h2>
</div>

<div id="shipment" class="tab">
<h2>Shipment Scan Page</h2>
</div>

<div id="history" class="tab">
<h2>History Hub</h2>
</div>

<div id="dashboard" class="tab">
<h2>Dashboard</h2>
</div>

</div>

<script>

// 🔥 FIREBASE CONFIG
firebase.initializeApp({
apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
authDomain: "nexs-guddu-30k.firebaseapp.com",
databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
projectId: "nexs-guddu-30k",
storageBucket: "nexs-guddu-30k.firebasestorage.app",
messagingSenderId: "634684833271",
appId: "1:634684833271:web:31a25a2c5301fa108142f2"
});

const db = firebase.database();
let user={};

// 🔁 LOGIN / REGISTER SWITCH
function toggleAuth(showReg){
document.getElementById('loginBox').style.display = showReg ? 'none':'block';
document.getElementById('regBox').style.display = showReg ? 'block':'none';
}

// 🆕 REGISTER
function register(){
let name=document.getElementById('regName').value.trim();
let id=document.getElementById('regId').value.trim();

if(!name||!id) return alert("Fill all fields");

db.ref('Users/'+id).set({name,id}).then(()=>{
alert("Registered!");
toggleAuth(false);
});
}

// 🔐 LOGIN
function login(){
let id=document.getElementById('loginId').value.trim();
if(!id) return alert("Enter ID");

db.ref('Users/'+id).once('value',snap=>{
if(snap.exists()){
user=snap.val();

document.getElementById('userName').innerText=user.name;

document.getElementById('auth').style.display='none';
document.getElementById('sidebar').style.display='block';
document.getElementById('main').style.display='block';

}else{
alert("User not found");
}
});
}

// 🔄 TAB SWITCH
function openTab(tab,el){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.nav').forEach(n=>n.classList.remove('active'));

document.getElementById(tab).classList.add('active');
el.classList.add('active');
}

// 🔓 LOGOUT
function logout(){
location.reload();
}

</script>

</body>
</html>
