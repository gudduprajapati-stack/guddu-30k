<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAY AND SHIP RECORD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --success: #27ae60; --bg: #f4f7f6; --ship: #8e44ad; --gold: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        .header-container { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: white; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px;
            border-bottom: 4px solid var(--primary);
        }
        .header-title { color: var(--primary); font-size: 24px; font-weight: 900; text-transform: uppercase; margin: 0; }
        .guddu-signature { font-family: 'Brush Script MT', cursive; font-size: 45px; color: var(--primary); font-weight: bold; }

        .top-performer-card {
            background: linear-gradient(45deg, #1a2a6c, #b21f1f); color: white;
            padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 2px solid var(--gold);
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        nav { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding: 5px; background: white; border-radius: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { flex: 1; padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; font-size: 13px; }
        .active-btn { background: var(--primary) !important; color: white !important; }
        
        .checkbox-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 10px; background: #fff; padding: 15px; border-radius: 8px; 
            border: 1px solid #ddd; max-height: 200px; overflow-y: auto; margin: 10px 0;
        }
        .checkbox-item { display: flex; align-items: center; font-size: 13px; cursor: pointer; }
        .checkbox-item input { width: auto; margin-right: 8px; }

        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-search { background: #2980b9; color: white; border: none; font-weight: bold; cursor: pointer; }
        .table-wrap { overflow-x: auto; border-radius: 10px; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-title">TRAY AND SHIP RECORD</div>
    <div class="guddu-signature">Guddu</div>
</div>

<div id="topBanner" class="top-performer-card" style="display:none">
    <span style="font-size: 14px; text-transform: uppercase;">🏆 Today's Top Performer 🏆</span><br>
    <b id="topName" style="font-size: 22px;">---</b> 
    <span id="topCount" style="background: var(--gold); color: black; padding: 2px 10px; border-radius: 10px; margin-left: 10px; font-weight: bold;">0 Scans</span>
</div>

<div id="authPage" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <div id="loginSection">
        <h3>STAFF LOGIN</h3>
        <input type="text" id="loginId" placeholder="Employee ID">
        <button class="btn-search" onclick="login()">LOGIN</button>
        <p>New? <a href="#" onclick="toggleAuth(true)">Register Here</a></p>
    </div>
    <div id="registerSection" style="display:none;">
        <h3>NEW REGISTRATION</h3>
        <input type="text" id="regId" placeholder="ID (T101)">
        <input type="text" id="regName" placeholder="Full Name">
        <button class="btn-search" style="background:var(--success);" onclick="register()">SAVE</button>
    </div>
</div>

<div id="mainApp" style="display:none">
    <nav>
        <button id="b-scan" onclick="showTab('scan')">ENTRY</button>
        <button id="b-matrix" onclick="showTab('matrix')">MATRIX</button>
        <button id="b-staff" onclick="showTab('staff')">STAFF</button>
        <button id="b-history" onclick="showTab('history')">HISTORY</button>
        <button onclick="logout()" style="background:var(--secondary); color:white">LOGOUT</button>
    </nav>

    <div id="tab-scan" class="tab-content">
        <div class="card" style="text-align:center">
            <h3>📥 SCAN ENTRY</h3>
            <select id="locSelect"></select>
            <input type="text" id="barcodeInput" placeholder="SCAN BARCODE..." style="height:70px; font-size:26px; text-align:center; border: 3px dashed var(--primary); margin-top: 20px;">
        </div>
    </div>

    <div id="tab-matrix" class="tab-content" style="display:none">
        <div class="card">
            <h3>📊 Production Matrix (Select Locations)</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="date" id="matFrom"> <input type="date" id="matTo">
                <select id="matType" onchange="renderCheckboxes()"><option value="logs">Tray</option><option value="shipments">Shipment</option></select>
            </div>
            
            <div class="checkbox-grid" id="locCheckboxes"></div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-search" onclick="loadMatrix()">VIEW MATRIX</button>
                <button onclick="downloadExcel('matrixTable', 'Matrix')" style="background:var(--success); color:white">EXPORT</button>
            </div>
            <div class="table-wrap"><table id="matrixTable"><thead id="matHead"></thead><tbody id="matBody"></tbody></table></div>
        </div>
    </div>

    <div id="tab-staff" class="tab-content" style="display:none"><div class="card"><h3>Staff View</h3><div id="staffList"></div></div></div>
    <div id="tab-history" class="tab-content" style="display:none"><div class="card"><h3>History</h3><div class="table-wrap"><table id="histTable"><thead><tr><th>Date</th><th>Time</th><th>Loc</th><th>BC</th><th>Name</th></tr></thead><tbody id="histBody"></tbody></table></div></div></div>
</div>

<script>
    const firebaseConfig = { /* Aapki Config */ 
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        authDomain: "nexs-guddu-30k.firebaseapp.com",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        storageBucket: "nexs-guddu-30k.firebasestorage.app",
        messagingSenderId: "634684833271",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const trayLocs = ["ICU ENTRY", "MEI ENTRY", "QC FAIL ORDER SEND TO MEI", "FRAME ORDER SEND TO FT", "OMT ENTRY", "LO SEND TO ICU", "LO SEND TO MEI", "SEND TO MAIN LINE FOR FT", "SEND TO MAIN LINE FOR QC", "SEND TO MAIN LINE FOR PACKING", "TLP SEND TO MEI", "OMT RACK NO 00", "OMT RACK NO 01", "OMT RACK NO 02", "OMT RACK NO 03", "OMT RACK NO 04", "OMT RACK NO 05", "OMT RACK NO 06", "OMT RACK NO 07", "OMT RACK NO 08", "OMT RACK NO 09"];
    const shipLocs = ["DHL SHIPMENT", "GP SUPPLY & SREERAJ", "OTHER SHIPMENT"];

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('input[type="date"]').forEach(e => e.value = today);
        trayLocs.forEach(l => document.getElementById('locSelect').add(new Option(l, l)));
        renderCheckboxes();
        checkLogin();
        updateTopPerformer();
    };

    function renderCheckboxes() {
        const type = document.getElementById('matType').value;
        const list = type === 'logs' ? trayLocs : shipLocs;
        document.getElementById('locCheckboxes').innerHTML = list.map(l => `
            <label class="checkbox-item"><input type="checkbox" class="loc-cb" value="${l}" checked> ${l}</label>
        `).join('');
    }

    function updateTopPerformer() {
        const today = new Date().toISOString().split('T')[0];
        db.ref('logs').orderByChild('date').equalTo(today).once('value', s => {
            const data = s.val() ? Object.values(s.val()) : [];
            const counts = {};
            data.forEach(x => { counts[x.name] = (counts[x.name] || 0) + 1; });
            const top = Object.entries(counts).sort((a,b) => b[1] - a[1])[0];
            if(top) {
                document.getElementById('topBanner').style.display = 'block';
                document.getElementById('topName').innerText = top[0];
                document.getElementById('topCount').innerText = top[1] + " Scans";
            }
        });
    }

    function loadMatrix() {
        const from = document.getElementById('matFrom').value, to = document.getElementById('matTo').value, type = document.getElementById('matType').value;
        const selectedLocs = Array.from(document.querySelectorAll('.loc-cb:checked')).map(cb => cb.value);
        
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            const data = s.val() ? Object.values(s.val()) : [], hrs = Array.from({length: 24}, (_, i) => i);
            document.getElementById('matHead').innerHTML = `<tr><th>Loc</th>${hrs.map(h=>`<th>H${h}</th>`).join('')}<th>Total</th></tr>`;
            document.getElementById('matBody').innerHTML = selectedLocs.map(l => {
                let rowSum = 0;
                let cells = hrs.map(h => { let c = data.filter(x=>x.loc===l && x.h===h).length; rowSum+=c; return `<td>${c||''}</td>`; }).join('');
                return `<tr><td><b>${l}</b></td>${cells}<td><b>${rowSum}</b></td></tr>`;
            }).join('');
        });
    }

    // Baki login/logout/tab functions (purane code wale) yahan same rahenge...
    function showTab(t) { document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none'); document.getElementById('tab-' + t).style.display = 'block'; }
    function toggleAuth(showReg) { document.getElementById('loginSection').style.display = showReg ? 'none' : 'block'; document.getElementById('registerSection').style.display = showReg ? 'block' : 'none'; }
    function login() { const id = document.getElementById('loginId').value.toUpperCase(); db.ref('users/'+id).once('value', s => { if(s.exists()){ localStorage.setItem('uN', s.val().name); localStorage.setItem('uI', s.val().id); location.reload(); } }); }
    function register() { const id = document.getElementById('regId').value.toUpperCase(), name = document.getElementById('regName').value; db.ref('users/'+id).set({id, name}).then(()=>location.reload()); }
    function checkLogin() { if(localStorage.getItem('uI')){ document.getElementById('authPage').style.display='none'; document.getElementById('mainApp').style.display='block'; }}
    function logout() { localStorage.clear(); location.reload(); }
    function downloadExcel(tableId, name) { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById(tableId)), name+".xlsx"); }
    
    // Entry scanning logic (HandleScan) bhi add kar lena purane code se...
</script>
</body>
</html>
