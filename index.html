<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS-GUDDU-30K</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --success: #27ae60; --bg: #f0f2f5; --ship: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .header-title { text-align: center; color: var(--primary); font-size: 24px; font-weight: 800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        nav { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding: 5px; background: white; border-radius: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { flex: 1; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; font-size: 12px; }
        .active-btn { background: var(--primary) !important; color: white !important; }
        .ship-btn-active { background: var(--ship) !important; color: white !important; }
        .logout-btn { background: var(--secondary); color: white; }
        input, select, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; }
        .btn-search { background: #2980b9; color: white; border: none; font-weight: bold; cursor: pointer; }
        .table-wrap { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; background: #eef1f7; padding: 15px; border-radius: 10px; margin-bottom: 15px; align-items: end; }
    </style>
</head>
<body>

<div class="header-title">NexS-GUDDU-30K</div>

<div id="authPage" class="card" style="max-width: 400px; margin: 20px auto; text-align: center;">
    <input type="text" id="loginId" placeholder="Enter Employee ID">
    <button class="btn-search" style="padding:15px;" onclick="login()">LOGIN</button>
</div>

<div id="mainApp" style="display:none">
    <nav>
        <button id="b-scan" onclick="showTab('scan')">ENTRY</button>
        <button id="b-ship" onclick="showTab('ship')">SHIPMENT</button>
        <button id="b-matrix" onclick="showTab('matrix')">MATRIX</button>
        <button id="b-staff" onclick="showTab('staff')">STAFF</button>
        <button id="b-history" onclick="showTab('history')">HISTORY</button>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </nav>

    <div id="tab-scan" class="tab-content">
        <div class="card" style="text-align:center">
            <h3>WORKER ENTRY</h3>
            <select id="locSelect"></select>
            <input type="text" id="barcodeInput" placeholder="SCAN 7 DIGIT..." style="height:60px; font-size:22px; text-align:center; border: 3px dashed var(--primary);">
        </div>
    </div>

    <div id="tab-ship" class="tab-content" style="display:none">
        <div class="card" style="border-top: 5px solid var(--ship);">
            <h3 style="color:var(--ship); text-align:center">📦 SHIPMENT PANEL</h3>
            <select id="shipLocSelect">
                <option value="DHL SHIPMENT">1. DHL SHIPMENT</option>
                <option value="GP SUPPLY & SREERAJ">2. GP SUPPLY & SREERAJ</option>
                <option value="OTHER SHIPMENT">3. OTHER SHIPMENT</option>
            </select>
            <input type="text" id="ship23Input" placeholder="SCAN SHIPMENT (MAX 23)..." style="height:60px; font-size:22px; text-align:center; border: 3px dashed var(--ship);">
        </div>
    </div>

    <div id="tab-matrix" class="tab-content" style="display:none">
        <div class="card">
            <h3>Production Matrix</h3>
            <div class="filter-section">
                <div>From: <input type="date" id="matFrom"></div>
                <div>To: <input type="date" id="matTo"></div>
                <div>Type: <select id="matType"><option value="logs">Normal</option><option value="shipments">Shipment</option></select></div>
                <div>Location: <select id="matLocFilter"><option value="ALL">ALL LOCATIONS</option></select></div>
                <button class="btn-search" onclick="loadMatrix()">VIEW</button>
            </div>
            <div class="table-wrap"><table id="matrixTable"><thead id="matHead"></thead><tbody id="matBody"></tbody></table></div>
        </div>
    </div>

    <div id="tab-staff" class="tab-content" style="display:none">
        <div class="card">
            <h3>Staff Productivity</h3>
            <div class="filter-section">
                <input type="date" id="staffFrom">
                <input type="date" id="staffTo">
                <select id="staffType"><option value="logs">Normal Entry</option><option value="shipments">Shipment Entry</option></select>
                <button class="btn-search" onclick="loadStaff()">LOAD</button>
            </div>
            <div id="staffList"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content" style="display:none">
        <div class="card">
            <h3>Search History</h3>
            <div class="filter-section">
                <input type="date" id="histFrom">
                <input type="date" id="histTo">
                <select id="histType"><option value="logs">Normal</option><option value="shipments">Shipment</option></select>
                <input type="text" id="histBcSearch" placeholder="🔍 Search Barcode..." style="margin:0">
                <button class="btn-search" onclick="loadHistory()">SEARCH</button>
                <button onclick="downloadExcel()" style="background:var(--success); color:white">EXPORT</button>
            </div>
            <div class="table-wrap"><table id="histTable"><thead><tr><th>Date</th><th>Time</th><th>Location</th><th>Barcode</th><th>ID</th><th>Name</th></tr></thead><tbody id="histBody"></tbody></table></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        authDomain: "nexs-guddu-30k.firebaseapp.com",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        storageBucket: "nexs-guddu-30k.firebasestorage.app",
        messagingSenderId: "634684833271",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const normalLocs = ["ICU ENTRY", "MEI ENTRY", "QC FAIL ORDER SEND TO MEI", "FRAME ORDER SEND TO FT", "OMT ENTRY", "LO SEND TO ICU", "LO SEND TO MEI", "SEND TO MAIN LINE FOR FT", "SEND TO MAIN LINE FOR QC", "SEND TO MAIN LINE FOR PACKING", "TLP SEND TO MEI", "OMT RACK NO 00", "OMT RACK NO 01", "OMT RACK NO 02", "OMT RACK NO 03", "OMT RACK NO 04", "OMT RACK NO 05", "OMT RACK NO 06", "OMT RACK NO 07", "OMT RACK NO 08", "OMT RACK NO 09"];
    const shipLocs = ["DHL SHIPMENT", "GP SUPPLY & SREERAJ", "OTHER SHIPMENT"];

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('input[type="date"]').forEach(e => e.value = today);
        normalLocs.forEach(l => {
            document.getElementById('locSelect').add(new Option(l, l));
            document.getElementById('matLocFilter').add(new Option(l, l));
        });
        shipLocs.forEach(l => document.getElementById('matLocFilter').add(new Option(l, l)));
        checkLogin();
    };

    function handleScan(bc, min, max, path, locId) {
        if(bc.length < min || bc.length > max) return alert("Invalid Digit!");
        const now = new Date();
        db.ref(path).push({ bc, loc: document.getElementById(locId).value, name: localStorage.getItem('uN'), id: localStorage.getItem('uI'), date: now.toISOString().split('T')[0], time: now.toLocaleTimeString(), h: now.getHours() });
    }

    document.getElementById('barcodeInput').addEventListener('keypress', e => { if(e.key==='Enter'){ handleScan(e.target.value.trim(), 7, 7, 'logs', 'locSelect'); e.target.value=""; }});
    document.getElementById('ship23Input').addEventListener('keypress', e => { if(e.key==='Enter'){ handleScan(e.target.value.trim(), 1, 23, 'shipments', 'shipLocSelect'); e.target.value=""; }});

    function loadMatrix() {
        const from = document.getElementById('matFrom').value;
        const to = document.getElementById('matTo').value;
        const type = document.getElementById('matType').value;
        const filterLoc = document.getElementById('matLocFilter').value;
        const locs = type === 'logs' ? normalLocs : shipLocs;
        
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            const data = s.val() ? Object.values(s.val()) : [];
            const hrs = Array.from({length: 24}, (_, i) => i);
            document.getElementById('matHead').innerHTML = `<tr><th>Loc</th>${hrs.map(h=>`<th>${h}</th>`).join('')}<th>Total</th></tr>`;
            document.getElementById('matBody').innerHTML = locs.filter(l => filterLoc === 'ALL' || l === filterLoc).map(l => {
                let rowSum = 0;
                let cells = hrs.map(h => { let c = data.filter(x=>x.loc===l && x.h===h).length; rowSum+=c; return `<td>${c||''}</td>`; }).join('');
                return `<tr><td><b>${l}</b></td>${cells}<td><b>${rowSum}</b></td></tr>`;
            }).join('');
        });
    }

    function loadStaff() {
        const from = document.getElementById('staffFrom').value, to = document.getElementById('staffTo').value, type = document.getElementById('staffType').value;
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            const data = s.val() ? Object.values(s.val()) : [], staff = {};
            data.forEach(x => { staff[x.id] = staff[x.id] || {n:x.name, c:0}; staff[x.id].c++; });
            document.getElementById('staffList').innerHTML = Object.entries(staff).map(([id, info]) => `<div class="card" style="display:flex; justify-content:space-between"><span><b>${info.n}</b> (${id})</span><b style="color:var(--success)">${info.c}</b></div>`).join('');
        });
    }

    function loadHistory() {
        const from = document.getElementById('histFrom').value, to = document.getElementById('histTo').value, type = document.getElementById('histType').value, bc = document.getElementById('histBcSearch').value.trim().toLowerCase();
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            let data = s.val() ? Object.values(s.val()).reverse() : [];
            if(bc) data = data.filter(x => x.bc.toLowerCase().includes(bc));
            document.getElementById('histBody').innerHTML = data.map(x => `<tr><td>${x.date}</td><td>${x.time}</td><td>${x.loc}</td><td>${x.bc}</td><td>${x.id}</td><td>${x.name}</td></tr>`).join('');
        });
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn', 'ship-btn-active'));
        document.getElementById('tab-' + t).style.display = 'block';
        document.getElementById('b-' + t).classList.add(t==='ship'?'ship-btn-active':'active-btn');
    }
    function login() { const id = document.getElementById('loginId').value.trim(); db.ref('users/'+id).once('value', s => { if(s.exists()){ localStorage.setItem('uN', s.val().name); localStorage.setItem('uI', s.val().id); location.reload(); } else alert("Invalid ID"); }); }
    function checkLogin() { if(localStorage.getItem('uI')){ document.getElementById('authPage').style.display='none'; document.getElementById('mainApp').style.display='block'; showTab('scan'); } }
    function logout() { localStorage.clear(); location.reload(); }
    function downloadExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('histTable')), 'Guddu_Report.xlsx'); }
</script>
</body>
</html>
