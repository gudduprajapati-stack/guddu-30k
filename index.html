<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS PRO FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:230px;background:#000;height:100vh;padding:15px}
.nav{padding:12px;color:#888;cursor:pointer}
.nav.active{color:#00d4ff}
.main{flex:1;padding:15px}
.tab{display:none}
.tab.active{display:block}
input,select{padding:8px;background:#000;color:#fff;border:1px solid #444}
button{padding:8px;background:#00d4ff;border:none;cursor:pointer}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
table{width:100%;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;text-align:center}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111;padding:25px;width:320px}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
<div class="box">
<h3>Login</h3>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="showReg()" style="color:#00d4ff;cursor:pointer">New Registration</p>
</div>
</div>

<div id="regBox" class="center" style="display:none">
<div class="box">
<h3>Register</h3>
<input id="regName" placeholder="Name">
<input id="regId" placeholder="ID">
<button onclick="register()">Save</button>
<p onclick="showLogin()">Back</p>
</div>
</div>

<div id="app" style="display:none;width:100%">
<div class="sidebar">
<h4 id="userBox"></h4>
<div class="nav active" onclick="tab('tray',this)">Tray</div>
<div class="nav" onclick="tab('shipment',this)">Shipment</div>
<div class="nav" onclick="tab('history',this)">History</div>
<div class="nav" onclick="tab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main">

<!-- TRAY -->
<div id="tray" class="tab active">
<div class="row">
<select id="loc"></select>
<input id="trayBox" placeholder="Scan Tray">
</div>
<table><thead><tr>
<th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th>
</tr></thead><tbody id="trayData"></tbody></table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<div class="row">
<select id="agency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox" placeholder="Max 23 digit">
</div>
<table><thead><tr>
<th>Date</th><th>Time</th><th>ID</th><th>Agency</th><th>User</th>
</tr></thead><tbody id="shipData"></tbody></table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<div class="row">
<input type="date" id="from">
<input type="date" id="to">
<select id="type">
<option>ALL</option><option>TRAY</option><option>SHIPMENT</option>
</select>
<input id="search" placeholder="Search">
<button onclick="exportCSV()">Export</button>
<button onclick="deleteData()">Delete</button>
</div>
<table><tbody id="histData"></tbody></table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<div class="row">
<input type="date" id="dfrom">
<input type="date" id="dto">
<select id="dtype">
<option>ALL</option><option>TRAY</option><option>SHIPMENT</option>
</select>
</div>

<div class="checkbox-group" id="locFilter"></div>

<h4>Location Hourly</h4>
<table id="locTable"></table>

<h4>Person Wise</h4>
<table id="personTable"></table>

<h4>Person Hourly</h4>
<table id="personHourTable"></table>
</div>

</div>
</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});

const db=firebase.database();

let user={},allData=[];

const LOC=[
"ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION"
];

loc.innerHTML=LOC.map(x=>`<option>${x}</option>`).join('');
locFilter.innerHTML=LOC.map(x=>`<label><input type="checkbox" value="${x}" checked>${x}</label>`).join('');

function showReg(){loginBox.style.display="none";regBox.style.display="flex"}
function showLogin(){regBox.style.display="none";loginBox.style.display="flex"}

function register(){
db.ref("Users/"+regId.value).set({name:regName.value});
alert("Done");
}

function login(){
db.ref("Users/"+loginId.value).once("value",s=>{
if(!s.exists())return alert("Not found");
user.name=s.val().name;
user.id=loginId.value;
loginBox.style.display="none";
app.style.display="flex";
userBox.innerText=user.name+" ("+user.id+")";
load();
});
}

function logout(){location.reload()}

function tab(t,e){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
e.classList.add("active");
}

function load(){
db.ref("LiveScans").on("value",s=>{
trayData.innerHTML="";
allData=[];
s.forEach(c=>{
let d=c.val();
allData.push({...d,type:"TRAY"});
trayData.innerHTML=`<tr><td>${d.date}</td><td>${d.time}</td><td>${d.barcode}</td><td>${d.location}</td><td>${d.user} (${d.userId})</td></tr>`+trayData.innerHTML;
});
});

db.ref("ShipmentScans").on("value",s=>{
shipData.innerHTML="";
s.forEach(c=>{
let d=c.val();
allData.push({...d,type:"SHIPMENT"});
shipData.innerHTML=`<tr><td>${d.date}</td><td>${d.time}</td><td>${d.shipId}</td><td>${d.location}</td><td>${d.user} (${d.userId})</td></tr>`+shipData.innerHTML;
});
});
}

// TRAY
trayBox.onkeydown=e=>{
if(e.key==="Enter"){
db.ref("LiveScans").push({
barcode:trayBox.value,
location:loc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
trayBox.value="";
}
};

// SHIPMENT
shipBox.onkeydown=e=>{
if(e.key==="Enter"){
let v=shipBox.value;
if(v.length>23)return alert("Max 23");
db.ref("ShipmentScans").push({
shipId:v,
location:agency.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
shipBox.value="";
}
};

// EXPORT
function exportCSV(){
let csv="Type,ID\n";
allData.forEach(d=>csv+=`${d.type},${d.barcode||d.shipId}\n`);
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="data.csv";
a.click();
}

// DELETE
function deleteData(){
if(!confirm("Delete permanently?"))return;
db.ref("LiveScans").remove();
db.ref("ShipmentScans").remove();
}

// DASHBOARD
setInterval(()=>{
let map={},person={},ph={};

allData.forEach(d=>{
let h=new Date(d.timestamp).getHours();
let loc=d.location;

map[loc]=map[loc]||Array(24).fill(0);
map[loc][h]++;

person[d.userId]=(person[d.userId]||0)+1;

ph[d.userId]=ph[d.userId]||Array(24).fill(0);
ph[d.userId][h]++;
});

// render
locTable.innerHTML="";
Object.keys(map).forEach(l=>{
locTable.innerHTML+=`<tr><td>${l}</td>${map[l].map(x=>`<td>${x}</td>`).join('')}</tr>`;
});

personTable.innerHTML="";
Object.entries(person).sort((a,b)=>b[1]-a[1]).forEach(p=>{
personTable.innerHTML+=`<tr><td>${p[0]}</td><td>${p[1]}</td></tr>`;
});

personHourTable.innerHTML="";
Object.keys(ph).forEach(p=>{
personHourTable.innerHTML+=`<tr><td>${p}</td>${ph[p].map(x=>`<td>${x}</td>`).join('')}</tr>`;
});

},3000);

</script>

</body>
</html>
