<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS Operational System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Auth Styles */
        .auth-container { width: 330px; padding: 35px; background: var(--card); border-radius: 15px; margin: 80px auto; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }

        /* Dashboard Styles */
        #dashboard { display: none; }
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 220px; background: #000; padding: 20px; border-right: 1px solid #222; }
        .main-content { margin-left: 240px; padding: 30px; }
        .nav-item { padding: 12px; margin-bottom: 10px; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #888; border-left: 3px solid transparent; }
        .nav-item:hover { background: #1a1a1a; color: #fff; }
        .nav-item.active { background: #1a1a1a; color: var(--primary); border-left-color: var(--primary); }
        
        /* Content Tabs */
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        th { color: var(--primary); font-size: 13px; text-transform: uppercase; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; background: #333; }
    </style>
</head>
<body>

    <div id="authSection">
        <div id="loginPage" class="auth-container">
            <h2 style="color:var(--primary)">NexS LOGIN</h2>
            <input type="text" id="loginId" placeholder="User ID (138663)">
            <button class="btn" onclick="loginUser()">LOGIN</button>
            <p onclick="toggleAuth(true)" style="color:var(--primary); cursor:pointer; margin-top:15px; font-size:14px;">Register New ID</p>
        </div>

        <div id="registerPage" class="auth-container" style="display:none;">
            <h2 style="color:var(--primary)">REGISTER</h2>
            <input type="text" id="newName" placeholder="Full Name">
            <input type="text" id="newId" placeholder="Unique ID">
            <button class="btn" style="background:var(--accent); color:white;" onclick="registerUser()">SAVE & REGISTER</button>
            <p onclick="toggleAuth(false)" style="color:var(--primary); cursor:pointer; margin-top:15px; font-size:14px;">Back to Login</p>
        </div>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <h3 style="color:var(--primary); margin-bottom:40px;">NexS System</h3>
            <div class="nav-item active" onclick="switchTab('scanning', this)">Scanning Page</div>
            <div class="nav-item" onclick="switchTab('shipment', this)">Shipment Scan</div>
            <div class="nav-item" onclick="switchTab('history', this)">History Page</div>
            <div class="nav-item" onclick="switchTab('productivity', this)">Productivity</div>
            <div class="nav-item" style="color:#ff4444; margin-top:50px;" onclick="location.reload()">Logout</div>
        </div>

        <div class="main-content">
            <div class="header" style="margin-bottom:30px;">
                <h2 id="userTitle" style="margin:0;">Welcome</h2>
                <small id="userSubTitle" style="color:var(--primary)"></small>
            </div>

            <div id="scanning" class="tab-content active">
                <div class="card">
                    <h3>Operational Stations</h3>
                    <div id="locGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px;"></div>
                    <button class="btn" style="width:200px; margin-top:20px;" onclick="saveScan()">SAVE SCANNING</button>
                </div>
            </div>

            <div id="shipment" class="tab-content">
                <div class="card">
                    <h3>Shipment Scanning</h3>
                    <input type="text" id="shipId" placeholder="Scan Shipment Barcode" style="max-width:400px;">
                    <button class="btn" style="width:150px; margin-left:10px;">ADD SCAN</button>
                </div>
            </div>

            <div id="history" class="tab-content">
                <div class="card">
                    <h3>Past Activities</h3>
                    <table>
                        <thead><tr><th>Date</th><th>Task</th><th>Location</th><th>Status</th></tr></thead>
                        <tbody id="historyList"><tr><td colspan="4" style="text-align:center;">No history found</td></tr></tbody>
                    </table>
                </div>
            </div>

            <div id="productivity" class="tab-content">
                <div class="card">
                    <h3>Daily Productivity</h3>
                    <div style="font-size:32px; color:var(--accent);">85%</div>
                    <p>Scanning Target: 30,000 / Day</p>
                </div>
            </div>
        </div>
    </div>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let currentUser = null;

    function toggleAuth(reg) {
        document.getElementById('loginPage').style.display = reg ? 'none' : 'block';
        document.getElementById('registerPage').style.display = reg ? 'block' : 'none';
    }

    function registerUser() {
        const n = document.getElementById('newName').value.trim();
        const i = document.getElementById('newId').value.trim();
        if(n && i) {
            database.ref('Users/' + i).set({ name: n, empId: i })
            .then(() => { alert("Success! Login now."); toggleAuth(false); });
        }
    }

    function loginUser() {
        const id = document.getElementById('loginId').value.trim();
        database.ref('Users/' + id).once('value').then(snap => {
            if(snap.exists()) {
                currentUser = snap.val();
                document.getElementById('authSection').style.display='none';
                document.getElementById('dashboard').style.display='block';
                document.getElementById('userTitle').innerText = "Hello, " + currentUser.name;
                document.getElementById('userSubTitle').innerText = "ID: " + currentUser.empId;
                initStations();
            } else { alert("ID Not Found!"); }
        });
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        el.classList.add('active');
    }

    function initStations() {
        const grid = document.getElementById('locGrid');
        grid.innerHTML = "";
        for(let i=1; i<=21; i++) {
            grid.innerHTML += `<div style="background:#000; padding:10px; border-radius:8px; border:1px solid #222;">
                <small style="color:#666">Station ${i}</small>
                <select id="s-${i}" style="width:100%; margin-top:5px; background:none; color:white; border:1px solid #333;">
                    <option>Pending</option><option>Scanning</option><option>Done</option>
                </select></div>`;
        }
    }

    function saveScan() {
        let updates = { time: new Date().toLocaleString() };
        for(let i=1; i<=21; i++) { updates[`St_${i}`] = document.getElementById(`s-${i}`).value; }
        database.ref('LiveStatus/' + currentUser.empId).set(updates).then(() => alert("Saved!"));
    }
</script>
</body>
</html>
