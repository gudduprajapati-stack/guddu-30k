<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS Operational System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .auth-container { width: 330px; padding: 35px; background: var(--card); border-radius: 15px; margin-top: 50px; height: fit-content; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .link-btn { color: var(--primary); background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; font-size: 14px; width: 100%; }
        #dashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border-top: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <h2 style="color:var(--primary)">NexS LOGIN</h2>
        <input type="text" id="loginId" placeholder="User ID (e.g. 138663)">
        <button class="btn" onclick="loginUser()">Login</button>
        <button class="link-btn" onclick="toggleAuth(true)">Create New ID / Register</button>
        <p id="loginErr" style="color:#ff4444; font-size:12px; display:none; margin-top:10px; font-weight:bold;">⚠️ ID Not Found! Register First.</p>
    </div>

    <div id="registerPage" class="auth-container" style="display:none;">
        <h2 style="color:var(--primary)">REGISTER</h2>
        <input type="text" id="newName" placeholder="Full Name">
        <input type="text" id="newId" placeholder="Unique ID (Numbers)">
        <button class="btn" style="background:#28a745; color:white;" onclick="registerUser()">Save & Register</button>
        <button class="link-btn" onclick="toggleAuth(false)">Back to Login</button>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--primary); padding-bottom:10px;">
            <h2 id="welcomeName" style="margin:0;">Dashboard</h2>
            <button onclick="location.reload()" style="background:none; color:red; border:1px solid red; padding:5px; cursor:pointer; border-radius:4px;">Logout</button>
        </div>
        <div class="grid" id="locGrid"></div>
        <button class="btn" style="width:250px; margin:40px auto; display:block;" onclick="syncData()">SAVE TO CLOUD</button>
    </div>

<script>
    // Config from your image
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        authDomain: "nexs-guddu-30k.firebaseapp.com",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        storageBucket: "nexs-guddu-30k.firebasestorage.app",
        messagingSenderId: "634684833271",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeUser = null;

    function toggleAuth(show) {
        document.getElementById('loginPage').style.display = show ? 'none' : 'block';
        document.getElementById('registerPage').style.display = show ? 'block' : 'none';
        document.getElementById('loginErr').style.display = 'none';
    }

    // REGISTRATION: FIX - ID ko 'Key' banaya hai
    function registerUser() {
        const name = document.getElementById('newName').value.trim();
        const id = document.getElementById('newId').value.trim();
        if(name && id) {
            // Path fix: Users folder ke andar ID folder banega
            db.ref('Users/' + id).set({ 
                name: name, 
                empId: id 
            })
            .then(() => {
                alert("ID: " + id + " Registered Successfully!");
                toggleAuth(false);
            }).catch(e => alert("Error: " + e.message));
        } else { alert("Name aur ID dono bharein!"); }
    }

    // LOGIN: Ab ye sahi ID folder dhoondhega
    function loginUser() {
        const id = document.getElementById('loginId').value.trim();
        if(!id) return;

        db.ref('Users/' + id).once('value', (snap) => {
            if(snap.exists()) {
                activeUser = snap.val();
                loadDashboard();
            } else {
                document.getElementById('loginErr').style.display = 'block';
            }
        });
    }

    function loadDashboard() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeName').innerText = "Hello, " + activeUser.name;
        
        const grid = document.getElementById('locGrid');
        grid.innerHTML = "";
        for(let i=1; i<=21; i++) {
            grid.innerHTML += `
                <div class="card">
                    <small>STATION ${i}</small>
                    <select id="s-${i}" style="width:100%; margin-top:10px; background:#000; color:white; padding:5px;">
                        <option>Pending</option><option>Scanning</option><option>Completed</option>
                    </select>
                </div>`;
        }
    }

    function syncData() {
        let updates = { id: activeUser.empId, time: new Date().toLocaleString() };
        for(let i=1; i<=21; i++) { updates[`Loc_${i}`] = document.getElementById(`s-${i}`).value; }
        db.ref('TrackingData/' + activeUser.empId).set(updates).then(() => alert("Data Synced!"));
    }
</script>
</body>
</html>
