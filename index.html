<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - Ultimate Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .auth-container { width: 330px; padding: 35px; background: var(--card); border-radius: 15px; margin-top: 50px; height: fit-content; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #dashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border-top: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <h2 style="color:var(--primary)">NexS LOGIN</h2>
        <input type="text" id="loginId" placeholder="Enter ID (138663)">
        <button class="btn" onclick="loginUser()">Login</button>
        <button onclick="toggleAuth(true)" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:15px; text-decoration:underline;">New User? Register Here</button>
        <p id="loginErr" style="color:red; display:none; margin-top:10px;">❌ ID Not Found!</p>
    </div>

    <div id="registerPage" class="auth-container" style="display:none;">
        <h2 style="color:var(--primary)">REGISTER</h2>
        <input type="text" id="newName" placeholder="Your Name">
        <input type="text" id="newId" placeholder="Create ID (e.g. 138663)">
        <button class="btn" style="background:#28a745; color:white;" onclick="registerUser()">Save to Firebase</button>
        <button onclick="toggleAuth(false)" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:15px;">Back to Login</button>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--primary);">
            <h3 id="welcomeHeader">Dashboard</h3>
            <button onclick="location.reload()" style="color:red; background:none; border:none; cursor:pointer;">Logout</button>
        </div>
        <div class="grid" id="locGrid"></div>
        <button class="btn" style="width:200px; margin:20px auto; display:block;" onclick="syncData()">SAVE CLOUD</button>
    </div>

<script>
    // Config Exactly from your Image
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        authDomain: "nexs-guddu-30k.firebaseapp.com",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        storageBucket: "nexs-guddu-30k.firebasestorage.app",
        messagingSenderId: "634684833271",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };

    // Initialize
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function toggleAuth(show) {
        document.getElementById('loginPage').style.display = show ? 'none' : 'block';
        document.getElementById('registerPage').style.display = show ? 'block' : 'none';
    }

    // --- REGISTER ---
    function registerUser() {
        const n = document.getElementById('newName').value.trim();
        const i = document.getElementById('newId').value.trim();
        if(n && i) {
            // Hum seedha Users folder mein ID ko Key bana rahe hain
            database.ref('Users/' + i).set({
                name: n,
                empId: i
            }, (error) => {
                if (error) {
                    alert("Data could not be saved!" + error);
                } else {
                    alert("Registration Successful for ID: " + i);
                    toggleAuth(false);
                }
            });
        } else { alert("Please fill Name and ID"); }
    }

    // --- LOGIN ---
    function loginUser() {
        const id = document.getElementById('loginId').value.trim();
        if(!id) return;

        database.ref('Users/' + id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const userData = snapshot.val();
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('welcomeHeader').innerText = "Welcome, " + userData.name;
                setupGrid(id);
            } else {
                document.getElementById('loginErr').style.display = 'block';
            }
        });
    }

    function setupGrid(empId) {
        const grid = document.getElementById('locGrid');
        grid.innerHTML = "";
        for(let x=1; x<=21; x++) {
            grid.innerHTML += `<div class="card">Point ${x} <select id="p-${x}"><option>Pending</option><option>Done</option></select></div>`;
        }
    }

    function syncData() {
        // Aapne dashboard par jo ID use ki hai wahi use karega
        const currentId = document.getElementById('loginId').value.trim();
        let results = { lastUpdate: new Date().toLocaleString() };
        for(let x=1; x<=21; x++) { results[`Point_${x}`] = document.getElementById(`p-${x}`).value; }
        
        database.ref('LiveStatus/' + currentId).set(results).then(() => {
            alert("Cloud Synced!");
        });
    }
</script>
</body>
</html>
