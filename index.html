<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexS ULTRA FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

.sidebar{
width:230px;
height:100vh;
background:#000;
position:fixed;
left:0;
top:0;
overflow:auto;
border-right:1px solid #222;
}

.sidebar div{
padding:16px;
cursor:pointer;
border-bottom:1px solid #111;
}

.sidebar div:hover{
background:#111;
}

.main{
margin-left:230px;
padding:15px;
}

.tab{
display:none;
}

.active{
display:block;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

input,select,button{
padding:10px;
background:#111;
border:1px solid #444;
color:white;
border-radius:5px;
}

button{
background:#00d4ff;
color:black;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:#111;
}

th,td{
padding:8px;
border-bottom:1px solid #333;
text-align:center;
font-size:13px;
}

th{
background:#000;
color:#00d4ff;
}

.liveBox{
background:#000;
border:1px solid #00d4ff;
padding:15px;
margin-bottom:15px;
font-size:22px;
font-weight:bold;
text-align:center;
border-radius:10px;
color:#00d4ff;
}

#loginPage{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:10px;
}

#loginPage input{
width:300px;
}

.card{
background:#111;
padding:10px;
border:1px solid #333;
border-radius:5px;
margin-bottom:15px;
}

#locCheckboxes{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:5px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginPage">

<h2>NexS ULTRA LOGIN</h2>

<input id="loginId" placeholder="Enter Login ID">

<button onclick="login()">LOGIN</button>

<br><br>

<h3>NEW USER</h3>

<input id="regName" placeholder="Name">

<input id="regId" placeholder="ID">

<button onclick="register()">SAVE USER</button>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<div class="sidebar">

<div onclick="showTab('tray')">📦 Tray Scan</div>

<div onclick="showTab('ship')">🚛 Shipment</div>

<div onclick="showTab('history')">🕒 History</div>

<div onclick="showTab('dash')">📊 Dashboard</div>

<div onclick="logout()">🚪 Logout</div>

</div>

<div class="main">

<!-- TRAY -->

<div id="tray" class="tab active">

<div class="liveBox" id="liveTotal">
TOTAL SCANS : 0
</div>

<div class="row">

<select id="loc"></select>

<input id="trayInput" placeholder="Scan Tray (7 Digit)" autofocus>

</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Tray</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="trayTable"></tbody>

</table>

</div>

<!-- SHIPMENT -->

<div id="ship" class="tab">

<div class="row">

<select id="agency">

<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>

</select>

<input id="shipInput" placeholder="Shipment ID">

</div>

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Agency</th>
<th>User</th>
</tr>
</thead>

<tbody id="shipTable"></tbody>

</table>

</div>

<!-- HISTORY -->

<div id="history" class="tab">

<div class="row">

<input type="date" id="from">

<input type="date" id="to">

<select id="type">

<option>ALL</option>
<option>TRAY</option>
<option>SHIPMENT</option>

</select>

<input id="search" placeholder="Search">

<button onclick="applyHistory()">Filter</button>

<button onclick="exportCSV()">Export</button>

</div>

<table>

<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="histData"></tbody>

</table>

</div>

<!-- DASHBOARD -->

<div id="dash" class="tab">

<div class="row">

<input type="date" id="dfrom">

<input type="date" id="dto">

<select id="dtype">

<option>ALL</option>
<option>TRAY</option>
<option>SHIPMENT</option>

</select>

</div>

<div class="card">

<label>

<input type="checkbox" id="selectAll" checked>

SELECT ALL

</label>

<br><br>

<div id="locCheckboxes"></div>

</div>

<h3>📦 Location Hourly</h3>

<table id="locTable"></table>

<br>

<h3>👤 Person Wise</h3>

<table id="personTable"></table>

<br>

<h3>⏱ Person + Hourly</h3>

<table id="personHourTable"></table>

</div>

</div>

</div>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: "PASTE_API_KEY",

authDomain: "PASTE_AUTH_DOMAIN",

databaseURL: "PASTE_DATABASE_URL",

projectId: "PASTE_PROJECT_ID",

storageBucket: "PASTE_STORAGE_BUCKET",

messagingSenderId: "PASTE_SENDER_ID",

appId: "PASTE_APP_ID"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

/* ELEMENTS */

const loginPage=document.getElementById("loginPage");
const app=document.getElementById("app");

const loginId=document.getElementById("loginId");

const regName=document.getElementById("regName");
const regId=document.getElementById("regId");

const trayInput=document.getElementById("trayInput");
const shipInput=document.getElementById("shipInput");

const loc=document.getElementById("loc");
const agency=document.getElementById("agency");

const trayTable=document.getElementById("trayTable");
const shipTable=document.getElementById("shipTable");

const histData=document.getElementById("histData");

const liveTotal=document.getElementById("liveTotal");

const locCheckboxes=document.getElementById("locCheckboxes");

const selectAll=document.getElementById("selectAll");

let user={};

let trayData=[];
let shipData=[];
let allData=[];

/* LOCATIONS */

const locations=[

"ICU ENTRY",
"MEI ENTRY",
"OMT ENTRY",
"LO SEND TO ICU",
"LO SEND TO MEI",
"ORDER SEND TO MAIN LINE FOR FT",
"ORDER SEND TO MAIN LINE FOR QC",
"ORDER SEND TO MAIN LINE FOR PACKING",
"TLP SEND TO MEI",
"QC FAIL SEND TO MEI",
"FRAME QC FAIL SEND TO MAIN LINE",
"SEND TO MEI FOR REVIEW",
"CS LOCATION",
"SMALL DIA LOCATION",
"LO QC FAIL LOCATION (JIT)",

...Array.from({length:10},(_,i)=>
`OMT RACK ${String(i+1).padStart(2,'0')}`
),

...Array.from({length:10},(_,i)=>
`ICU TROLLEY ${i+1}`
),

...Array.from({length:10},(_,i)=>
`OMT TROLLEY ${i+1}`
)

];

locations.forEach(l=>{

const option=document.createElement("option");

option.value=l;
option.textContent=l;

loc.appendChild(option);

locCheckboxes.innerHTML+=`
<label style="display:block;">
<input type="checkbox" class="locChk" value="${l}" checked>
${l}
</label>
`;

});

/* SELECT ALL */

selectAll.onclick=()=>{

document.querySelectorAll(".locChk")
.forEach(c=>c.checked=selectAll.checked);

};

function getSelectedLocations(){

return [...document.querySelectorAll(".locChk:checked")]
.map(c=>c.value);

}

/* REGISTER */

function register(){

if(!regName.value || !regId.value){

alert("Fill all fields");
return;

}

db.ref("Users/"+regId.value).set({

name:regName.value

}).then(()=>{

alert("User Saved");

regName.value="";
regId.value="";

});

}

/* LOGIN */

function login(){

if(!loginId.value){

alert("Enter ID");
return;

}

db.ref("Users/"+loginId.value).once("value")

.then(snap=>{

if(snap.exists()){

user.name=snap.val().name;
user.id=loginId.value;

loginPage.style.display="none";

app.style.display="block";

loadData();

setTimeout(()=>{

trayInput.focus();

},500);

}else{

alert("ID NOT FOUND");

}

});

}

loginId.addEventListener("keydown",e=>{

if(e.key==="Enter") login();

});

/* LOGOUT */

function logout(){

location.reload();

}

/* TAB */

function showTab(id){

document.querySelectorAll(".tab")
.forEach(x=>x.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

}

/* LOAD DATA */

function loadData(){

db.ref("tray").on("value",snap=>{

trayData=[];

snap.forEach(c=>{

let d=c.val();

d.type="TRAY";

trayData.unshift(d);

});

renderTray();

mergeData();

});

db.ref("ship").on("value",snap=>{

shipData=[];

snap.forEach(c=>{

let d=c.val();

d.type="SHIPMENT";

shipData.unshift(d);

});

renderShip();

mergeData();

});

}

/* RENDER */

function renderTray(){

trayTable.innerHTML="";

trayData.forEach(d=>{

trayTable.innerHTML+=`

<tr>

<td>${d.date||""}</td>

<td>${d.time||""}</td>

<td>${d.barcode||""}</td>

<td>${d.location||""}</td>

<td>${d.user||""} (${d.userId||""})</td>

</tr>

`;

});

}

function renderShip(){

shipTable.innerHTML="";

shipData.forEach(d=>{

shipTable.innerHTML+=`

<tr>

<td>${d.date||""}</td>

<td>${d.time||""}</td>

<td>${d.shipId||""}</td>

<td>${d.location||""}</td>

<td>${d.user||""} (${d.userId||""})</td>

</tr>

`;

});

}

function mergeData(){

allData=[...trayData,...shipData];

allData.sort((a,b)=>b.timestamp-a.timestamp);

liveTotal.innerHTML="TOTAL SCANS : "+allData.length;

}

/* TRAY SCAN */

trayInput.addEventListener("keydown",e=>{

if(e.key==="Enter"){

const code=trayInput.value.trim();

if(!/^\d{7}$/.test(code)){

alert("Tray must be exactly 7 digit");
return;

}

db.ref("tray").push({

barcode:code,

location:loc.value,

date:new Date().toLocaleDateString("en-GB"),

time:new Date().toLocaleTimeString(),

user:user.name,

userId:user.id,

timestamp:Date.now()

}).then(()=>{

trayInput.value="";
trayInput.focus();

});

}

});

/* SHIPMENT */

shipInput.addEventListener("keydown",e=>{

if(e.key==="Enter"){

const code=shipInput.value.trim();

if(code.length<3 || code.length>23){

alert("Shipment ID invalid");
return;

}

db.ref("ship").push({

shipId:code,

location:agency.value,

date:new Date().toLocaleDateString("en-GB"),

time:new Date().toLocaleTimeString(),

user:user.name,

userId:user.id,

timestamp:Date.now()

}).then(()=>{

shipInput.value="";

});

}

});

/* HISTORY */

function applyHistory(){

histData.innerHTML="";

let from=document.getElementById("from").value;
let to=document.getElementById("to").value;
let type=document.getElementById("type").value;
let search=document.getElementById("search").value.toLowerCase();

allData.forEach(d=>{

let str=JSON.stringify(d).toLowerCase();

if(type!=="ALL" && d.type!==type) return;

if(search && !str.includes(search)) return;

histData.innerHTML+=`

<tr>

<td>${d.type}</td>

<td>${d.date}</td>

<td>${d.time}</td>

<td>${d.barcode||d.shipId}</td>

<td>${d.location}</td>

<td>${d.user}</td>

</tr>

`;

});

}

/* EXPORT */

function exportCSV(){

let csv="Type,Date,Time,ID,Location,User\n";

allData.forEach(d=>{

csv+=`${d.type},${d.date},${d.time},${d.barcode||d.shipId},${d.location},${d.user}\n`;

});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="NexS_Export.csv";

a.click();

}

/* DASHBOARD */

setInterval(()=>{

const hours=[
"12AM","1AM","2AM","3AM","4AM","5AM",
"6AM","7AM","8AM","9AM","10AM","11AM",
"12PM","1PM","2PM","3PM","4PM","5PM",
"6PM","7PM","8PM","9PM","10PM","11PM"
];

let map={};
let person={};
let personH={};

let type=document.getElementById("dtype").value;

let selectedLoc=getSelectedLocations();

allData.forEach(d=>{

if(type!=="ALL" && d.type!==type) return;

if(selectedLoc.length && !selectedLoc.includes(d.location)) return;

let dt=new Date(d.timestamp);

let h=dt.getHours();

if(!map[d.location]) map[d.location]=Array(24).fill(0);

map[d.location][h]++;

person[d.userId]=(person[d.userId]||0)+1;

if(!personH[d.userId]) personH[d.userId]=Array(24).fill(0);

personH[d.userId][h]++;

});

/* LOCATION */

locTable.innerHTML=`
<tr>
<th>Location</th>
${hours.map(h=>`<th>${h}</th>`).join("")}
</tr>
`;

Object.entries(map).forEach(([l,v])=>{

locTable.innerHTML+=`

<tr>

<td>${l}</td>

${v.map(x=>`<td>${x}</td>`).join("")}

</tr>

`;

});

/* PERSON */

personTable.innerHTML=`
<tr>
<th>User</th>
<th>Total</th>
</tr>
`;

Object.entries(person).forEach(([u,v])=>{

personTable.innerHTML+=`

<tr>

<td>${u}</td>

<td>${v}</td>

</tr>

`;

});

/* PERSON HOURLY */

personHourTable.innerHTML=`
<tr>
<th>User</th>
${hours.map(h=>`<th>${h}</th>`).join("")}
</tr>
`;

Object.entries(personH).forEach(([u,v])=>{

personHourTable.innerHTML+=`

<tr>

<td>${u}</td>

${v.map(x=>`<td>${x}</td>`).join("")}

</tr>

`;

});

},2000);

</script>

</body>
</html>
