<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS FINAL SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff}
.sidebar{width:220px;position:fixed;height:100%;background:#000;padding:10px}
.sidebar div{padding:12px;cursor:pointer}
.sidebar div:hover{background:#111}
.main{margin-left:230px;padding:15px}
.tab{display:none}
.active{display:block}
.row{display:flex;gap:10px;margin-bottom:10px;align-items:center}
input,select{padding:10px;background:#000;color:#fff;border:1px solid #444}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border-bottom:1px solid #333;padding:8px;text-align:center}
th{color:#00d4ff}
button{padding:8px 12px;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>Login</h2>
<input id="loginId" placeholder="Enter ID">
<button onclick="login()">Login</button>

<h3>New Registration</h3>
<input id="regName" placeholder="Name">
<input id="regId" placeholder="ID">
<button onclick="register()">Save</button>
</div>

<!-- MAIN -->
<div id="app" style="display:none">

<div class="sidebar">
<div onclick="showTab('tray')">Tray</div>
<div onclick="showTab('ship')">Shipment</div>
<div onclick="showTab('history')">History</div>
<div onclick="showTab('dash')">Dashboard</div>
<div onclick="logout()">Logout</div>
</div>

<div class="main">

<!-- TRAY -->
<div id="tray" class="tab active">
<div class="row">
<select id="loc">
<option>ICU ENTRY</option>
<option>MEI ENTRY</option>
<option>OMT ENTRY</option>
<option>ICU TROLLEY 1</option>
<option>OMT TROLLEY 1</option>
</select>

<input id="trayInput" placeholder="Scan Tray (MT76921)">
</div>

<table>
<thead>
<tr><th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th></tr>
</thead>
<tbody id="trayTable"></tbody>
</table>
</div>

<!-- SHIPMENT -->
<div id="ship" class="tab">
<div class="row">
<select id="agency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>

<input id="shipInput" placeholder="Max 23 Digit">
</div>

<table>
<thead>
<tr><th>Date</th><th>Time</th><th>ID</th><th>Agency</th><th>User</th></tr>
</thead>
<tbody id="shipTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">

<div class="row" style="flex-wrap:nowrap;overflow-x:auto">
<input type="date" id="from">
<input type="date" id="to">

<select id="type">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<input id="search" placeholder="Search">

<button onclick="applyHistory()">Filter</button>
<button onclick="exportCSV()">Export</button>
<button onclick="deleteData()">Delete</button>
</div>

<table>
<thead>
<tr>
<th>Type</th><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User</th>
</tr>
</thead>
<tbody id="histData"></tbody>
</table>

</div>

<!-- DASHBOARD -->
<div id="dash" class="tab">

<h3>Location Hourly</h3>
<table id="locTable"></table>

<h3>Person Wise</h3>
<table id="personTable"></table>

<h3>Person + Hourly</h3>
<table id="personHourTable"></table>

</div>

</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSy...",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user={},allData=[];

function register(){
let n=regName.value,i=regId.value;
db.ref("Users/"+i).set({name:n});
alert("Saved");
}

function login(){
let id=loginId.value;
db.ref("Users/"+id).once("value",s=>{
if(s.exists()){
user.name=s.val().name;
user.id=id;
loginPage.style.display="none";
app.style.display="block";
loadData();
}else alert("Not found");
});
}

function logout(){location.reload()}

function showTab(t){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
}

trayInput.addEventListener("keydown",e=>{
if(e.key==="Enter"){
db.ref("tray").push({
barcode:trayInput.value,
location:loc.value,
date:new Date().toLocaleDateString('en-GB'),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now(),
type:"TRAY"
});
trayInput.value="";
}
});

shipInput.addEventListener("keydown",e=>{
if(e.key==="Enter" && e.target.value.length<=23){
db.ref("ship").push({
shipId:shipInput.value,
location:agency.value,
date:new Date().toLocaleDateString('en-GB'),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now(),
type:"SHIPMENT"
});
shipInput.value="";
}
});

function loadData(){
db.ref("tray").on("value",s=>{
allData=[];
trayTable.innerHTML="";
s.forEach(c=>{
let d=c.val();
allData.push(d);
trayTable.innerHTML+=row(d);
});
});

db.ref("ship").on("value",s=>{
shipTable.innerHTML="";
s.forEach(c=>{
let d=c.val();
allData.push(d);
shipTable.innerHTML+=row(d);
});
});
}

function row(d){
return `<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode||d.shipId}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>`;
}

function applyHistory(){
histData.innerHTML="";
allData.forEach(d=>{
histData.innerHTML+=row(d);
});
}

function exportCSV(){
let csv="Date,Time,ID,Location,User\n";
allData.forEach(d=>{
csv+=`${d.date},${d.time},${d.barcode||d.shipId},${d.location},${d.user}\n`;
});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="data.csv";
a.click();
}

function deleteData(){
if(confirm("Delete all?")){
db.ref("tray").remove();
db.ref("ship").remove();
}
}

// DASHBOARD
setInterval(()=>{
let locMap={},personMap={};

allData.forEach(d=>{
let h=new Date(d.timestamp).getHours();
let loc=d.location;
let u=d.userId;

if(!locMap[loc]) locMap[loc]=Array(24).fill(0);
locMap[loc][h]++;

personMap[u]=(personMap[u]||0)+1;
});

const hours=[...Array(24).keys()].map(h=>h);

locTable.innerHTML="<tr><th>Loc</th>"+hours.map(h=>`<th>${h}</th>`).join('')+"</tr>";

Object.entries(locMap).forEach(([l,v])=>{
locTable.innerHTML+=`<tr><td>${l}</td>${v.map(x=>`<td>${x}</td>`).join('')}</tr>`;
});

personTable.innerHTML="<tr><th>User</th><th>Total</th></tr>";
Object.entries(personMap).forEach(([u,v])=>{
personTable.innerHTML+=`<tr><td>${u}</td><td>${v}</td></tr>`;
});

},2000);
</script>

</body>
</html>
