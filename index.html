<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TRAY AUTO NEXS SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body{
font-family:Segoe UI;
background:#f4f7f6;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
max-width:600px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input,select{
width:100%;
padding:15px;
font-size:20px;
margin-top:10px;
}

h2{text-align:center;}

#status{
margin-top:15px;
font-weight:bold;
text-align:center;
}
</style>
</head>

<body>

<div class="card">

<h2>📦 TRAY AUTO SCANNER</h2>

<select id="loc">
<option>ICU ENTRY</option>
<option>MEI ENTRY</option>
<option>OMT ENTRY</option>
<option>SEND TO PACKING</option>
</select>

<input id="scanBox" placeholder="SCAN 7 DIGIT TRAY..." autofocus>

<div id="status"></div>

</div>

<script>

// ================= FIREBASE =================

const firebaseConfig = {
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
authDomain:"nexs-guddu-30k.firebaseapp.com",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com",
projectId:"nexs-guddu-30k"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();


// ================= SOUND =================
const beep=new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

// ================= NEXS API =================
const NEXS_API=
"https://app.nexs.lenskart.com/nexs/wms/api/v1/fittingDetails/";

async function fetchNexs(tray){

try{

const res=await fetch(NEXS_API+tray,{
credentials:"include"
});

if(!res.ok) throw "error";

const json=await res.json();
return json.data;

}catch(e){
return null;
}

}

// ================= STATUS =================
function showStatus(msg,color){
const s=document.getElementById("status");
s.innerText=msg;
s.style.color=color;
}

// ================= MAIN SCAN =================

async function handleScan(tray){

beep.play();

showStatus("Saving Scan...","orange");

const now=new Date();

const ref=db.ref("logs").push();

await ref.set({
tray_id:tray,
location:document.getElementById("loc").value,
date:now.toISOString().split('T')[0],
time:now.toLocaleTimeString(),
status:"fetching"
});

showStatus("Fetching NexS Data...","blue");

// ===== FETCH NEXS =====
const data=await fetchNexs(tray);

if(data){

let items={};

data.item_details.forEach((it,i)=>{
items["item"+(i+1)]={
type:it.type,
barcode:it.barcode,
status:it.status,
product_id:it.product_id,
tray_id:it.tray_id,
updated_at:it.updated_at
};
});

await ref.update({
shipment_id:data.shipment_id,
fitting_id:data.fitting_id,
items:items,
status:"completed"
});

showStatus("✅ NexS Data Loaded","green");

}else{

await ref.update({status:"not_found"});
showStatus("❌ Not Found in NexS","red");

}

}

// ================= SCANNER INPUT =================

document.getElementById("scanBox")
.addEventListener("keypress",e=>{

if(e.key==="Enter"){

const val=e.target.value.trim();

if(val.length!==7){
showStatus("Invalid Tray ID","red");
return;
}

handleScan(val);
e.target.value="";

}

});

</script>

</body>
</html>
