<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - Master Control v27.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #28a745; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .user-profile { background: #111; padding: 25px 20px; border-bottom: 1px solid #222; }
        .user-profile h4 { margin: 0; color: var(--primary); font-size: 16px; text-transform: capitalize; }
        .nav-list { padding: 15px; flex-grow: 1; }
        .nav-item { padding: 12px 15px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; color: #888; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #1a1a1a; color: var(--primary); border-left: 4px solid var(--primary); }
        .main-content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; outline: none; font-size: 14px; box-sizing: border-box; }
        .data-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #111; color: var(--primary); text-transform: uppercase; font-size: 11px; position: sticky; top: 0; }
        .history-controls { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #222; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; align-items: flex-end; }
        .btn { padding: 12px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }
        #authSection { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid #333; width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div id="authSection">
        <div id="loginCard" class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 20px;">NexS LOGIN</h2>
            <input type="text" id="loginId" placeholder="Employee ID">
            <button class="btn btn-primary" style="width:100%; margin-top:15px;" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div class="sidebar" id="mainSidebar" style="display:none;">
        <div class="user-profile"><h4 id="sideName">---</h4><small id="sideId">ID: ---</small></div>
        <div class="nav-list">
            <div class="nav-item active" onclick="switchTab('scanning', this)">📦 Scanning</div>
            <div class="nav-item" onclick="switchTab('shipment', this)">🚛 Shipment</div>
            <div class="nav-item" onclick="switchTab('history', this)">🕒 History</div>
        </div>
        <div onclick="location.reload()" style="padding:15px; color:var(--danger); cursor:pointer; text-align:center; font-weight:bold; margin-top: auto;">LOGOUT</div>
    </div>

    <div class="main-content" id="mainContent" style="display:none;">
        <h2 id="tabTitle">Operations</h2>

        <div id="scanning" class="tab-content active">
            <table class="data-table"><thead><tr><th>DATE</th><th>TIME</th><th>BARCODE</th><th>LOCATION</th></tr></thead><tbody id="scanLog"></tbody></table>
        </div>

        <div id="shipment" class="tab-content">
            <table class="data-table"><thead><tr><th>DATE</th><th>TIME</th><th>SHIPMENT ID</th><th>LOCATION</th></tr></thead><tbody id="shipLog"></tbody></table>
        </div>

        <div id="history" class="tab-content">
            <div class="history-controls">
                <div><label>FROM DATE</label><input type="date" id="fromDate"></div>
                <div><label>TO DATE</label><input type="date" id="toDate"></div>
                <div><label>TYPE</label><select id="filterType"><option value="ALL">ALL</option><option value="TRAY">TRAY</option><option value="SHIPMENT">SHIPMENT</option></select></div>
                <button class="btn btn-primary" onclick="applyFilters()">FILTER</button>
                <button class="btn btn-accent" onclick="exportCSV()">DOWNLOAD</button>
                <button class="btn btn-danger" onclick="bulkDelete()">DELETE RANGE</button>
            </div>
            <p id="filterInfo" style="font-size:12px; color:var(--primary); margin-bottom:10px;"></p>
            <table class="data-table">
                <thead><tr><th>TYPE</th><th>DATE</th><th>TIME</th><th>ID</th><th>LOCATION</th><th>USER</th></tr></thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let loggedUser = null;
    let masterList = [];
    let currentFilteredKeys = []; 

    function parseDate(str) {
        const p = str.split('/');
        return new Date(p[2], p[1] - 1, p[0]);
    }

    function handleLogin() {
        const id = document.getElementById('loginId').value.trim();
        db.ref('Users/' + id).once('value', snap => {
            if(snap.exists()) {
                loggedUser = snap.val();
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainSidebar').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('sideName').innerText = loggedUser.name;
                document.getElementById('sideId').innerText = "ID: " + id;
                initSync();
            } else { alert("ID Not Found!"); }
        });
    }

    function initSync() {
        db.ref('LiveScans').on('value', s1 => {
            db.ref('ShipmentScans').on('value', s2 => {
                masterList = [];
                s1.forEach(c => masterList.push({...c.val(), key: c.key, type: 'TRAY', dId: c.val().barcode || c.val().tray, path: 'LiveScans'}));
                s2.forEach(c => masterList.push({...c.val(), key: c.key, type: 'SHIPMENT', dId: c.val().shipId, path: 'ShipmentScans'}));
                masterList.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                applyFilters();
            });
        });
    }

    function applyFilters() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const type = document.getElementById('filterType').value;

        const filtered = masterList.filter(d => {
            const dObj = parseDate(d.date || '01/01/2000');
            const mFrom = from ? dObj >= new Date(from) : true;
            const mTo = to ? dObj <= new Date(to) : true;
            const mType = type === 'ALL' ? true : d.type === type;
            return mFrom && mTo && mType;
        });

        currentFilteredKeys = filtered.map(d => ({path: d.path, key: d.key}));
        document.getElementById('filterInfo').innerText = `Records Found: ${filtered.length}`;
        
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = "";
        filtered.forEach(d => {
            tbody.innerHTML += `<tr><td style="color:${d.type==='TRAY'?'#00d4ff':'#28a745'}">${d.type}</td><td>${d.date}</td><td>${d.time}</td><td>${d.dId}</td><td>${d.location}</td><td>${d.user}</td></tr>`;
        });
    }

    // 🔥 BULK DELETE LOGIC
    function bulkDelete() {
        if (currentFilteredKeys.length === 0) return alert("No data selected to delete!");
        
        const confirmMsg = `WARNING: You are about to delete ${currentFilteredKeys.length} records from Firebase PERMANENTLY. Continue?`;
        if (confirm(confirmMsg)) {
            const promises = currentFilteredKeys.map(item => db.ref(`${item.path}/${item.key}`).remove());
            
            Promise.all(promises).then(() => {
                alert("Selected range deleted successfully!");
            }).catch(err => alert("Error deleting: " + err.message));
        }
    }

    function exportCSV() {
        let csv = "Type,Date,Time,ID,Location,User\n";
        masterList.forEach(d => csv += `${d.type},${d.date},${d.time},${d.dId},${d.location},${d.user}\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "NexS_History.csv";
        a.click();
    }

    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        el.classList.add('active');
    }
</script>
</body>
</html>
