<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS FINAL SYSTEM</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:220px;background:#000;height:100vh;padding:15px}
.nav{padding:10px;color:#888;cursor:pointer}
.nav.active{color:#00d4ff}
.main{flex:1;padding:15px}
.tab{display:none}
.tab.active{display:block}
input,select{width:100%;padding:10px;margin:5px 0;background:#000;color:#fff;border:1px solid #444}
button{padding:10px;background:#00d4ff;border:none;margin-top:5px}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;text-align:center}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111;padding:25px;width:320px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
<div class="box">
<h3>Login</h3>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="showReg()" style="cursor:pointer;color:#00d4ff">New Registration</p>
</div>
</div>

<!-- REGISTER -->
<div id="regBox" class="center" style="display:none">
<div class="box">
<h3>Register</h3>
<input id="regName" placeholder="Name">
<input id="regId" placeholder="ID">
<button onclick="register()">Save</button>
<p onclick="showLogin()" style="cursor:pointer">Back</p>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;width:100%">

<div class="sidebar">
<h4 id="user"></h4>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main">

<!-- TRAY -->
<div id="tray" class="tab active">
<select id="loc"></select>
<input id="trayBox" placeholder="Scan Tray">
<table><thead><tr>
<th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th>
</tr></thead><tbody id="trayData"></tbody></table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<select id="agency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox" placeholder="Max 23 digit">
<table><thead><tr>
<th>Date</th><th>Time</th><th>ID</th><th>Agency</th><th>User</th>
</tr></thead><tbody id="shipData"></tbody></table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<input type="date" id="from">
<input type="date" id="to">
<select id="type">
<option>ALL</option><option>TRAY</option><option>SHIPMENT</option>
</select>
<input id="search" placeholder="Search">
<button onclick="exportCSV()">Export</button>
<button onclick="deleteData()">Delete</button>
<table><tbody id="histData"></tbody></table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<input type="date" id="dfrom">
<input type="date" id="dto">

<table id="hourLoc"></table>
<table id="person"></table>
<table id="personHour"></table>
</div>

</div>
</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

let user={}, data=[];

// LOCATION LIST
const LOC=[
"ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION"
];
loc.innerHTML=LOC.map(x=>`<option>${x}</option>`).join('');

// LOGIN / REGISTER
function showReg(){loginBox.style.display="none";regBox.style.display="flex"}
function showLogin(){regBox.style.display="none";loginBox.style.display="flex"}

function register(){
let n=regName.value,i=regId.value;
if(!n||!i)return alert("Fill");
db.ref("Users/"+i).set({name:n}).then(()=>alert("Done"));
}

function login(){
let id=loginId.value;
db.ref("Users/"+id).once("value",s=>{
if(!s.exists())return alert("Not found");
user.name=s.val().name;user.id=id;
loginBox.style.display="none";
app.style.display="flex";
user.innerText=user.name+" ("+user.id+")";
start();
});
}

// LOGOUT
function logout(){location.reload()}

// TAB
function openTab(t,e){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
e.classList.add("active");
}

// REALTIME
function start(){
db.ref("LiveScans").on("value",s=>{
trayData.innerHTML="";data=[];
s.forEach(c=>{
let d=c.val();data.push({...d,type:"TRAY",key:c.key});
trayData.innerHTML=`<tr><td>${d.date}</td><td>${d.time}</td><td>${d.barcode}</td><td>${d.location}</td><td>${d.user} (${d.userId})</td></tr>`+trayData.innerHTML;
});
});

db.ref("ShipmentScans").on("value",s=>{
shipData.innerHTML="";
s.forEach(c=>{
let d=c.val();data.push({...d,type:"SHIPMENT",key:c.key});
shipData.innerHTML=`<tr><td>${d.date}</td><td>${d.time}</td><td>${d.shipId}</td><td>${d.location}</td><td>${d.user} (${d.userId})</td></tr>`+shipData.innerHTML;
});
});
}

// TRAY
trayBox.onkeydown=e=>{
if(e.key==="Enter"){
db.ref("LiveScans").push({
barcode:trayBox.value,
location:loc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
trayBox.value="";
}
};

// SHIPMENT
shipBox.onkeydown=e=>{
if(e.key==="Enter"){
let v=shipBox.value;
if(v.length>23)return alert("Max 23");
db.ref("ShipmentScans").push({
shipId:v,
location:agency.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
shipBox.value="";
}
};

// HISTORY
function exportCSV(){
let csv="Type,ID\n";
data.forEach(d=>csv+=`${d.type},${d.barcode||d.shipId}\n`);
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([csv]));
a.download="data.csv";a.click();
}

function deleteData(){
if(!confirm("Delete?"))return;
db.ref("LiveScans").remove();
db.ref("ShipmentScans").remove();
}

// DASHBOARD (basic working)
setInterval(()=>{
let map={},person={},ph={};

data.forEach(d=>{
let h=new Date(d.timestamp).getHours();
let loc=d.location;
map[loc]=map[loc]||Array(24).fill(0);
map[loc][h]++;

let p=d.userId;
person[p]=(person[p]||0)+1;

ph[p]=ph[p]||Array(24).fill(0);
ph[p][h]++;
});

// render
hourLoc.innerHTML="";
for(let l in map){
hourLoc.innerHTML+=`<tr><td>${l}</td>${map[l].map(x=>`<td>${x}</td>`).join('')}</tr>`;
}

person.innerHTML="";
for(let p in person){
person.innerHTML+=`<tr><td>${p}</td><td>${person[p]}</td></tr>`;
}

personHour.innerHTML="";
for(let p in ph){
personHour.innerHTML+=`<tr><td>${p}</td>${ph[p].map(x=>`<td>${x}</td>`).join('')}</tr>`;
}

},3000);

</script>

</body>
</html>
