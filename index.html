<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS Step 3</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#111;padding:25px;width:320px}
input,select{width:100%;padding:10px;margin:8px 0;background:#000;color:#fff;border:1px solid #444}
button{width:100%;padding:10px;background:#00d4ff;border:none}
.link{color:#00d4ff;font-size:12px;cursor:pointer}
#app{display:none;padding:20px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{padding:10px;border-bottom:1px solid #333;text-align:center}
.section{margin-bottom:40px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="center">
<div class="box">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p class="link" onclick="showReg()">New Registration</p>
</div>
</div>

<!-- REGISTER -->
<div id="regBox" class="center" style="display:none">
<div class="box">
<h2>Register</h2>
<input id="regName" placeholder="Full Name">
<input id="regId" placeholder="Employee ID">
<button onclick="register()">Save</button>
<p class="link" onclick="showLogin()">Back</p>
</div>
</div>

<!-- APP -->
<div id="app">

<h2 id="user"></h2>

<!-- 📦 TRAY -->
<div class="section">
<h3>📦 Tray Scan</h3>
<select id="loc"></select>
<input id="tray" placeholder="MT76921">

<table>
<thead>
<tr>
<th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th>
</tr>
</thead>
<tbody id="trayData"></tbody>
</table>
</div>

<!-- 🚛 SHIPMENT -->
<div class="section">
<h3>🚛 Shipment Scan</h3>

<select id="agency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>

<input id="shipment" placeholder="SNXS2270000056697905">

<table>
<thead>
<tr>
<th>Date</th><th>Time</th><th>Shipment ID</th><th>Agency</th><th>User</th>
</tr>
</thead>
<tbody id="shipData"></tbody>
</table>
</div>

<button onclick="logout()">Logout</button>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// LOCATION LIST
const LOCATIONS=[ "ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION" ];
loc.innerHTML=LOCATIONS.map(x=>`<option>${x}</option>`).join('');

let user={};

// SWITCH
function showReg(){loginBox.style.display="none";regBox.style.display="flex"}
function showLogin(){regBox.style.display="none";loginBox.style.display="flex"}

// REGISTER
function register(){
let name=regName.value.trim();
let id=regId.value.trim();
if(!name||!id) return alert("Fill all");

db.ref("Users/"+id).set({name,empId:id}).then(()=>{
alert("Done"); showLogin();
});
}

// LOGIN
function login(){
let id=loginId.value.trim();
if(!id) return alert("Enter ID");

db.ref("Users/"+id).once("value",s=>{
if(!s.exists()) return alert("Not found");

user.name=s.val().name;
user.id=id;

loginBox.style.display="none";
app.style.display="block";

user.innerText=user.name+" ("+user.id+")";

startRealtime();
});
}

// LOGOUT
function logout(){location.reload()}

// REALTIME
function startRealtime(){

// TRAY
db.ref("LiveScans").on("value",snap=>{
trayData.innerHTML="";
snap.forEach(c=>{
let d=c.val();
trayData.innerHTML = `
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>` + trayData.innerHTML;
});
});

// SHIPMENT
db.ref("ShipmentScans").on("value",snap=>{
shipData.innerHTML="";
snap.forEach(c=>{
let d=c.val();
shipData.innerHTML = `
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.shipId}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>` + shipData.innerHTML;
});
});

}

// TRAY SCAN
tray.onkeydown=e=>{
if(e.key==="Enter" && tray.value){
db.ref("LiveScans").push({
barcode:tray.value.toUpperCase(),
location:loc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
tray.value="";
}
};

// SHIPMENT SCAN
shipment.onkeydown=e=>{
if(e.key==="Enter" && shipment.value.length>=10){
db.ref("ShipmentScans").push({
shipId:shipment.value.toUpperCase(),
location:agency.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});
shipment.value="";
}
};

</script>

</body>
</html>
