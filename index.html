<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS Stable Final</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:220px;background:#000;padding:20px;height:100vh}
.nav{padding:10px;margin-bottom:5px;color:#888;cursor:pointer}
.nav.active{color:#00d4ff}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
input,select{padding:8px;margin:5px;background:#000;color:#fff;border:1px solid #444}
button{padding:8px;background:#00d4ff;border:none}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;text-align:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center">
<div style="background:#111;padding:20px">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID"><br>
<button onclick="login()">Login</button>
</div>
</div>

<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName"></h3>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray</h2>
<select id="loc">
<option>ICU ENTRY</option>
<option>MEI ENTRY</option>
<option>OMT ENTRY</option>
</select>
<input id="trayBox" placeholder="Scan Tray">
<table id="trayTable"></table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment</h2>
<select id="shipLoc">
<option>DHL</option>
<option>GPSUPPLY</option>
</select>
<input id="shipBox" placeholder="Scan Shipment">
<table id="shipTable"></table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>
<button onclick="loadHistory()">Refresh</button>
<table id="historyTable"></table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<h2>Dashboard</h2>
<div id="dash"></div>
</div>

</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSy...",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

let user={};

// LOGIN FIX
function login(){
let id=loginId.value.trim();
if(!id) return alert("Enter ID");

db.ref("Users/"+id).once("value",snap=>{
if(!snap.exists()) return alert("User not found");

user.name=snap.val().name;
user.id=id;

auth.style.display="none";
sidebar.style.display="block";
main.style.display="block";

userName.innerText=user.name+" ("+id+")";

startRealtime();
});
}

function logout(){location.reload();}

// TAB
function openTab(t,el){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
el.classList.add("active");

if(t==="history") loadHistory();
if(t==="dashboard") loadDashboard();
}

// 🔥 SAFE TIME PARSER
function getHour(t){
if(!t) return null;
let h=parseInt(t.split(":")[0]);
if(t.includes("PM") && h<12) h+=12;
if(t.includes("AM") && h===12) h=0;
return h;
}

// 🔥 REALTIME FIXED
function startRealtime(){

db.ref("LiveScans").on("value",snap=>{
let html="<tr><th>Date</th><th>Time</th><th>ID</th><th>Loc</th><th>User</th></tr>";
snap.forEach(c=>{
let d=c.val();
if(!d) return;
html+=`<tr><td>${d.date}</td><td>${d.time}</td><td>${d.barcode}</td><td>${d.location}</td><td>${d.user}</td></tr>`;
});
trayTable.innerHTML=html;
});

db.ref("ShipmentScans").on("value",snap=>{
let html="<tr><th>Date</th><th>Time</th><th>ID</th><th>Loc</th><th>User</th></tr>";
snap.forEach(c=>{
let d=c.val();
if(!d) return;
html+=`<tr><td>${d.date}</td><td>${d.time}</td><td>${d.shipId}</td><td>${d.location}</td><td>${d.user}</td></tr>`;
});
shipTable.innerHTML=html;
});
}

// SCAN
trayBox.onkeydown=e=>{
if(e.key==="Enter"){
db.ref("LiveScans").push({
barcode:trayBox.value,
location:loc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name
});
trayBox.value="";
}
};

shipBox.onkeydown=e=>{
if(e.key==="Enter"){
db.ref("ShipmentScans").push({
shipId:shipBox.value,
location:shipLoc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name
});
shipBox.value="";
}
};

// HISTORY FIX
function loadHistory(){
let html="<tr><th>Type</th><th>ID</th><th>Loc</th><th>User</th></tr>";

db.ref("LiveScans").once("value",s=>{
s.forEach(c=>{
let d=c.val();
html+=`<tr><td>TRAY</td><td>${d.barcode}</td><td>${d.location}</td><td>${d.user}</td></tr>`;
});

db.ref("ShipmentScans").once("value",s2=>{
s2.forEach(c=>{
let d=c.val();
html+=`<tr><td>SHIP</td><td>${d.shipId}</td><td>${d.location}</td><td>${d.user}</td></tr>`;
});

historyTable.innerHTML=html;
});
});
}

// DASHBOARD FINAL FIX
function loadDashboard(){

let data=[];

db.ref("LiveScans").once("value",s=>{
s.forEach(c=>data.push({...c.val(),type:"TRAY"}));

db.ref("ShipmentScans").once("value",s2=>{
s2.forEach(c=>data.push({...c.val(),type:"SHIP"}));

// TOTAL
let total=data.length;

// USER MAP
let uMap={};
let lMap={};

data.forEach(d=>{
let hr=getHour(d.time);
if(hr===null) return;

let label=(hr%12||12)+(hr<12?"AM":"PM");

// USER
if(!uMap[d.user]) uMap[d.user]={};
uMap[d.user][label]=(uMap[d.user][label]||0)+1;

// LOCATION
if(!lMap[d.location]) lMap[d.location]={};
lMap[d.location][label]=(lMap[d.location][label]||0)+1;
});

// HOURS
let hours=[...Array(24).keys()].map(i=>(i%12||12)+(i<12?"AM":"PM"));

// TABLE BUILDER
function build(map,title){
let h="<tr><th>"+title+"</th>"+hours.map(x=>"<th>"+x+"</th>").join("")+"</tr>";
let b=Object.keys(map).map(k=>{
return "<tr><td>"+k+"</td>"+hours.map(x=>"<td>"+(map[k][x]||0)+"</td>").join("")+"</tr>";
}).join("");
return "<h3>"+title+"</h3><table>"+h+b+"</table>";
}

dash.innerHTML=`
<h3>Total: ${total}</h3>
${build(uMap,"User")}
${build(lMap,"Location")}
`;

});
});
}

</script>

</body>
</html>
