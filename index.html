<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS ULTRA FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:230px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;margin-bottom:6px;color:#888;cursor:pointer}
.nav.active{background:#111;color:#00d4ff}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
input,select{padding:10px;background:#000;border:1px solid #444;color:#fff}
button{padding:10px;background:#00d4ff;border:none;color:#000}
table{width:100%;margin-top:15px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #333;text-align:center}
th{color:#00d4ff}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" style="position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center">
<div style="background:#111;padding:30px">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID"><br><br>
<button onclick="login()">Login</button>
<p onclick="regBox.style.display='block'" style="cursor:pointer">Register</p>
<div id="regBox" style="display:none">
<input id="regName" placeholder="Name">
<input id="regId" placeholder="ID">
<button onclick="register()">Save</button>
</div>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName"></h3>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray Scan</h2>
<select id="loc"></select>
<input id="scanBox" placeholder="MT76921">

<table>
<thead><tr><th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th></tr></thead>
<tbody id="trayTable"></tbody>
</table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment</h2>
<select id="shipLoc">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox">

<table>
<thead><tr><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User</th></tr></thead>
<tbody id="shipTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>
<input id="fromDate"><input id="toDate">
<select id="typeFilter">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>
<input id="searchBox">
<button onclick="applyHistory()">Filter</button>
<button onclick="exportHistory()">Export</button>
<button onclick="deleteHistory()">Delete</button>

<table>
<thead><tr><th>Type</th><th>Date</th><th>ID</th><th>Location</th><th>User</th></tr></thead>
<tbody id="historyTable"></tbody>
</table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<h2>Dashboard</h2>
<div id="dashContent"></div>
</div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// LOCATIONS
const locations=["ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION"];
loc.innerHTML=locations.map(x=>`<option>${x}</option>`).join('');

// LOGIN
let user={}
function login(){
let id=loginId.value.trim();
if(!id) return alert("Enter ID");

db.ref('Users/'+id).once('value',s=>{
if(s.exists()){
user.name=s.val().name;
user.id=id;
auth.style.display='none';
sidebar.style.display='block';
main.style.display='block';
userName.innerText=user.name+" ("+id+")";
startRealtime();
}else alert("User not found");
});
}

function register(){db.ref('Users/'+regId.value).set({name:regName.value})}
function logout(){location.reload()}

// TAB
function openTab(t,el){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');
el.classList.add('active');

if(t==='history') loadHistory();
if(t==='dashboard') loadDashboard();
}

// REALTIME
function startRealtime(){

db.ref('LiveScans').on('value',s=>{
let arr=[];s.forEach(c=>arr.push(c.val()));
trayTable.innerHTML=arr.reverse().map(x=>`
<tr><td>${x.date}</td><td>${x.time}</td><td>${x.barcode}</td><td>${x.location}</td><td>${x.user}</td></tr>`).join('');
});

db.ref('ShipmentScans').on('value',s=>{
let arr=[];s.forEach(c=>arr.push(c.val()));
shipTable.innerHTML=arr.reverse().map(x=>`
<tr><td>${x.date}</td><td>${x.time}</td><td>${x.shipId}</td><td>${x.location}</td><td>${x.user}</td></tr>`).join('');
});

}

// SCAN
scanBox.onkeydown=e=>{
if(e.key==='Enter'){
db.ref('LiveScans').push({
barcode:scanBox.value,
location:loc.value,
date:new Date().toLocaleDateString('en-GB'),
time:new Date().toLocaleTimeString(),
user:user.name,
timestamp:Date.now()
});
scanBox.value="";
}
};

shipBox.onkeydown=e=>{
if(e.key==='Enter'){
db.ref('ShipmentScans').push({
shipId:shipBox.value,
location:shipLoc.value,
date:new Date().toLocaleDateString('en-GB'),
time:new Date().toLocaleTimeString(),
user:user.name,
timestamp:Date.now()
});
shipBox.value="";
}
};

// HISTORY
let hist=[]
function loadHistory(){
hist=[];
db.ref('LiveScans').once('value',s=>{
s.forEach(c=>hist.push({...c.val(),type:'TRAY',key:c.key,path:'LiveScans'}));
db.ref('ShipmentScans').once('value',s2=>{
s2.forEach(c=>hist.push({...c.val(),type:'SHIPMENT',key:c.key,path:'ShipmentScans'}));
renderHistory(hist);
});
});
}

function renderHistory(d){
historyTable.innerHTML=d.map(x=>`
<tr><td>${x.type}</td><td>${x.date}</td><td>${x.barcode||x.shipId}</td><td>${x.location}</td><td>${x.user}</td></tr>`).join('');
}

function applyHistory(){renderHistory(hist)}

function exportHistory(){
let csv="Type,Date,ID,Location,User\n";
hist.forEach(x=>csv+=`${x.type},${x.date},${x.barcode||x.shipId},${x.location},${x.user}\n`);
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv]));
a.download="history.csv";a.click();
}

function deleteHistory(){
if(!confirm("Delete ALL history?")) return;
hist.forEach(x=>db.ref(x.path+"/"+x.key).remove());
alert("Deleted");
}

// DASHBOARD
function loadDashboard(){

db.ref('LiveScans').once('value',s=>{
let data=[];
s.forEach(c=>data.push(c.val()));

let hours=[...Array(24).keys()].map(i=>(i%12||12)+(i<12?'AM':'PM'));

// USER MATRIX
let uMatrix={};
let lMatrix={};

data.forEach(x=>{
let hr=parseInt(x.time.split(':')[0]);
let label=(hr%12||12)+(hr<12?'AM':'PM');

// USER
if(!uMatrix[x.user]) uMatrix[x.user]={};
uMatrix[x.user][label]=(uMatrix[x.user][label]||0)+1;

// LOCATION
if(!lMatrix[x.location]) lMatrix[x.location]={};
lMatrix[x.location][label]=(lMatrix[x.location][label]||0)+1;

});

// BUILD TABLE
function buildTable(matrix,title){
let header="<tr><th>"+title+"</th>"+hours.map(h=>`<th>${h}</th>`).join('')+"</tr>";
let body=Object.keys(matrix).map(k=>`
<tr><td>${k}</td>${hours.map(h=>`<td>${matrix[k][h]||0}</td>`).join('')}</tr>`).join('');
return `<h3>${title}</h3><table><thead>${header}</thead><tbody>${body}</tbody></table>`;
}

dashContent.innerHTML=`
<h3>Total: ${data.length}</h3>
${buildTable(uMatrix,"User")}
${buildTable(lMatrix,"Location")}
`;

});
}

</script>

</body>
</html>
