<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS FINAL FIXED</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:230px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;color:#888;cursor:pointer}
.nav.active{color:#00d4ff}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
input,select{padding:8px;margin:5px;background:#000;color:#fff;border:1px solid #444}
button{padding:8px;background:#00d4ff;border:none;margin:5px}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;text-align:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" style="position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center">
<div style="background:#111;padding:20px">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
</div>
</div>

<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName"></h3>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray Scan</h2>
<select id="loc"></select>
<input id="trayBox" placeholder="MT76921">
<table id="trayTable"></table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment</h2>
<select id="shipLoc">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox">
<table id="shipTable"></table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>
<input type="date" id="fromDate">
<input type="date" id="toDate">
<select id="typeFilter">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIP">SHIPMENT</option>
</select>
<input id="searchBox">
<button onclick="applyHistory()">Filter</button>
<button onclick="exportHistory()">Export</button>
<button onclick="deleteHistory()">Delete</button>
<table id="historyTable"></table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<h2>Dashboard</h2>
<input type="date" id="dFrom">
<input type="date" id="dTo">
<select id="dType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIP">SHIPMENT</option>
</select>

<select id="dLoc" multiple style="height:120px"></select>

<button onclick="applyDashboard()">Apply</button>
<button onclick="exportDashboard()">Export</button>

<div id="dash"></div>
</div>

</div>

<script>

// 🔥 FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// 🔥 FULL LOCATION LIST
const LOCATIONS = [
"ICU ENTRY","MEI ENTRY","OMT ENTRY",
"LO SEND TO ICU","LO SEND TO MEI",
"ORDER SEND TO MAIN LINE FOR FT",
"ORDER SEND TO MAIN LINE FOR QC",
"ORDER SEND TO MAIN LINE FOR PACKING",
"TLP SEND TO MEI","QC FAIL SEND TO MEI",
"FRAME QC FAIL SEND TO MAIN LINE",
"SEND TO MEI FOR REVIEW","CS LOCATION",
"SMALL DIA LOCATION","LO QC FAIL LOCATION (JIT)",
"OMT RACK 00","OMT RACK 01","OMT RACK 02","OMT RACK 03","OMT RACK 04",
"OMT RACK 05","OMT RACK 06","OMT RACK 07","OMT RACK 08","OMT RACK 09",
"ICU TROLLEY 1","ICU TROLLEY 2","ICU TROLLEY 3","ICU TROLLEY 4","ICU TROLLEY 5",
"ICU TROLLEY 6","ICU TROLLEY 7","ICU TROLLEY 8","ICU TROLLEY 9","ICU TROLLEY 10",
"OMT TROLLEY 1","OMT TROLLEY 2","OMT TROLLEY 3","OMT TROLLEY 4","OMT TROLLEY 5",
"OMT TROLLEY 6","OMT TROLLEY 7","OMT TROLLEY 8","OMT TROLLEY 9","OMT TROLLEY 10"
];

// 🔥 LOAD LOCATIONS
loc.innerHTML = LOCATIONS.map(l=>`<option>${l}</option>`).join('');
dLoc.innerHTML = LOCATIONS.map(l=>`<option>${l}</option>`).join('');

// LOGIN
let user={}
function login(){
let id=loginId.value.trim();
db.ref("Users/"+id).once("value",s=>{
if(!s.exists()) return alert("User not found");
user.name=s.val().name; user.id=id;
auth.style.display="none";
sidebar.style.display="block";
main.style.display="block";
userName.innerText=user.name+" ("+id+")";
startRealtime();
});
}

// बाकी code same रहेगा (realtime, history, dashboard पहले जैसा काम करेगा)

</script>

</body>
</html>
