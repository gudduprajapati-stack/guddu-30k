<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS Ultimate System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<!-- Calendar -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff;display:flex}
#auth{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center}
.card{background:#161616;padding:30px;border-radius:10px;width:300px;text-align:center}
input,select{padding:10px;background:#000;border:1px solid #444;color:#fff}
button{padding:10px;background:#00d4ff;border:none;color:#000;font-weight:bold;margin:5px}
.sidebar{width:220px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;cursor:pointer;color:#888}
.nav.active{color:#00d4ff;background:#111}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #333;text-align:center}
th{color:#00d4ff}
.cardBox{background:#161616;padding:20px;border-radius:10px;flex:1;text-align:center}
.cardBox p{font-size:28px;color:#00d4ff;margin:0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<div class="card">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="toggle(true)">New Registration</p>

<div id="regBox" style="display:none">
<input id="regName" placeholder="Name">
<input id="regId" placeholder="ID">
<button onclick="register()">Register</button>
</div>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName"></h3>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray Scan</h2>
<div class="row">
<select id="loc"></select>
<input id="scanBox" placeholder="MT12345" maxlength="7">
</div>
<table><tbody id="trayTable"></tbody></table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment</h2>
<div class="row">
<select id="shipLoc">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER</option>
</select>
<input id="shipBox" placeholder="Min 23 digit">
</div>
<table><tbody id="shipTable"></tbody></table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>
<div class="row">
<input id="fromDate"><input id="toDate">
<select id="typeFilter"><option>ALL</option><option>TRAY</option><option>SHIPMENT</option></select>
<input id="searchBox">
<button onclick="applyHistory()">Filter</button>
<button onclick="exportCSV()">Export</button>
<button onclick="deleteData()">Delete</button>
</div>
<table><tbody id="historyTable"></tbody></table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<h2>Dashboard</h2>

<div class="row">
<input id="dFrom"><input id="dTo">
<select id="dType"><option>ALL</option><option>TRAY</option><option>SHIPMENT</option></select>
<select id="dLoc" multiple size="5"></select>
<button onclick="applyDashboard()">Apply</button>
</div>

<div class="row">
<div class="cardBox"><h3>Total</h3><p id="dTotal">0</p></div>
</div>

<h3>Hour Wise</h3>
<table>
<thead id="hourHead"></thead>
<tbody id="hourBody"></tbody>
</table>

<h3>User Wise</h3>
<table>
<tbody id="userBody"></tbody>
</table>

</div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

let user={},historyData=[],dashData=[];

// LOCATIONS
const locations=[ "ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION","OMT RACK 01","ICU TROLLEY 1","OMT TROLLEY 1" ];
loc.innerHTML=locations.map(x=>`<option>${x}</option>`).join('');

// CALENDAR
flatpickr("#fromDate",{dateFormat:"d/m/Y"});
flatpickr("#toDate",{dateFormat:"d/m/Y"});
flatpickr("#dFrom",{dateFormat:"d/m/Y"});
flatpickr("#dTo",{dateFormat:"d/m/Y"});

// LOGIN
function login(){
db.ref('Users/'+loginId.value).once('value',s=>{
if(s.exists()){
user.id=loginId.value;user.name=s.val().name;
auth.style.display='none';sidebar.style.display='block';main.style.display='block';
userName.innerText=user.name;
startTray();startShip();
}else alert("User not found");
});
}
function register(){db.ref('Users/'+regId.value).set({name:regName.value});}
function toggle(v){regBox.style.display=v?'block':'none';}
function logout(){location.reload();}

function openTab(t,el){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');el.classList.add('active');
if(t==='history') loadHistory();
if(t==='dashboard') loadDashboard();
}

// TRAY
scanBox.onkeydown=e=>{
if(e.key==='Enter'){
db.ref('LiveScans').push({
barcode:scanBox.value,location:loc.value,date:new Date().toLocaleDateString(),
time:new Date().toLocaleTimeString(),user:user.name,userId:user.id,timestamp:Date.now()
});
scanBox.value="";
}
};

function startTray(){
db.ref('LiveScans').on('value',s=>{
let html="";
s.forEach(c=>{
let d=c.val();
html+=`<tr><td>${d.date}</td><td>${d.barcode}</td><td>${d.location}</td></tr>`;
});
trayTable.innerHTML=html;
});
}

// SHIP
shipBox.onkeydown=e=>{
if(e.key==='Enter'){
db.ref('ShipmentScans').push({
shipId:shipBox.value,location:shipLoc.value,date:new Date().toLocaleDateString(),
time:new Date().toLocaleTimeString(),user:user.name,userId:user.id
});
shipBox.value="";
}
};

function startShip(){
db.ref('ShipmentScans').on('value',s=>{
let html="";
s.forEach(c=>{
let d=c.val();
html+=`<tr><td>${d.date}</td><td>${d.shipId}</td><td>${d.location}</td></tr>`;
});
shipTable.innerHTML=html;
});
}

// HISTORY
function loadHistory(){
historyData=[];
db.ref('LiveScans').once('value',s=>{
s.forEach(c=>historyData.push({...c.val(),type:'TRAY'}));
db.ref('ShipmentScans').once('value',s2=>{
s2.forEach(c=>historyData.push({...c.val(),type:'SHIPMENT'}));
renderHistory(historyData);
});
});
}

function renderHistory(d){
historyTable.innerHTML=d.map(x=>`<tr><td>${x.type}</td><td>${x.date}</td><td>${x.user}</td></tr>`).join('');
}

function applyHistory(){renderHistory(historyData);}
function exportCSV(){}
function deleteData(){}

// DASHBOARD
function loadDashboard(){
dashData=[];
db.ref('LiveScans').once('value',s=>{
s.forEach(c=>dashData.push({...c.val(),type:'TRAY'}));
db.ref('ShipmentScans').once('value',s2=>{
s2.forEach(c=>dashData.push({...c.val(),type:'SHIPMENT'}));

// fill locations
let set=new Set(dashData.map(x=>x.location));
dLoc.innerHTML=[...set].map(x=>`<option>${x}</option>`).join('');

applyDashboard();
});
});
}

function applyDashboard(){
let data=dashData;
dTotal.innerText=data.length;

// USER
let map={};
data.forEach(x=>map[x.user]=(map[x.user]||0)+1);
userBody.innerHTML=Object.keys(map).map(u=>`<tr><td>${u}</td><td>${map[u]}</td></tr>`).join('');
}

</script>

</body>
</html>
