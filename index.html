<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS Master 30K - Shipment Search</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --success: #27ae60; --bg: #f0f2f5; --ship: #8e44ad; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        nav { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding: 5px; background: white; border-radius: 10px; position: sticky; top: 0; }
        nav button { flex: 1; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .active-btn { background: var(--primary) !important; color: white !important; }
        .ship-btn-active { background: var(--ship) !important; color: white !important; }
        input, select, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .scan-box { border: 3px dashed var(--ship); padding: 20px; border-radius: 15px; background: #fdf2ff; margin: 15px 0; text-align: center; }
        
        /* Search Result Styling */
        .search-result-card { background: #e3f2fd; border-left: 10px solid #2196f3; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
        .result-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .table-wrap { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; max-height: 300px; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; font-size: 13px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: center; }
        th { background: #f4f4f4; position: sticky; top: 0; }
        .error-box { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; display: none; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="authPage" class="card" style="max-width: 400px; margin: 50px auto;">
    <h2 style="text-align:center; color: var(--primary);">NexS-Guddu-30k</h2>
    <input type="text" id="loginId" placeholder="Employee ID">
    <button class="btn-action" onclick="login()">LOGIN</button>
</div>

<div id="mainApp" style="display:none">
    <nav>
        <button id="b-scan" onclick="showTab('scan')">ENTRY</button>
        <button id="b-ship" onclick="showTab('ship')">SHIPMENT ENTRY</button>
        <button id="b-matrix" onclick="showTab('matrix')">MATRIX</button>
        <button id="b-history" onclick="showTab('history')">HISTORY</button>
    </nav>

    <div id="tab-scan" class="tab-content">
        <div class="card" style="text-align:center">
            <h3>MAIN ENTRY (7 DIGIT)</h3>
            <select id="locSelect"></select>
            <div class="scan-box" style="border-color:var(--primary); background:#f8f9ff">
                <input type="text" id="barcodeInput" placeholder="SCAN 7 DIGIT..." style="height:50px; font-size:20px; text-align:center; border:none; background:transparent;">
            </div>
            <div id="scanError" class="error-box"></div>
        </div>
    </div>

    <div id="tab-ship" class="tab-content" style="display:none">
        <div class="card" style="border-top: 5px solid var(--ship);">
            <h3 style="color:var(--ship); text-align:center; margin-bottom:5px;">📦 SHIPMENT PANEL</h3>
            
            <div style="background:#fff3e0; padding:10px; border-radius:10px; border:1px solid #ffb74d;">
                <b style="color:#e65100; font-size:12px;">🔍 QUICK SEARCH / VERIFY ANY SHIPMENT</b>
                <input type="text" id="masterSearchInput" placeholder="Scan Barcode to Check Record..." 
                       onkeypress="if(e.key==='Enter') masterSearch(this.value)" 
                       style="background:white; border:2px solid #ffb74d; height:45px;">
                
                <div id="searchResult" class="search-result-card">
                    <div style="font-weight:bold; color:#1565c0; margin-bottom:8px;">✅ RECORD FOUND:</div>
                    <div class="result-row"><span>Barcode:</span> <b id="resBc"></b></div>
                    <div class="result-row"><span>Location:</span> <b id="resLoc"></b></div>
                    <div class="result-row"><span>Scan Date:</span> <b id="resDate"></b></div>
                    <div class="result-row"><span>Scan Time:</span> <b id="resTime"></b></div>
                    <div class="result-row"><span>Scanned By:</span> <b id="resBy"></b></div>
                    <button onclick="closeSearch()" style="background:#999; color:white; padding:5px; margin-top:10px; height:35px; font-size:12px;">CLOSE</button>
                </div>
                <div id="searchError" class="error-box" style="margin-top:10px;">❌ Record Not Found!</div>
            </div>

            <hr style="margin:20px 0; opacity:0.2;">

            <select id="shipLocSelect" style="border: 2px solid var(--ship); font-weight:bold;">
                <option value="DHL SHIPMENT">1. DHL SHIPMENT</option>
                <option value="GP SUPPLY & SREERAJ">2. GP SUPPLY & SREERAJ</option>
                <option value="OTHER SHIPMENT">3. OTHER SHIPMENT</option>
            </select>

            <div class="scan-box">
                <div style="font-weight:bold; color:#8e44ad; font-size:12px;">NEW ENTRY (MAX 23 DIGIT)</div>
                <input type="text" id="ship23Input" placeholder="SCAN TO SAVE..." style="height:60px; font-size:24px; text-align:center; border:none; background:transparent;">
            </div>

            <h4 style="margin-bottom:5px; color:#555;">Recent Today</h4>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Time</th><th>Loc</th><th>Barcode</th></tr></thead>
                    <tbody id="shipMiniBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    </div>

<script>
    // --- Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        authDomain: "nexs-guddu-30k.firebaseapp.com",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        storageBucket: "nexs-guddu-30k.firebasestorage.app",
        messagingSenderId: "634684833271",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- Master Search Function ---
    function masterSearch(bc) {
        const query = bc.trim();
        if(!query) return;
        
        document.getElementById('searchResult').style.display = 'none';
        document.getElementById('searchError').style.display = 'none';

        // Search in shipments
        db.ref('shipments').orderByChild('bc').equalTo(query).once('value', s => {
            if(s.exists()) {
                const data = Object.values(s.val())[0]; // Get the most recent if multiple
                document.getElementById('resBc').innerText = data.bc;
                document.getElementById('resLoc').innerText = data.loc;
                document.getElementById('resDate').innerText = data.date;
                document.getElementById('resTime').innerText = data.time;
                document.getElementById('resBy').innerText = data.name + " (" + data.id + ")";
                
                document.getElementById('searchResult').style.display = 'block';
                document.getElementById('masterSearchInput').value = "";
            } else {
                document.getElementById('searchError').style.display = 'block';
                setTimeout(() => document.getElementById('searchError').style.display='none', 3000);
            }
        });
    }

    function closeSearch() { document.getElementById('searchResult').style.display = 'none'; }

    // --- Regular Scanning Logic ---
    document.getElementById('ship23Input').addEventListener('keypress', e => {
        if(e.key === 'Enter') {
            const bc = e.target.value.trim();
            if(bc.length > 0 && bc.length <= 23) {
                const now = new Date();
                const data = {
                    bc, loc: document.getElementById('shipLocSelect').value,
                    name: localStorage.getItem('uN'), id: localStorage.getItem('uI'),
                    date: now.toISOString().split('T')[0], time: now.toLocaleTimeString()
                };
                db.ref('shipments').push(data);
                e.target.value = "";
                loadMini();
            }
        }
    });

    // Handle Master Search Enter Key
    document.getElementById('masterSearchInput').addEventListener('keypress', e => {
        if(e.key === 'Enter') masterSearch(e.target.value);
    });

    function loadMini() {
        const today = new Date().toISOString().split('T')[0];
        db.ref('shipments').orderByChild('date').equalTo(today).limitToLast(10).on('value', s => {
            const data = s.val() ? Object.values(s.val()).reverse() : [];
            document.getElementById('shipMiniBody').innerHTML = data.map(x => `
                <tr><td>${x.time}</td><td>${x.loc}</td><td><b>${x.bc}</b></td></tr>
            `).join('');
        });
    }

    // --- Basic App Functions ---
    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn', 'ship-btn-active'));
        document.getElementById('tab-' + t).style.display = 'block';
        document.getElementById('b-' + t).classList.add(t === 'ship' ? 'ship-btn-active' : 'active-btn');
        if(t === 'ship') loadMini();
    }
    function login() { const id = document.getElementById('loginId').value.trim(); db.ref('users/'+id).once('value', s => { if(s.exists()){ localStorage.setItem('uN', s.val().name); localStorage.setItem('uI', s.val().id); location.reload(); } else alert("Invalid ID"); }); }
    window.onload = () => { if(localStorage.getItem('uI')){ document.getElementById('authPage').style.display='none'; document.getElementById('mainApp').style.display='block'; showTab('scan'); } };
</script>
</body>
</html>
