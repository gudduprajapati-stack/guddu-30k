<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - Final Master Fix v40.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #28a745; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .user-profile { background: #111; padding: 25px 20px; border-bottom: 1px solid #222; }
        .nav-item { padding: 12px 15px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; color: #888; transition: 0.2s; font-size: 14px; }
        .nav-item.active { background: #1a1a1a; color: var(--primary); border-left: 4px solid var(--primary); }
        .main-content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .scan-bar, .history-controls { display: flex; flex-wrap: wrap; gap: 15px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; align-items: flex-end; }
        .input-group { flex: 1; min-width: 140px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; outline: none; font-size: 14px; box-sizing: border-box; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .data-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #111; color: var(--primary); text-transform: uppercase; font-size: 11px; position: sticky; top: 0; }
        .btn { padding: 12px 18px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 12px; transition: 0.2s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-accent { background: var(--accent); color: #fff; }
        #authSection { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid #333; width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div id="authSection">
        <div class="auth-card" id="loginBox">
            <h2 style="color:var(--primary); margin-bottom: 25px;">NexS LOGIN</h2>
            <input type="text" id="loginId" placeholder="Employee ID">
            <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="handleLogin()">Login</button>
            <button class="btn" style="background:transparent; color:var(--primary); margin-top:10px;" onclick="showReg(true)">New Registration</button>
        </div>
        <div class="auth-card" id="regBox" style="display:none;">
            <h2 style="color:var(--primary); margin-bottom: 25px;">REGISTER</h2>
            <input type="text" id="regName" placeholder="Full Name" style="margin-bottom:10px;">
            <input type="text" id="regId" placeholder="Employee ID">
            <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="handleRegister()">Register Now</button>
            <button class="btn" style="background:transparent; color:var(--primary); margin-top:10px;" onclick="showReg(false)">Back</button>
        </div>
    </div>

    <div class="sidebar" id="mainSidebar" style="display:none;">
        <div class="user-profile"><h4 id="sideName" style="color:var(--primary); margin:0;">---</h4><small id="sideId" style="color:#888;">ID: ---</small></div>
        <div class="nav-list">
            <div class="nav-item active" onclick="switchTab('scanning', this)">📦 Scanning Page</div>
            <div class="nav-item" onclick="switchTab('shipment', this)">🚛 Shipment Page</div>
            <div class="nav-item" onclick="switchTab('history', this)">🕒 History Hub</div>
        </div>
        <div onclick="location.reload()" style="padding:15px; color:var(--danger); cursor:pointer; text-align:center; font-weight:bold; border-top:1px solid #222; margin-top: auto;">LOGOUT</div>
    </div>

    <div class="main-content" id="mainContent" style="display:none;">
        <h2 id="tabTitle">Operations Hub</h2>

        <div id="scanning" class="tab-content active">
            <div class="scan-bar">
                <div class="input-group"><label>Location</label><select id="locSelect"><option>ICU ENTRY</option><option>MEI ENTRY</option><option>OMT ENTRY</option></select></div>
                <div class="input-group"><label>Fast Scan</label><input type="text" id="trayInput" placeholder="Scan Tray..." autocomplete="off"></div>
            </div>
            <table class="data-table"><thead><tr><th>Date</th><th>Time</th><th>Barcode</th><th>Location</th><th>User (ID)</th></tr></thead><tbody id="scanLog"></tbody></table>
        </div>

        <div id="shipment" class="tab-content">
            <div class="scan-bar">
                <div class="input-group"><label>Shipment Loc</label><select id="shipLocSelect"><option>DHL SHIPMENT</option><option>GPSUPPLY</option><option>SREERAJXPRESS</option></select></div>
                <div class="input-group"><label>ID Scan</label><input type="text" id="shipInput" placeholder="Scan Max 23 digit..." maxlength="23" autocomplete="off"></div>
            </div>
            <table class="data-table"><thead><tr><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User (ID)</th></tr></thead><tbody id="shipLog"></tbody></table>
        </div>

        <div id="history" class="tab-content">
            <div class="history-controls">
                <div class="input-group"><label>From Date</label><input type="date" id="fromDate"></div>
                <div class="input-group"><label>To Date</label><input type="date" id="toDate"></div>
                <div class="input-group"><label>Type</label><select id="typeFilter"><option value="ALL">ALL DATA</option><option value="TRAY">TRAYS</option><option value="SHIPMENT">SHIPMENTS</option></select></div>
                <div class="input-group"><label>Search ID</label><input type="text" id="histSearch" placeholder="Search Barcode/User..."></div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="applyFilters()">Filter</button>
                    <button class="btn btn-accent" onclick="exportData()">Export</button>
                    <button class="btn btn-danger" onclick="bulkDelete()">Delete</button>
                </div>
            </div>
            <table class="data-table">
                <thead><tr><th>Type</th><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User (ID)</th></tr></thead>
                <tbody id="historyTableBody"></tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let loggedUser = { name: "Guest", id: "---" };
    let masterData = [];

    function showReg(v) { document.getElementById('loginBox').style.display = v ? 'none' : 'block'; document.getElementById('regBox').style.display = v ? 'block' : 'none'; }
    function handleRegister() {
        const n = document.getElementById('regName').value.trim();
        const i = document.getElementById('regId').value.trim();
        if(n && i) db.ref('Users/' + i).set({ name: n, empId: i }).then(() => { alert("Done!"); showReg(false); });
    }

    function handleLogin() {
        const id = document.getElementById('loginId').value.trim();
        db.ref('Users/' + id).once('value', snap => {
            if(snap.exists()) {
                const d = snap.val();
                loggedUser = { name: d.name, id: id };
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainSidebar').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('sideName').innerText = loggedUser.name;
                document.getElementById('sideId').innerText = "ID: " + id;
                startSync();
            } else { alert("ID not found!"); }
        });
    }

    function startSync() {
        db.ref('LiveScans').on('value', s1 => {
            db.ref('ShipmentScans').on('value', s2 => {
                masterData = [];
                s1.forEach(c => {
                    let d = c.val();
                    let uid = d.userId || d.empId || '';
                    masterData.push({
                        key: c.key, type: 'TRAY', 
                        dId: d.barcode || d.barcodeID || d.tray || '---', 
                        dDate: d.date || d.scanDate || '---', 
                        dTime: d.time || d.scanTime || '---', 
                        dLoc: d.location || d.locName || '---', 
                        dUser: (d.user || d.userName || '---') + (uid ? ` (${uid})` : ''),
                        timestamp: d.timestamp || 0, path: 'LiveScans'
                    });
                });
                s2.forEach(c => {
                    let d = c.val();
                    let uid = d.userId || d.empId || '';
                    masterData.push({
                        key: c.key, type: 'SHIPMENT', dId: d.shipId || '---', 
                        dDate: d.date || '---', dTime: d.time || '---', 
                        dLoc: d.location || '---', 
                        dUser: (d.user || d.userName || '---') + (uid ? ` (${uid})` : ''),
                        timestamp: d.timestamp || 0, path: 'ShipmentScans'
                    });
                });
                masterData.sort((a,b) => b.timestamp - a.timestamp);
                renderAll();
            });
        });
    }

    function renderAll() {
        const sLog = document.getElementById('scanLog');
        const shipLog = document.getElementById('shipLog');
        sLog.innerHTML = ""; shipLog.innerHTML = "";
        masterData.forEach(d => {
            let row = `<tr><td>${d.dDate}</td><td>${d.dTime}</td><td>${d.dId}</td><td>${d.dLoc}</td><td>${d.dUser}</td></tr>`;
            if(d.type === 'TRAY') sLog.innerHTML += row;
            if(d.type === 'SHIPMENT') shipLog.innerHTML += row;
        });
        applyFilters();
    }

    document.getElementById('trayInput').addEventListener('keydown', e => {
        if(e.key === 'Enter' && e.target.value) {
            db.ref('LiveScans').push({ barcode: e.target.value.toUpperCase().trim(), location: document.getElementById('locSelect').value, date: new Date().toLocaleDateString('en-GB'), time: new Date().toLocaleTimeString(), user: loggedUser.name, userId: loggedUser.id, timestamp: Date.now() });
            e.target.value = "";
        }
    });

    function applyFilters() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        const type = document.getElementById('typeFilter').value;
        const search = document.getElementById('histSearch').value.toUpperCase();

        const filtered = masterData.filter(d => {
            const parts = d.dDate.split('/');
            const dObj = new Date(parts[2], parts[1]-1, parts[0]);
            const mFrom = from ? dObj >= new Date(from) : true;
            const mTo = to ? dObj <= new Date(to) : true;
            const mType = type === 'ALL' ? true : d.type === type;
            const mSearch = d.dId.toUpperCase().includes(search) || d.dUser.toUpperCase().includes(search);
            return mFrom && mTo && mType && mSearch;
        });

        const histLog = document.getElementById('historyTableBody');
        histLog.innerHTML = "";
        filtered.forEach(d => {
            histLog.innerHTML += `<tr><td style="color:${d.type==='TRAY'?'#00d4ff':'#28a745'}">${d.type}</td><td>${d.dDate}</td><td>${d.dTime}</td><td>${d.dId}</td><td>${d.dLoc}</td><td>${d.dUser}</td></tr>`;
        });
    }

    function exportData() {
        let csv = "Type,Date,Time,ID,Location,User\n";
        masterData.forEach(d => csv += `${d.type},${d.date},${d.time},${d.dId},${d.location},${d.user}\n`);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        a.download = "NexS_Report.csv";
        a.click();
    }

    function bulkDelete() {
        const from = document.getElementById('fromDate').value;
        const to = document.getElementById('toDate').value;
        if(!from || !to) return alert("Select range!");
        if(confirm("Permanently delete range?")) {
            masterData.forEach(d => {
                const parts = d.dDate.split('/');
                const dObj = new Date(parts[2], parts[1]-1, parts[0]);
                if(dObj >= new Date(from) && dObj <= new Date(to)) db.ref(`${d.path}/${d.key}`).remove();
            });
            alert("Deleted!");
        }
    }

    function switchTab(t, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        el.classList.add('active');
        if(t === 'scanning') document.getElementById('trayInput').focus();
    }
</script>
</body>
</html>
