<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS Tracking System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #161616; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        /* Login Page */
        #loginPage { width: 350px; padding: 40px; background: var(--card); border-radius: 15px; margin-top: 80px; height: fit-content; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #008fb3; }

        /* Tracker Dashboard */
        #dashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 25px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border-left: 5px solid #444; position: relative; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; background: #555; margin-right: 5px; }
        
        select { width: 100%; padding: 8px; background: #000; color: white; border: 1px solid #333; margin-top: 10px; border-radius: 4px; }
        .active-card { border-left-color: var(--primary); }
    </style>
</head>
<body>

    <div id="loginPage">
        <h2 style="color:var(--primary)">NexS LOGIN</h2>
        <p style="font-size: 12px; color: #888;">Enter User ID (e.g., NexS-Guddu-30k)</p>
        <input type="text" id="userId" placeholder="Employee ID">
        <input type="password" id="userPass" placeholder="Password (default: 1234)">
        <button class="btn" onclick="handleLogin()">Login to Dashboard</button>
        <p id="err" style="color:red; font-size:12px; display:none;">Invalid Credentials!</p>
    </div>

    <div id="dashboard">
        <div class="header">
            <div>
                <h2 id="welcomeMsg" style="margin:0;">Welcome</h2>
                <small id="displayId" style="color:var(--primary)"></small>
            </div>
            <button onclick="location.reload()" style="background:none; color:#ff4444; border:1px solid #ff4444; padding:5px 10px; cursor:pointer; border-radius:4px;">Logout</button>
        </div>

        <div class="grid" id="locationGrid"></div>

        <div style="margin-top: 40px; text-align: center;">
            <button class="btn" style="width: 250px; font-size: 16px;" onclick="syncToFirebase()">SYNC TO FIREBASE</button>
        </div>
    </div>

<script>
    // 1. Firebase Configuration (Apni details yahan replace karein)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let currentUser = "";

    // 2. Login Logic
    function handleLogin() {
        const id = document.getElementById('userId').value;
        const pass = document.getElementById('userPass').value;

        if (id && pass === "1234") {
            currentUser = id;
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('displayId').innerText = "Active User: " + id;
            initGrid();
            fetchFromFirebase();
        } else {
            document.getElementById('err').style.display = 'block';
        }
    }

    // 3. Grid Generation (21 Locations)
    function initGrid() {
        const grid = document.getElementById('locationGrid');
        for (let i = 1; i <= 21; i++) {
            grid.innerHTML += `
                <div class="card" id="card-${i}">
                    <span class="id-label" style="font-size:10px; color:#666;">ID: LOC-${i.toString().padStart(2, '0')}</span>
                    <div style="margin:5px 0; font-weight:bold;">Location ${i}</div>
                    <select id="status-${i}" onchange="updateUI(${i})">
                        <option value="Pending">Pending</option>
                        <option value="Scanning">Scanning</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>`;
        }
    }

    function updateUI(id) {
        const val = document.getElementById(`status-${id}`).value;
        const card = document.getElementById(`card-${id}`);
        card.style.borderLeftColor = (val === "Completed") ? "#00ff88" : (val === "Scanning" ? "#00d4ff" : "#444");
    }

    // 4. Firebase Sync (Guddu's Data Push)
    function syncToFirebase() {
        let updates = {};
        for(let i=1; i<=21; i++) {
            updates[`Loc_${i}`] = document.getElementById(`status-${i}`).value;
        }
        updates['timestamp'] = new Date().toLocaleString();
        updates['user'] = currentUser;

        // User ke unique ID ke andar data save hoga
        db.ref('NexS_Tracker/' + currentUser).set(updates)
          .then(() => alert("Data Cloud par save ho gaya!"))
          .catch(e => alert("Error: " + e.message));
    }

    // Real-time data fetch
    function fetchFromFirebase() {
        db.ref('NexS_Tracker/' + currentUser).on('value', (snap) => {
            const data = snap.val();
            if(data) {
                for(let i=1; i<=21; i++) {
                    if(data[`Loc_${i}`]) {
                        document.getElementById(`status-${i}`).value = data[`Loc_${i}`];
                        updateUI(i);
                    }
                }
            }
        });
    }
</script>

</body>
</html>
