<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexS Final System v1</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
:root { --primary:#00d4ff; --bg:#0a0a0a; --card:#161616; --text:#fff; }
body{background:var(--bg);color:#fff;font-family:sans-serif;margin:0;display:flex}

.sidebar{width:240px;background:#000;height:100vh;padding:20px}
.main{flex:1;padding:20px}

input,select{padding:10px;background:#000;border:1px solid #444;color:#fff;width:100%;margin-bottom:10px}
table{width:100%;border-collapse:collapse;margin-top:20px}
td,th{padding:10px;border-bottom:1px solid #333}

.highlight{background:#003300}
</style>
</head>

<body>

<div class="sidebar">
<h3 id="userName">---</h3>
<button onclick="showTab('scan')">Scan</button>
<button onclick="showTab('history')">History</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="loginId" placeholder="Enter Employee ID">
<button onclick="login()">Login</button>
</div>

<!-- SCAN PAGE -->
<div id="scanPage" style="display:none">

<h3>Scan Tray</h3>

<select id="loc">
<option>ICU ENTRY</option>
<option>MEI ENTRY</option>
<option>OMT ENTRY</option>
<option>CS LOCATION</option>
</select>

<input id="scanBox" placeholder="Scan barcode">

<h3>Location Tracking</h3>

<select id="locFilter" onchange="renderLocation()">
<option value="ALL">ALL</option>
<option>ICU ENTRY</option>
<option>MEI ENTRY</option>
<option>OMT ENTRY</option>
<option>CS LOCATION</option>
</select>

<input id="count" disabled placeholder="Total Count">

<table>
<thead><tr><th>Time</th><th>Barcode</th><th>Location</th></tr></thead>
<tbody id="locTable"></tbody>
</table>

</div>

<!-- HISTORY -->
<div id="historyPage" style="display:none">
<h3>History</h3>
<button onclick="exportData()">Export CSV</button>

<table>
<thead><tr><th>ID</th><th>Location</th><th>Time</th></tr></thead>
<tbody id="history"></tbody>
</table>

</div>

</div>

<script>

// 🔥 YOUR FIREBASE CONFIG
firebase.initializeApp({
apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
authDomain: "nexs-guddu-30k.firebaseapp.com",
databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
projectId: "nexs-guddu-30k",
storageBucket: "nexs-guddu-30k.firebasestorage.app",
messagingSenderId: "634684833271",
appId: "1:634684833271:web:31a25a2c5301fa108142f2"
});

const db = firebase.database();

let user = {id:"",name:""};
let masterData=[];

// LOGIN
function login(){
const id=document.getElementById('loginId').value.trim();

if(!id) return alert("Enter ID");

db.ref('Users/'+id).once('value',snap=>{
if(snap.exists()){
user.id=id;
user.name=snap.val().name;

document.getElementById('userName').innerText=user.name;

document.getElementById('login').style.display='none';
document.getElementById('scanPage').style.display='block';

startSync();

}else{
alert("ID not found");
}
});
}

// LOGOUT
function logout(){
location.reload();
}

// 🔥 CLEAN SYNC (NO DUPLICATE ISSUE)
function startSync(){
['LiveScans','ShipmentScans'].forEach(p=>{
db.ref(p).on('value',snap=>{

// remove old data of that path
masterData = masterData.filter(d=>d.path!==p);

snap.forEach(c=>{
let d=c.val();

masterData.push({
path:p,
type:p.includes('Ship')?'SHIP':'TRAY',
id:d.barcode||d.shipId||'---',
loc:d.location||'---',
time:d.time||'---',
date:d.date||'---',
ts:d.timestamp||0
});
});

masterData.sort((a,b)=>b.ts-a.ts);

renderLocation();
renderHistory();

});
});
}

// SCAN INPUT
document.getElementById('scanBox').addEventListener('keydown',e=>{
if(e.key==='Enter'){

let val=e.target.value.toUpperCase().trim();

if(!val){
beep(200);
alert("Empty Scan!");
return;
}

db.ref('LiveScans').push({
barcode:val,
location:document.getElementById('loc').value,
date:new Date().toLocaleDateString('en-GB'),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});

beep(800);

e.target.value="";
}
});

// 🔊 SOUND
function beep(freq){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
osc.frequency.value=freq;
osc.connect(ctx.destination);
osc.start();
setTimeout(()=>osc.stop(),100);
}

// 📍 LOCATION TRACKING
function renderLocation(){
let filter=document.getElementById('locFilter').value;
let table=document.getElementById('locTable');
let count=0;

table.innerHTML="";

let filtered = masterData.filter(d=>d.type==='TRAY');

if(filter!=='ALL'){
filtered = filtered.filter(d=>d.loc===filter);
}

filtered.forEach((d,i)=>{
count++;
table.innerHTML+=`
<tr class="${i===0?'highlight':''}">
<td>${d.time}</td>
<td>${d.id}</td>
<td>${d.loc}</td>
</tr>`;
});

document.getElementById('count').value="Total: "+count;
}

// 🕒 HISTORY
function renderHistory(){
let table=document.getElementById('history');
table.innerHTML="";

masterData.forEach(d=>{
table.innerHTML+=`
<tr>
<td>${d.id}</td>
<td>${d.loc}</td>
<td>${d.time}</td>
</tr>`;
});
}

// 📤 EXPORT CSV
function exportData(){
let csv="ID,Location,Time\n";

masterData.forEach(d=>{
csv+=`${d.id},${d.loc},${d.time}\n`;
});

let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv]));
a.download="NexS_Report.csv";
a.click();
}

// TAB SWITCH
function showTab(t){
document.getElementById('scanPage').style.display = t==='scan'?'block':'none';
document.getElementById('historyPage').style.display = t==='history'?'block':'none';
}

// ⚡ AUTO FOCUS SCANNER
setInterval(()=>{
document.getElementById('scanBox')?.focus();
},500);

</script>

</body>
</html>
