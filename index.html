<!-- 🔥 NEXS ULTRA FINAL STABLE VERSION -->
<!-- 🔥 FILTER DROPDOWN FIXED -->
<!-- 🔥 DASHBOARD INCLUDED -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexS ULTRA FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
overflow:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100vh;
background:#000;
border-right:1px solid #222;
padding-top:20px;
overflow:auto;
z-index:1000;
}

.logo{
text-align:center;
font-size:24px;
font-weight:bold;
color:#00d4ff;
margin-bottom:10px;
}

#loginUserInfo{
margin:10px;
padding:10px;
background:#111;
border:1px solid #222;
border-radius:8px;
line-height:1.7;
font-size:13px;
}

.nav-btn{
padding:15px 20px;
cursor:pointer;
border-left:4px solid transparent;
transition:.2s;
}

.nav-btn:hover{
background:#111;
}

.nav-btn.active{
background:#111;
border-left:4px solid #00d4ff;
color:#00d4ff;
}

.main{
margin-left:240px;
height:100vh;
overflow:auto;
padding:20px;
position:relative;
z-index:1;
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
margin-bottom:20px;
overflow:auto;
position:relative;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

input,select,button{
padding:11px;
border:none;
outline:none;
border-radius:6px;
font-size:14px;
}

input,select{
background:#000;
color:#fff;
border:1px solid #333;
}

select{
min-width:180px;
appearance:none;
-webkit-appearance:none;
-moz-appearance:none;
cursor:pointer;
}

select:focus{
border:1px solid #00d4ff;
}

button{
background:#00d4ff;
color:#000;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
text-align:center;
font-size:13px;
white-space:nowrap;
}

th{
background:#000;
color:#00d4ff;
position:sticky;
top:0;
}

.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:350px;
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #333;
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:#00d4ff;
}

.login-box input{
width:100%;
margin-bottom:10px;
}

.login-box button{
width:100%;
margin-bottom:10px;
}

.small-link{
text-align:center;
font-size:13px;
color:#00d4ff;
cursor:pointer;
}

</style>

</head>

<body>

<div id="loginPage" class="login-page">

<div class="login-box">

<div id="loginBox">

<h2>NexS Login</h2>

<input type="text" id="loginId" placeholder="Employee ID">

<button onclick="login()">LOGIN</button>

<div class="small-link" onclick="showRegister()">
New Registration
</div>

</div>

<div id="registerBox" style="display:none;">

<h2>Registration</h2>

<input type="text" id="regName" placeholder="Full Name">
<input type="text" id="regId" placeholder="Employee ID">

<button onclick="register()">SAVE USER</button>

<div class="small-link" onclick="showLogin()">
Back To Login
</div>

</div>

</div>

</div>

<div id="app" style="display:none;">

<div class="sidebar">

<div class="logo">NexS</div>

<div id="loginUserInfo"></div>

<div class="nav-btn active" onclick="openTab('tray',this)">
📦 Tray
</div>

<div class="nav-btn" onclick="openTab('shipment',this)">
🚛 Shipment
</div>

<div class="nav-btn" onclick="openTab('history',this)">
🕒 History
</div>

<div class="nav-btn" onclick="openTab('dashboard',this)">
📊 Dashboard
</div>

<div class="nav-btn" onclick="logout()">
🚪 Logout
</div>

</div>

<div class="main">

<!-- TRAY -->

<div id="tray" class="tab active">

<div class="card">

<div class="row">

<select id="trayLocation"></select>

<input type="text" id="trayInput" placeholder="Tray Scan">

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Tray</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="trayTable"></tbody>

</table>

</div>

</div>

<!-- SHIPMENT -->

<div id="shipment" class="tab">

<div class="card">

<div class="row">

<select id="shipmentAgency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>

<input type="text" id="shipmentInput" placeholder="Shipment Max 23">

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Shipment</th>
<th>Agency</th>
<th>User</th>
</tr>
</thead>

<tbody id="shipmentTable"></tbody>

</table>

</div>

</div>

<!-- HISTORY -->

<div id="history" class="tab">

<div class="card">

<div class="row">

<input type="date" id="fromDate">
<input type="date" id="toDate">

<select id="historyType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<input type="text" id="historySearch" placeholder="Search">

<button onclick="applyHistory()">Filter</button>

<button onclick="exportHistory()">Export CSV</button>

<button onclick="deleteHistory()">Delete</button>

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tab">

<div class="card">

<div class="row">

<input type="date" id="dashFrom">
<input type="date" id="dashTo">

<select id="dashType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<button onclick="renderDashboard()">
Apply Filter
</button>

</div>

</div>

<div class="card">

<div class="row">

<h3>📦 Location Hourly Productivity</h3>

<button onclick="exportTable('locationHourlyTable')">
Export CSV
</button>

</div>

<table id="locationHourlyTable"></table>

</div>

<div class="card">

<div class="row">

<h3>👤 Person Wise Productivity</h3>

<button onclick="exportTable('personWiseTable')">
Export CSV
</button>

</div>

<table id="personWiseTable"></table>

</div>

<div class="card">

<div class="row">

<h3>⏱ Person + Hourly Productivity</h3>

<button onclick="exportTable('personHourlyTable')">
Export CSV
</button>

</div>

<table id="personHourlyTable"></table>

</div>

</div>

</div>

</div>

<script>

firebase.initializeApp({
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
databaseURL:"YOUR_DATABASE_URL",
projectId:"YOUR_PROJECT_ID",
storageBucket:"YOUR_STORAGE_BUCKET",
messagingSenderId:"YOUR_SENDER_ID",
appId:"YOUR_APP_ID"
});

firebase.database().goOnline();

const db=firebase.database();

let currentUser={};
let trayData=[];
let shipmentData=[];
let allData=[];

const locations=[
"ICU ENTRY",
"MEI ENTRY",
"OMT ENTRY",
"LO SEND TO ICU",
"LO SEND TO MEI",
"ORDER SEND TO MAIN LINE FOR FT",
"ORDER SEND TO MAIN LINE FOR QC",
"ORDER SEND TO MAIN LINE FOR PACKING",
"TLP SEND TO MEI",
"QC FAIL SEND TO MEI",
"FRAME QC FAIL SEND TO MAIN LINE",
"SEND TO MEI FOR REVIEW",
"CS LOCATION",
"SMALL DIA LOCATION",
"LO QC FAIL LOCATION (JIT)",
...Array.from({length:10},(_,i)=>`OMT RACK ${String(i+1).padStart(2,"0")}`),
...Array.from({length:10},(_,i)=>`ICU TROLLEY ${i+1}`),
...Array.from({length:10},(_,i)=>`OMT TROLLEY ${i+1}`),
"ICU HOLD",
"MEI HOLD",
"PACKING HOLD",
"QC HOLD",
"DISPATCH HOLD"
];

locations.forEach(l=>{
trayLocation.innerHTML+=`<option>${l}</option>`;
});

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function register(){

const name=regName.value.trim();
const id=regId.value.trim();

if(!name || !id){
alert("Fill all fields");
return;
}

db.ref("Users/"+id).set({
name:name,
id:id
}).then(()=>{
alert("Registration Successful");
showLogin();
});

}

function login(){

const id=loginId.value.trim();

if(!id){
alert("Enter ID");
return;
}

db.ref("Users/"+id).once("value")
.then((snap)=>{

if(!snap.exists()){
alert("ID Not Found");
return;
}

const data=snap.val();

currentUser={
name:data.name || "Unknown",
id:id
};

loginUserInfo.innerHTML=`
<div><b>Name:</b> ${currentUser.name}</div>
<div><b>ID:</b> ${currentUser.id}</div>
`;

loginPage.style.display="none";
app.style.display="block";

startRealtime();

});

}

function logout(){
location.reload();
}

function openTab(id,el){

document.querySelectorAll(".tab")
.forEach(t=>{
t.classList.remove("active");
t.style.display="none";
});

const activeTab=document.getElementById(id);

activeTab.classList.add("active");
activeTab.style.display="block";

document.querySelectorAll(".nav-btn")
.forEach(n=>n.classList.remove("active"));

el.classList.add("active");

}

</script>

</body>
</html>
