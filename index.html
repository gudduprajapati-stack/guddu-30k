<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - New System</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .auth-container { width: 350px; padding: 40px; background: var(--card); border-radius: 15px; margin-top: 50px; height: fit-content; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .link-btn { color: var(--primary); background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; font-size: 14px; width: 100%; }
        
        /* Dashboard */
        #dashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border-top: 4px solid var(--primary); }
        select { width: 100%; padding: 8px; background: #000; color: white; border: 1px solid #444; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <h2 style="color:var(--primary)">NexS LOGIN</h2>
        <input type="text" id="loginId" placeholder="Enter Your ID">
        <button class="btn" onclick="loginUser()">Login</button>
        <button class="link-btn" onclick="toggleAuth(true)">Create New ID / Register</button>
        <p id="loginErr" style="color:#ff4444; font-size:12px; display:none; margin-top:10px;">⚠️ ID not found! Register First.</p>
    </div>

    <div id="registerPage" class="auth-container" style="display:none;">
        <h2 style="color:var(--primary)">NEW EMPLOYEE</h2>
        <input type="text" id="newName" placeholder="Enter Full Name">
        <input type="text" id="newId" placeholder="Create ID (e.g., 138663)">
        <button class="btn" style="background:#28a745; color:white;" onclick="registerUser()">Register ID</button>
        <button class="link-btn" onclick="toggleAuth(false)">Back to Login</button>
    </div>

    <div id="dashboard">
        <div class="header">
            <div>
                <h2 id="welcomeName" style="margin:0;">Dashboard</h2>
                <small id="welcomeId" style="color:var(--primary)"></small>
            </div>
            <button onclick="location.reload()" style="background:none; color:#ff4444; border:1px solid #ff4444; padding:5px 12px; cursor:pointer; border-radius:4px;">Logout</button>
        </div>
        <div class="grid" id="locGrid"></div>
        <button class="btn" style="width:250px; margin: 40px auto; display:block;" onclick="syncData()">SAVE TO CLOUD</button>
    </div>

<script>
    // --- FIREBASE CONFIG (Paste your settings here) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeUser = null;

    function toggleAuth(showReg) {
        document.getElementById('loginPage').style.display = showReg ? 'none' : 'block';
        document.getElementById('registerPage').style.display = showReg ? 'block' : 'none';
        document.getElementById('loginErr').style.display = 'none';
    }

    // REGISTRATION
    function registerUser() {
        const name = document.getElementById('newName').value.trim();
        const id = document.getElementById('newId').value.trim();
        if(name && id) {
            db.ref('Users/' + id).set({ name: name, empId: id })
            .then(() => {
                alert("Registration Successful! Ab login kijiye.");
                toggleAuth(false);
            });
        } else { alert("Donon box bharna zaroori hai!"); }
    }

    // LOGIN
    function loginUser() {
        const id = document.getElementById('loginId').value.trim();
        if(!id) return;

        db.ref('Users/' + id).once('value', (snap) => {
            if(snap.exists()) {
                activeUser = snap.val();
                loadDashboard();
            } else {
                document.getElementById('loginErr').style.display = 'block';
            }
        });
    }

    function loadDashboard() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeName').innerText = "Hello, " + activeUser.name;
        document.getElementById('welcomeId').innerText = "Active ID: " + activeUser.empId;
        
        const grid = document.getElementById('locGrid');
        grid.innerHTML = "";
        for(let i=1; i<=21; i++) {
            grid.innerHTML += `
                <div class="card">
                    <small>Station ${i}</small>
                    <select id="s-${i}">
                        <option>Pending</option><option>Scanning</option><option>Done</option>
                    </select>
                </div>`;
        }
    }

    function syncData() {
        let updates = { id: activeUser.empId, syncTime: new Date().toLocaleString() };
        for(let i=1; i<=21; i++) { updates[`Loc_${i}`] = document.getElementById(`s-${i}`).value; }
        
        db.ref('ActiveData/' + activeUser.empId).set(updates).then(() => {
            alert("Success: Cloud Sync Complete!");
        });
    }
</script>
</body>
</html>
