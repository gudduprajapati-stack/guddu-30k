<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Location Operational Tracker</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; background: #1f1f1f; border-radius: 10px; margin-bottom: 20px; border-bottom: 4px solid #007bff; }
        
        /* Grid for 21 Locations */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
            padding: 10px; 
        }

        .location-card { 
            background: #2a2a2a; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            border-left: 5px solid #ffc107; 
            transition: 0.3s;
        }

        .location-card:hover { transform: translateY(-5px); background: #333; }
        
        .loc-name { font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 10px; }
        
        .status-select { 
            width: 100%; 
            padding: 5px; 
            background: #444; 
            color: white; 
            border: none; 
            border-radius: 4px; 
        }

        .save-btn { 
            display: block; 
            width: 200px; 
            margin: 30px auto; 
            padding: 15px; 
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
            cursor: pointer; 
        }

        .save-btn:hover { background: #218838; }
    </style>
</head>
<body>

<div class="header">
    <h1>21 LOCATION LIVE TRACKER</h1>
    <p>Real-time Status Management</p>
</div>

<div class="grid-container" id="grid">
    </div>

<button class="save-btn" onclick="saveData()">SAVE CURRENT STATUS</button>

<script>
    // Generating 21 Location Cards
    const grid = document.getElementById('grid');
    for (let i = 1; i <= 21; i++) {
        const card = document.createElement('div');
        card.className = 'location-card';
        card.innerHTML = `
            <span class="loc-name">LOCATION ${i}</span>
            <select class="status-select" id="status-${i}">
                <option value="pending">Pending</option>
                <option value="running">Running</option>
                <option value="completed">Completed</option>
                <option value="issue">Issue</option>
            </select>
            <p style="font-size: 12px; margin-top: 10px; color: #888;">ID: LOC-0${i}</p>
        `;
        grid.appendChild(card);
    }

    function saveData() {
        alert("Status for all 21 locations has been captured locally!");
        // Yahan humne pehle localStorage ka logic dala tha
        let data = {};
        for(let i=1; i<=21; i++) {
            data[`Loc_${i}`] = document.getElementById(`status-${i}`).value;
        }
        console.log("Saving Data:", data);
        localStorage.setItem('trackerData', JSON.stringify(data));
    }
</script>

</body>
</html>
