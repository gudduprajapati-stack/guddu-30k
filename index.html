<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS FINAL LOGIN FIX</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:230px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;color:#888;cursor:pointer}
.nav.active{color:#00d4ff}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
input,select{padding:8px;margin:5px;background:#000;color:#fff;border:1px solid #444}
button{padding:8px;background:#00d4ff;border:none;margin:5px}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333;text-align:center}
.link{color:#00d4ff;cursor:pointer;font-size:12px}
</style>
</head>

<body>

<!-- LOGIN / REGISTER -->
<div id="auth" style="position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center">
<div style="background:#111;padding:25px;width:300px">

<!-- LOGIN BOX -->
<div id="loginBox">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p class="link" onclick="showRegister()">New Registration</p>
</div>

<!-- REGISTER BOX -->
<div id="regBox" style="display:none">
<h2>Register</h2>
<input id="regName" placeholder="Full Name">
<input id="regId" placeholder="Employee ID">
<button onclick="register()">Save</button>
<p class="link" onclick="showLogin()">Back to Login</p>
</div>

</div>
</div>

<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName"></h3>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray Scan</h2>
<select id="loc"></select>
<input id="trayBox" placeholder="MT76921">
<table id="trayTable"></table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment</h2>
<select id="shipLoc">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox">
<table id="shipTable"></table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>
<p>Coming next step (already ready to plug)</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<h2>Dashboard</h2>
<p>Coming next step (already ready to plug)</p>
</div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// LOCATION LIST
const LOCATIONS=[
"ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION"
];

loc.innerHTML=LOCATIONS.map(x=>`<option>${x}</option>`).join('');

// USER
let user={};

// SWITCH LOGIN/REGISTER
function showRegister(){
loginBox.style.display="none";
regBox.style.display="block";
}

function showLogin(){
regBox.style.display="none";
loginBox.style.display="block";
}

// REGISTER
function register(){
let name=regName.value.trim();
let id=regId.value.trim();

if(!name || !id) return alert("Fill all fields");

db.ref("Users/"+id).set({
name:name,
empId:id
}).then(()=>{
alert("Registered Successfully");
showLogin();
});
}

// LOGIN
function login(){
let id=loginId.value.trim();

if(!id) return alert("Enter ID");

db.ref("Users/"+id).once("value",s=>{
if(!s.exists()) return alert("User not found");

user.name=s.val().name;
user.id=id;

auth.style.display="none";
sidebar.style.display="block";
main.style.display="block";

userName.innerText=user.name+" ("+id+")";

startRealtime();
});
}

// LOGOUT
function logout(){
location.reload();
}

// TAB SWITCH
function openTab(t,el){
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.querySelectorAll(".nav").forEach(x=>x.classList.remove("active"));
document.getElementById(t).classList.add("active");
el.classList.add("active");
}

// REALTIME
function startRealtime(){

db.ref("LiveScans").on("value",snap=>{
let html="<tr><th>Date</th><th>Time</th><th>ID</th><th>Loc</th><th>User</th></tr>";

snap.forEach(c=>{
let d=c.val();

html+=`<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>`;
});

trayTable.innerHTML=html;
});

}

// TRAY SCAN
trayBox.onkeydown=e=>{
if(e.key==="Enter"){
db.ref("LiveScans").push({
barcode:trayBox.value,
location:loc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id
});
trayBox.value="";
}
};

// SHIPMENT SCAN
shipBox.onkeydown=e=>{
if(e.key==="Enter"){
db.ref("ShipmentScans").push({
shipId:shipBox.value,
location:shipLoc.value,
date:new Date().toLocaleDateString("en-GB"),
time:new Date().toLocaleTimeString(),
user:user.name,
userId:user.id
});
shipBox.value="";
}
};

</script>

</body>
</html>
