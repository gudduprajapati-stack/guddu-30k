<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS Final System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<!-- 🔥 Calendar (Flatpickr) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff;display:flex}
#auth{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center}
.card{background:#161616;padding:30px;border-radius:10px;width:300px;text-align:center}
input,select{padding:10px;background:#000;border:1px solid #444;color:#fff}
button{padding:10px;background:#00d4ff;border:none;color:#000;font-weight:bold;margin:5px}
.sidebar{width:220px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;cursor:pointer;color:#888}
.nav.active{color:#00d4ff;background:#111}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap}
#loc,#shipLoc{flex:1}
#scanBox,#shipBox{width:260px}
table{width:100%;margin-top:20px;border-collapse:collapse;table-layout:fixed}
th,td{padding:10px;border-bottom:1px solid #333;text-align:center}
th{color:#00d4ff}
.highlight{background:#003300}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
<div class="card" id="loginBox">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="toggle(true)" style="cursor:pointer">New Registration</p>
</div>

<div class="card" id="regBox" style="display:none">
<h2>Register</h2>
<input id="regName" placeholder="Name">
<input id="regId" placeholder="Employee ID">
<button onclick="register()">Register</button>
<p onclick="toggle(false)" style="cursor:pointer">Back</p>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName">---</h3>
<div class="nav active" onclick="openTab('tray',this)">📦 Tray</div>
<div class="nav" onclick="openTab('shipment',this)">🚛 Shipment</div>
<div class="nav" onclick="openTab('history',this)">🕒 History</div>
<div class="nav" onclick="logout()">🔓 Logout</div>
</div>

<!-- MAIN -->
<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray Scan</h2>
<div class="row">
<select id="loc">
<option>ICU ENTRY</option><option>MEI ENTRY</option><option>OMT ENTRY</option>
<option>LO SEND TO ICU</option><option>LO SEND TO MEI</option>
<option>ORDER SEND TO MAIN LINE FOR FT</option>
<option>ORDER SEND TO MAIN LINE FOR QC</option>
<option>ORDER SEND TO MAIN LINE FOR PACKING</option>
<option>TLP SEND TO MEI</option><option>QC FAIL SEND TO MEI</option>
<option>FRAME QC FAIL SEND TO MAIN LINE</option>
<option>SEND TO MEI FOR REVIEW</option>
<option>CS LOCATION</option><option>SMALL DIA LOCATION</option>
<option>LO QC FAIL LOCATION (JIT)</option>
<option>OMT RACK 00</option><option>OMT RACK 01</option>
<option>OMT RACK 02</option><option>OMT RACK 03</option>
<option>OMT RACK 04</option><option>OMT RACK 05</option>
<option>OMT RACK 06</option><option>OMT RACK 07</option>
<option>OMT RACK 08</option><option>OMT RACK 09</option>
<option>ICU TROLLEY 1</option><option>ICU TROLLEY 2</option>
<option>ICU TROLLEY 3</option><option>ICU TROLLEY 4</option>
<option>ICU TROLLEY 5</option><option>ICU TROLLEY 6</option>
<option>ICU TROLLEY 7</option><option>ICU TROLLEY 8</option>
<option>ICU TROLLEY 9</option><option>ICU TROLLEY 10</option>
<option>OMT TROLLEY 1</option><option>OMT TROLLEY 2</option>
<option>OMT TROLLEY 3</option><option>OMT TROLLEY 4</option>
<option>OMT TROLLEY 5</option><option>OMT TROLLEY 6</option>
<option>OMT TROLLEY 7</option><option>OMT TROLLEY 8</option>
<option>OMT TROLLEY 9</option><option>OMT TROLLEY 10</option>
</select>
<input id="scanBox" placeholder="Scan Tray (MT76921)" maxlength="7">
</div>
<p id="msg"></p>

<table>
<thead><tr><th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th><th>User ID</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment Scan</h2>
<div class="row">
<select id="shipLoc">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox" placeholder="Min 23 Digit Shipment">
</div>
<p id="shipMsg"></p>

<table>
<thead><tr><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User</th><th>User ID</th></tr></thead>
<tbody id="shipTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>

<div class="row">
<input id="fromDate" placeholder="From Date">
<input id="toDate" placeholder="To Date">

<select id="typeFilter">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<input id="searchBox" placeholder="Search">

<button onclick="applyHistoryFilter()">Filter</button>
<button onclick="exportHistory()">Export</button>
<button onclick="deleteHistory()" style="background:red;color:#fff">Delete</button>
</div>

<table>
<thead>
<tr><th>Type</th><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User</th><th>User ID</th></tr>
</thead>
<tbody id="historyTable"></tbody>
</table>

</div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});

const db=firebase.database();
let user={},historyData=[];

// DATE FORMAT
function formatDate(d){
if(!d)return "-";
let p=d.split('/');
if(p[0]>12)return d;
return p[1]+"/"+p[0]+"/"+p[2];
}

// DATE PARSE
function parseDate(d){
if(!d) return null;
let p=d.split('/');
return new Date(p[2],p[1]-1,p[0]);
}

// 🔥 CALENDAR INIT
flatpickr("#fromDate",{dateFormat:"d/m/Y"});
flatpickr("#toDate",{dateFormat:"d/m/Y"});

// LOGIN
function login(){
let id=loginId.value.trim();
db.ref('Users/'+id).once('value',s=>{
if(s.exists()){
user.id=id;user.name=s.val().name;
userName.innerText=user.name+" ("+id+")";
auth.style.display='none';sidebar.style.display='block';main.style.display='block';
startTray();startShipment();
}else alert("User not found");
});
}

function register(){
db.ref('Users/'+regId.value).set({name:regName.value});
alert("Registered");toggle(false);
}

function toggle(v){
loginBox.style.display=v?'none':'block';
regBox.style.display=v?'block':'none';
}

function openTab(t,el){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');el.classList.add('active');
if(t==='history') loadHistory();
}

function logout(){location.reload();}

// TRAY
scanBox.onkeydown=e=>{
if(e.key==='Enter'){
let v=scanBox.value.toUpperCase().trim();
if(!/^[A-Z]{2}[0-9]{5}$/.test(v)) return msg.innerText="Invalid";
msg.innerText="";
db.ref('LiveScans').push({
barcode:v,location:loc.value,
date:new Date().toLocaleDateString(),
time:new Date().toLocaleTimeString(),
user:user.name,userId:user.id,timestamp:Date.now()
});
scanBox.value="";
}
};

// SHIPMENT
shipBox.onkeydown=e=>{
if(e.key==='Enter'){
let v=shipBox.value.trim();
if(v.length<23) return shipMsg.innerText="Min 23 digit";
shipMsg.innerText="";
db.ref('ShipmentScans').push({
shipId:v.toUpperCase(),location:shipLoc.value,
date:new Date().toLocaleDateString(),
time:new Date().toLocaleTimeString(),
user:user.name,userId:user.id,timestamp:Date.now()
});
shipBox.value="";
}
};

// LIVE TRAY
function startTray(){
db.ref('LiveScans').on('value',snap=>{
let d=[];snap.forEach(c=>{let x=c.val();if(x&&x.barcode)d.push(x)});
d.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
tableBody.innerHTML=d.map((x,i)=>`
<tr class="${i==0?'highlight':''}">
<td>${formatDate(x.date)}</td><td>${x.time}</td><td>${x.barcode}</td>
<td>${x.location}</td><td>${x.user}</td><td>${x.userId}</td>
</tr>`).join('');
});
}

// LIVE SHIPMENT
function startShipment(){
db.ref('ShipmentScans').on('value',snap=>{
let d=[];snap.forEach(c=>{let x=c.val();if(x&&x.shipId)d.push(x)});
d.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
shipTable.innerHTML=d.map((x,i)=>`
<tr class="${i==0?'highlight':''}">
<td>${formatDate(x.date)}</td><td>${x.time}</td><td>${x.shipId}</td>
<td>${x.location}</td><td>${x.user}</td><td>${x.userId}</td>
</tr>`).join('');
});
}

// HISTORY
function loadHistory(){
historyData=[];
db.ref('LiveScans').once('value',s=>{
s.forEach(c=>{
let d=c.val();if(d&&d.barcode)
historyData.push({key:c.key,path:'LiveScans',type:'TRAY',date:formatDate(d.date),time:d.time,id:d.barcode,loc:d.location,user:d.user,uid:d.userId});
});
db.ref('ShipmentScans').once('value',s2=>{
s2.forEach(c=>{
let d=c.val();if(d&&d.shipId)
historyData.push({key:c.key,path:'ShipmentScans',type:'SHIPMENT',date:formatDate(d.date),time:d.time,id:d.shipId,loc:d.location,user:d.user,uid:d.userId});
});
renderHistory(historyData);
});
});
}

function renderHistory(d){
historyTable.innerHTML=d.map(x=>`
<tr>
<td>${x.type}</td><td>${x.date}</td><td>${x.time}</td>
<td>${x.id}</td><td>${x.loc}</td><td>${x.user}</td><td>${x.uid}</td>
</tr>`).join('');
}

function applyHistoryFilter(){
let f=parseDate(fromDate.value),t=parseDate(toDate.value),tp=typeFilter.value,s=searchBox.value.toUpperCase();
renderHistory(historyData.filter(x=>{
let dt=parseDate(x.date);
return (!f||dt>=f)&&(!t||dt<=t)&&(tp==='ALL'||x.type===tp)&&
(x.id.toUpperCase().includes(s)||x.user.toUpperCase().includes(s));
}));
}

function exportHistory(){
let csv="Type,Date,Time,ID,Location,User,UserID\n";
historyData.forEach(x=>csv+=`${x.type},${x.date},${x.time},${x.id},${x.loc},${x.user},${x.uid}\n`);
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv]));a.download="History.csv";a.click();
}

function deleteHistory(){
if(!confirm("⚠️ Permanent Delete?")) return;
let f=parseDate(fromDate.value),t=parseDate(toDate.value),tp=typeFilter.value,s=searchBox.value.toUpperCase();
historyData.filter(x=>{
let dt=parseDate(x.date);
return (!f||dt>=f)&&(!t||dt<=t)&&(tp==='ALL'||x.type===tp)&&
(x.id.toUpperCase().includes(s)||x.user.toUpperCase().includes(s));
}).forEach(x=>db.ref(x.path+"/"+x.key).remove());
alert("Deleted");
loadHistory();
}

</script>

</body>
</html>
