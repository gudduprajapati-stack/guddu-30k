<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAY AND SHIP RECORD</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #1a2a6c; --secondary: #b21f1f; --success: #27ae60; --bg: #f4f7f6; --ship: #8e44ad; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        /* HEADER STYLE WITH GUDDU SIGNATURE */
        .header-container { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 20px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border-bottom: 3px solid var(--primary);
        }
        .header-title { 
            color: var(--primary); 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin: 0; 
        }
        .guddu-signature { 
            font-family: 'Brush Script MT', 'Apple Chancery', cursive; 
            font-size: 42px; /* Bada Font */
            color: var(--primary); 
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
        nav { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding: 5px; background: white; border-radius: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { flex: 1; padding: 12px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; font-size: 13px; transition: 0.3s; }
        .active-btn { background: var(--primary) !important; color: white !important; }
        .ship-btn-active { background: var(--ship) !important; color: white !important; }
        .logout-btn { background: var(--secondary); color: white; }
        
        input, select, button { width: 100%; padding: 14px; margin: 6px 0; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; }
        .btn-search { background: #2980b9; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        .scan-box { border: 3px dashed #ccc; padding: 35px; border-radius: 20px; background: #fdfdfd; margin: 20px 0; text-align: center; transition: 0.3s; }
        .scan-box:focus-within { border-color: var(--primary); background: #f0f4ff; }
        
        .table-wrap { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; max-height: 550px; background: white; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 14px; }
        th, td { border: 1px solid #f1f1f1; padding: 12px; text-align: center; }
        th { background: var(--primary); color: white; position: sticky; top: 0; z-index: 10; }
        tr:nth-child(even) { background-color: #fafafa; }
        
        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; background: #eef1f7; padding: 18px; border-radius: 12px; margin-bottom: 20px; align-items: end; }
        .staff-card { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid var(--success); display: flex; justify-content: space-between; margin-bottom: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="header-container">
    <div class="header-title">TRAY AND SHIP RECORD</div>
    <div class="guddu-signature">Guddu</div>
</div>

<div id="authPage" class="card" style="max-width: 400px; margin: 50px auto; text-align: center;">
    <h3 style="color:var(--primary)">STAFF LOGIN</h3>
    <input type="text" id="loginId" placeholder="Enter Employee ID (e.g. T001)">
    <button class="btn-search" style="padding:15px; font-size: 16px;" onclick="login()">ENTER DASHBOARD</button>
</div>

<div id="mainApp" style="display:none">
    <nav>
        <button id="b-scan" onclick="showTab('scan')">TRAY ENTRY</button>
        <button id="b-ship" onclick="showTab('ship')">SHIPMENT</button>
        <button id="b-matrix" onclick="showTab('matrix')">MATRIX</button>
        <button id="b-staff" onclick="showTab('staff')">STAFF VIEW</button>
        <button id="b-history" onclick="showTab('history')">HISTORY & SEARCH</button>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </nav>

    <div id="tab-scan" class="tab-content">
        <div class="card" style="text-align:center">
            <h3 style="color:var(--primary)">📥 TRAY WORKER ENTRY (7 DIGIT)</h3>
            <select id="locSelect" style="max-width: 500px;"></select>
            <div class="scan-box">
                <input type="text" id="barcodeInput" placeholder="SCAN 7 DIGIT BARCODE..." style="height:70px; font-size:26px; text-align:center; border:none; background:transparent; width:100%">
            </div>
        </div>
    </div>

    <div id="tab-ship" class="tab-content" style="display:none">
        <div class="card" style="border-top: 5px solid var(--ship); text-align:center">
            <h3 style="color:var(--ship)">📦 SHIPMENT SCANNER (MAX 23 DIGIT)</h3>
            <select id="shipLocSelect" style="max-width: 500px;">
                <option value="DHL SHIPMENT">1. DHL SHIPMENT</option>
                <option value="GP SUPPLY & SREERAJ">2. GP SUPPLY & SREERAJ</option>
                <option value="OTHER SHIPMENT">3. OTHER SHIPMENT</option>
            </select>
            <div class="scan-box" style="border-color:var(--ship); background:#fdf2ff">
                <input type="text" id="ship23Input" placeholder="SCAN SHIPMENT BARCODE..." style="height:70px; font-size:26px; text-align:center; border:none; background:transparent; width:100%">
            </div>
        </div>
    </div>

    <div id="tab-matrix" class="tab-content" style="display:none">
        <div class="card">
            <h3>📊 Production Matrix</h3>
            <div class="filter-section">
                <div>From: <input type="date" id="matFrom"></div>
                <div>To: <input type="date" id="matTo"></div>
                <div>Type: <select id="matType"><option value="logs">Tray Entry</option><option value="shipments">Shipment</option></select></div>
                <div>Filter Location: <select id="matLocFilter"><option value="ALL">ALL LOCATIONS</option></select></div>
                <button class="btn-search" onclick="loadMatrix()">GENERATE</button>
            </div>
            <div class="table-wrap"><table id="matrixTable"><thead id="matHead"></thead><tbody id="matBody"></tbody></table></div>
        </div>
    </div>

    <div id="tab-staff" class="tab-content" style="display:none">
        <div class="card">
            <h3>👥 Staff Performance</h3>
            <div class="filter-section">
                <input type="date" id="staffFrom">
                <input type="date" id="staffTo">
                <select id="staffType"><option value="logs">Tray Records</option><option value="shipments">Shipment Records</option></select>
                <button class="btn-search" onclick="loadStaff()">LOAD STAFF DATA</button>
            </div>
            <div id="staffList"></div>
        </div>
    </div>

    <div id="tab-history" class="tab-content" style="display:none">
        <div class="card">
            <h3>🔍 Master History & Search</h3>
            <div class="filter-section">
                <input type="date" id="histFrom">
                <input type="date" id="histTo">
                <select id="histType"><option value="logs">Tray Entry</option><option value="shipments">Shipment</option></select>
                <input type="text" id="histBcSearch" placeholder="Scan Barcode to Find..." style="margin:0; border: 2px solid var(--primary)">
                <button class="btn-search" onclick="loadHistory()">SEARCH</button>
                <button onclick="downloadExcel()" style="background:var(--success); color:white; border:none; font-weight:bold; cursor:pointer">DOWNLOAD EXCEL</button>
            </div>
            <div class="table-wrap"><table id="histTable"><thead><tr><th>Date</th><th>Time</th><th>Location</th><th>Barcode</th><th>Emp ID</th><th>Name</th></tr></thead><tbody id="histBody"></tbody></table></div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        authDomain: "nexs-guddu-30k.firebaseapp.com",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        storageBucket: "nexs-guddu-30k.firebasestorage.app",
        messagingSenderId: "634684833271",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const trayLocs = ["ICU ENTRY", "MEI ENTRY", "QC FAIL ORDER SEND TO MEI", "FRAME ORDER SEND TO FT", "OMT ENTRY", "LO SEND TO ICU", "LO SEND TO MEI", "SEND TO MAIN LINE FOR FT", "SEND TO MAIN LINE FOR QC", "SEND TO MAIN LINE FOR PACKING", "TLP SEND TO MEI", "OMT RACK NO 00", "OMT RACK NO 01", "OMT RACK NO 02", "OMT RACK NO 03", "OMT RACK NO 04", "OMT RACK NO 05", "OMT RACK NO 06", "OMT RACK NO 07", "OMT RACK NO 08", "OMT RACK NO 09"];
    const shipLocs = ["DHL SHIPMENT", "GP SUPPLY & SREERAJ", "OTHER SHIPMENT"];

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('input[type="date"]').forEach(e => e.value = today);
        trayLocs.forEach(l => {
            document.getElementById('locSelect').add(new Option(l, l));
            document.getElementById('matLocFilter').add(new Option(l, l));
        });
        shipLocs.forEach(l => document.getElementById('matLocFilter').add(new Option(l, l)));
        checkLogin();
    };

    // --- SCANNING CORE ---
    function handleScan(bc, min, max, path, locId) {
        if(bc.length < min || bc.length > max) return alert("❌ INVALID BARCODE DIGITS!");
        const now = new Date();
        db.ref(path).push({
            bc, loc: document.getElementById(locId).value,
            name: localStorage.getItem('uN'), id: localStorage.getItem('uI'),
            date: now.toISOString().split('T')[0], time: now.toLocaleTimeString(), h: now.getHours()
        });
    }

    document.getElementById('barcodeInput').addEventListener('keypress', e => { if(e.key==='Enter'){ handleScan(e.target.value.trim(), 7, 7, 'logs', 'locSelect'); e.target.value=""; }});
    document.getElementById('ship23Input').addEventListener('keypress', e => { if(e.key==='Enter'){ handleScan(e.target.value.trim(), 1, 23, 'shipments', 'shipLocSelect'); e.target.value=""; }});

    // --- REPORTS LOGIC ---
    function loadMatrix() {
        const from = document.getElementById('matFrom').value, to = document.getElementById('matTo').value, type = document.getElementById('matType').value, filterLoc = document.getElementById('matLocFilter').value;
        const locs = type === 'logs' ? trayLocs : shipLocs;
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            const data = s.val() ? Object.values(s.val()) : [], hrs = Array.from({length: 24}, (_, i) => i);
            document.getElementById('matHead').innerHTML = `<tr><th>Location</th>${hrs.map(h=>`<th>${h}</th>`).join('')}<th>Total</th></tr>`;
            document.getElementById('matBody').innerHTML = locs.filter(l => filterLoc === 'ALL' || l === filterLoc).map(l => {
                let rowSum = 0;
                let cells = hrs.map(h => { let c = data.filter(x=>x.loc===l && x.h===h).length; rowSum+=c; return `<td>${c||''}</td>`; }).join('');
                return `<tr><td><b>${l}</b></td>${cells}<td><b>${rowSum}</b></td></tr>`;
            }).join('');
        });
    }

    function loadStaff() {
        const from = document.getElementById('staffFrom').value, to = document.getElementById('staffTo').value, type = document.getElementById('staffType').value;
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            const data = s.val() ? Object.values(s.val()) : [], staff = {};
            data.forEach(x => { staff[x.id] = staff[x.id] || {n:x.name, c:0}; staff[x.id].c++; });
            document.getElementById('staffList').innerHTML = Object.entries(staff).map(([id, info]) => `<div class="staff-card"><span><b>${info.n}</b> (${id})</span><b style="color:var(--success)">${info.c} Scans</b></div>`).join('') || "No Data Found";
        });
    }

    function loadHistory() {
        const from = document.getElementById('histFrom').value, to = document.getElementById('histTo').value, type = document.getElementById('histType').value, bc = document.getElementById('histBcSearch').value.trim().toLowerCase();
        db.ref(type).orderByChild('date').startAt(from).endAt(to).once('value', s => {
            let data = s.val() ? Object.values(s.val()).reverse() : [];
            if(bc) data = data.filter(x => x.bc.toLowerCase().includes(bc));
            document.getElementById('histBody').innerHTML = data.map(x => `<tr><td>${x.date}</td><td>${x.time}</td><td>${x.loc}</td><td>${x.bc}</td><td>${x.id}</td><td>${x.name}</td></tr>`).join('');
        });
    }

    // --- NAVIGATION & AUTH ---
    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-btn', 'ship-btn-active'));
        document.getElementById('tab-' + t).style.display = 'block';
        document.getElementById('b-' + t).classList.add(t==='ship'?'ship-btn-active':'active-btn');
    }
    function login() { 
        const id = document.getElementById('loginId').value.trim(); 
        db.ref('users/'+id).once('value', s => { 
            if(s.exists()){ localStorage.setItem('uN', s.val().name); localStorage.setItem('uI', s.val().id); location.reload(); } 
            else alert("❌ INVALID EMPLOYEE ID!"); 
        }); 
    }
    function checkLogin() { if(localStorage.getItem('uI')){ document.getElementById('authPage').style.display='none'; document.getElementById('mainApp').style.display='block'; showTab('scan'); } }
    function logout() { localStorage.clear(); location.reload(); }
    function downloadExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('histTable')), 'TRAY_SHIP_RECORD.xlsx'); }
</script>
</body>
</html>
