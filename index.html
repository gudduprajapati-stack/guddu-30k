<!-- 🔥 NEXS ULTRA FINAL COMPLETE WITH DASHBOARD -->
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexS ULTRA FINAL</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
overflow:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100vh;
background:#000;
border-right:1px solid #222;
padding-top:20px;
overflow:auto;
}

.logo{
text-align:center;
font-size:24px;
font-weight:bold;
color:#00d4ff;
margin-bottom:10px;
}

#loginUserInfo{
margin:10px;
padding:10px;
background:#111;
border:1px solid #222;
border-radius:8px;
line-height:1.7;
font-size:13px;
}

.nav-btn{
padding:15px 20px;
cursor:pointer;
border-left:4px solid transparent;
transition:.2s;
}

.nav-btn:hover{
background:#111;
}

.nav-btn.active{
background:#111;
border-left:4px solid #00d4ff;
color:#00d4ff;
}

.main{
margin-left:240px;
height:100vh;
overflow:auto;
padding:20px;
}

.tab{
display:none;
}

.tab.active{
display:block;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
border:1px solid #222;
margin-bottom:20px;
overflow:auto;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:center;
}

input,select,button{
padding:11px;
border:none;
outline:none;
border-radius:6px;
}

input,select{
background:#000;
color:#fff;
border:1px solid #333;
}

button{
background:#00d4ff;
color:#000;
font-weight:bold;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #222;
text-align:center;
font-size:13px;
white-space:nowrap;
}

th{
background:#000;
color:#00d4ff;
position:sticky;
top:0;
}

.login-page{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
width:350px;
background:#111;
padding:25px;
border-radius:10px;
border:1px solid #333;
}

.login-box h2{
text-align:center;
margin-bottom:20px;
color:#00d4ff;
}

.login-box input{
width:100%;
margin-bottom:10px;
}

.login-box button{
width:100%;
margin-bottom:10px;
}

.small-link{
text-align:center;
font-size:13px;
color:#00d4ff;
cursor:pointer;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage" class="login-page">

<div class="login-box">

<div id="loginBox">

<h2>NexS Login</h2>

<input type="text" id="loginId" placeholder="Employee ID">

<button onclick="login()">LOGIN</button>

<div class="small-link" onclick="showRegister()">
New Registration
</div>

</div>

<div id="registerBox" style="display:none;">

<h2>Registration</h2>

<input type="text" id="regName" placeholder="Full Name">
<input type="text" id="regId" placeholder="Employee ID">

<button onclick="register()">SAVE USER</button>

<div class="small-link" onclick="showLogin()">
Back To Login
</div>

</div>

</div>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<div class="sidebar">

<div class="logo">NexS</div>

<div id="loginUserInfo"></div>

<div class="nav-btn active" onclick="openTab('tray',this)">
📦 Tray
</div>

<div class="nav-btn" onclick="openTab('shipment',this)">
🚛 Shipment
</div>

<div class="nav-btn" onclick="openTab('history',this)">
🕒 History
</div>

<div class="nav-btn" onclick="openTab('dashboard',this)">
📊 Dashboard
</div>

<div class="nav-btn" onclick="logout()">
🚪 Logout
</div>

</div>

<div class="main">

<!-- TRAY -->

<div id="tray" class="tab active">

<div class="card">

<div class="row">

<select id="trayLocation"></select>

<input type="text" id="trayInput" placeholder="Tray Scan">

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Tray</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="trayTable"></tbody>

</table>

</div>

</div>

<!-- SHIPMENT -->

<div id="shipment" class="tab">

<div class="card">

<div class="row">

<select id="shipmentAgency">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>

<input type="text" id="shipmentInput" placeholder="Shipment Max 23">

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Shipment</th>
<th>Agency</th>
<th>User</th>
</tr>
</thead>

<tbody id="shipmentTable"></tbody>

</table>

</div>

</div>

<!-- HISTORY -->

<div id="history" class="tab">

<div class="card">

<div class="row">

<input type="date" id="fromDate">
<input type="date" id="toDate">

<select id="historyType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>

<input type="text" id="historySearch" placeholder="Search">

<button onclick="applyHistory()">Filter</button>

<button onclick="exportHistory()">Export CSV</button>

<button onclick="deleteHistory()">Delete</button>

</div>

</div>

<div class="card">

<table>

<thead>
<tr>
<th>Type</th>
<th>Date</th>
<th>Time</th>
<th>ID</th>
<th>Location</th>
<th>User</th>
</tr>
</thead>

<tbody id="historyTable"></tbody>

</table>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="tab">

<div class="card">

<div class="row">

<input type="date" id="dashFrom">
<input type="date" id="dashTo">

<select id="dashType">

<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>

</select>

<button onclick="renderDashboard()">
Apply Filter
</button>

</div>

</div>

<div class="card">

<div class="row">

<h3>📦 Location Hourly Productivity</h3>

<button onclick="exportTable('locationHourlyTable')">
Export CSV
</button>

</div>

<table id="locationHourlyTable"></table>

</div>

<div class="card">

<div class="row">

<h3>👤 Person Wise Productivity</h3>

<button onclick="exportTable('personWiseTable')">
Export CSV
</button>

</div>

<table id="personWiseTable"></table>

</div>

<div class="card">

<div class="row">

<h3>⏱ Person + Hourly Productivity</h3>

<button onclick="exportTable('personHourlyTable')">
Export CSV
</button>

</div>

<table id="personHourlyTable"></table>

</div>

</div>

</div>

</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
authDomain:"nexs-guddu-30k.firebaseapp.com",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com",
projectId:"nexs-guddu-30k",
storageBucket:"nexs-guddu-30k.appspot.com",
messagingSenderId:"634684833271",
appId:"1:634684833271:web:31a25a2c5301fa108142f2"
});

firebase.database().goOnline();

const db=firebase.database();

let currentUser={};
let trayData=[];
let shipmentData=[];
let allData=[];

const locations=[

"ICU ENTRY",
"MEI ENTRY",
"OMT ENTRY",
"LO SEND TO ICU",
"LO SEND TO MEI",
"ORDER SEND TO MAIN LINE FOR FT",
"ORDER SEND TO MAIN LINE FOR QC",
"ORDER SEND TO MAIN LINE FOR PACKING",
"TLP SEND TO MEI",
"QC FAIL SEND TO MEI",
"FRAME QC FAIL SEND TO MAIN LINE",
"SEND TO MEI FOR REVIEW",
"CS LOCATION",
"SMALL DIA LOCATION",
"LO QC FAIL LOCATION (JIT)",

...Array.from({length:10},(_,i)=>`OMT RACK ${String(i+1).padStart(2,"0")}`),
...Array.from({length:10},(_,i)=>`ICU TROLLEY ${i+1}`),
...Array.from({length:10},(_,i)=>`OMT TROLLEY ${i+1}`),

"ICU HOLD",
"MEI HOLD",
"PACKING HOLD",
"QC HOLD",
"DISPATCH HOLD"

];

locations.forEach(l=>{
trayLocation.innerHTML+=`<option>${l}</option>`;
});

function showRegister(){
loginBox.style.display="none";
registerBox.style.display="block";
}

function showLogin(){
registerBox.style.display="none";
loginBox.style.display="block";
}

function register(){

const name=regName.value.trim();
const id=regId.value.trim();

if(!name || !id){
alert("Fill all fields");
return;
}

db.ref("Users/"+id).set({
name:name,
id:id
}).then(()=>{
alert("Registration Successful");
showLogin();
});

}

function login(){

const id=loginId.value.trim();

if(!id){
alert("Enter ID");
return;
}

db.ref("Users/"+id).once("value")
.then((snap)=>{

if(!snap.exists()){
alert("ID Not Found");
return;
}

const data=snap.val();

currentUser={
name:data.name || "Unknown",
id:id
};

loginUserInfo.innerHTML=`
<div><b>Name:</b> ${currentUser.name}</div>
<div><b>ID:</b> ${currentUser.id}</div>
`;

loginPage.style.display="none";
app.style.display="block";

startRealtime();

});

}

function logout(){
location.reload();
}

function openTab(id,el){

document.querySelectorAll(".tab")
.forEach(t=>t.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

document.querySelectorAll(".nav-btn")
.forEach(n=>n.classList.remove("active"));

el.classList.add("active");

}

function formatDate(d){

const dt=new Date(d);

return `${String(dt.getDate()).padStart(2,"0")}/${String(dt.getMonth()+1).padStart(2,"0")}/${dt.getFullYear()}`;

}

function formatTime(d){
return new Date(d).toLocaleTimeString();
}

function startRealtime(){

db.ref("tray").on("value",snap=>{

trayData=[];

snap.forEach(c=>{
trayData.push({
key:c.key,
type:"TRAY",
...c.val()
});
});

renderTray();
mergeData();

});

db.ref("shipment").on("value",snap=>{

shipmentData=[];

snap.forEach(c=>{
shipmentData.push({
key:c.key,
type:"SHIPMENT",
...c.val()
});
});

renderShipment();
mergeData();

});

}

function mergeData(){

allData=[...trayData,...shipmentData];

allData.sort((a,b)=>b.timestamp-a.timestamp);

applyHistory();
renderDashboard();

}

function renderTray(){

trayTable.innerHTML="";

const latest=[...trayData]
.sort((a,b)=>b.timestamp-a.timestamp)
.slice(0,20);

latest.forEach(d=>{

trayTable.innerHTML+=`
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>
`;

});

}

function renderShipment(){

shipmentTable.innerHTML="";

const latest=[...shipmentData]
.sort((a,b)=>b.timestamp-a.timestamp)
.slice(0,20);

latest.forEach(d=>{

shipmentTable.innerHTML+=`
<tr>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.shipmentId}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>
`;

});

}

setInterval(()=>{

const trayTab=document.getElementById("tray");

if(
trayTab.classList.contains("active") &&
document.activeElement!==trayInput
){
trayInput.focus();
}

},300);

trayInput.addEventListener("keydown",function(e){

if(e.key!=="Enter") return;

e.preventDefault();

const val=trayInput.value.trim().toUpperCase();

if(val.length!==7){
trayInput.value="";
return;
}

const now=Date.now();

trayInput.value="";

db.ref("tray").push({

barcode:val,
location:trayLocation.value,
user:currentUser.name,
userId:currentUser.id,
date:formatDate(now),
time:formatTime(now),
timestamp:now

});

});

shipmentInput.addEventListener("keydown",function(e){

if(e.key!=="Enter") return;

e.preventDefault();

const val=shipmentInput.value.trim().toUpperCase();

if(val.length>23){
shipmentInput.value="";
return;
}

const now=Date.now();

shipmentInput.value="";

db.ref("shipment").push({

shipmentId:val,
location:shipmentAgency.value,
user:currentUser.name,
userId:currentUser.id,
date:formatDate(now),
time:formatTime(now),
timestamp:now

});

});

function applyHistory(){

historyTable.innerHTML="";

const type=historyType.value;
const search=historySearch.value.toUpperCase();

const from=fromDate.value;
const to=toDate.value;

let filtered=[...allData];

filtered=filtered.filter(d=>{

if(type!=="ALL" && d.type!==type){
return false;
}

const id=(d.barcode||d.shipmentId||"").toUpperCase();

if(
search &&
!id.includes(search) &&
!d.user.toUpperCase().includes(search) &&
!d.userId.toUpperCase().includes(search)
){
return false;
}

if(from){

const fromD=new Date(from);
fromD.setHours(0,0,0,0);

if(new Date(d.timestamp)<fromD){
return false;
}

}

if(to){

const toD=new Date(to);
toD.setHours(23,59,59,999);

if(new Date(d.timestamp)>toD){
return false;
}

}

return true;

});

filtered.sort((a,b)=>b.timestamp-a.timestamp);

filtered.forEach(d=>{

historyTable.innerHTML+=`
<tr>
<td>${d.type}</td>
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode||d.shipmentId}</td>
<td>${d.location}</td>
<td>${d.user} (${d.userId})</td>
</tr>
`;

});

}

function renderDashboard(){

const from=dashFrom.value;
const to=dashTo.value;
const type=dashType.value;

const hours=[
"12AM","1AM","2AM","3AM","4AM","5AM",
"6AM","7AM","8AM","9AM","10AM","11AM",
"12PM","1PM","2PM","3PM","4PM","5PM",
"6PM","7PM","8PM","9PM","10PM","11PM"
];

let locMap={};
let personMap={};
let personHourMap={};

allData.forEach(d=>{

if(type!=="ALL" && d.type!==type) return;

const dt=new Date(d.timestamp);

if(from){

const f=new Date(from);
f.setHours(0,0,0,0);

if(dt<f) return;

}

if(to){

const t=new Date(to);
t.setHours(23,59,59,999);

if(dt>t) return;

}

const hour=dt.getHours();

const user=`${d.user} (${d.userId})`;

if(!locMap[d.location]){
locMap[d.location]=Array(24).fill(0);
}

locMap[d.location][hour]++;

personMap[user]=(personMap[user]||0)+1;

if(!personHourMap[user]){
personHourMap[user]=Array(24).fill(0);
}

personHourMap[user][hour]++;

});

const hourHeader=hours.map(h=>`<th>${h}</th>`).join("");

locationHourlyTable.innerHTML=`
<tr>
<th>Location</th>
${hourHeader}
</tr>
`;

Object.entries(locMap)
.sort((a,b)=>b[1].reduce((x,y)=>x+y)-a[1].reduce((x,y)=>x+y))
.forEach(([k,v])=>{

locationHourlyTable.innerHTML+=`
<tr>
<td>${k}</td>
${v.map(x=>`<td>${x}</td>`).join("")}
</tr>
`;

});

personWiseTable.innerHTML=`
<tr>
<th>User</th>
<th>Total</th>
</tr>
`;

Object.entries(personMap)
.sort((a,b)=>b[1]-a[1])
.forEach(([k,v])=>{

personWiseTable.innerHTML+=`
<tr>
<td>${k}</td>
<td>${v}</td>
</tr>
`;

});

personHourlyTable.innerHTML=`
<tr>
<th>User</th>
${hourHeader}
</tr>
`;

Object.entries(personHourMap)
.sort((a,b)=>b[1].reduce((x,y)=>x+y)-a[1].reduce((x,y)=>x+y))
.forEach(([k,v])=>{

personHourlyTable.innerHTML+=`
<tr>
<td>${k}</td>
${v.map(x=>`<td>${x}</td>`).join("")}
</tr>
`;

});

}

function exportHistory(){

let csv="Type,Date,Time,ID,Location,User\n";

allData.forEach(d=>{
csv+=`${d.type},${d.date},${d.time},${d.barcode||d.shipmentId},${d.location},${d.user} (${d.userId})\n`;
});

downloadCSV(csv,"history.csv");

}

function exportTable(id){

const rows=document.querySelectorAll(`#${id} tr`);

let csv="";

rows.forEach(r=>{
csv+=[...r.children].map(td=>td.innerText).join(",")+"\n";
});

downloadCSV(csv,id+".csv");

}

function deleteHistory(){

const from=fromDate.value;
const to=toDate.value;
const type=historyType.value;

if(!from || !to){
alert("Select Date Range");
return;
}

if(!confirm("Delete Selected Data?")){
return;
}

const fromD=new Date(from);
fromD.setHours(0,0,0,0);

const toD=new Date(to);
toD.setHours(23,59,59,999);

if(type==="ALL" || type==="TRAY"){

db.ref("tray").once("value")
.then(snap=>{

snap.forEach(c=>{

const d=c.val();

if(!d.timestamp) return;

const dt=new Date(d.timestamp);

if(dt>=fromD && dt<=toD){
db.ref("tray/"+c.key).remove();
}

});

});

}

if(type==="ALL" || type==="SHIPMENT"){

db.ref("shipment").once("value")
.then(snap=>{

snap.forEach(c=>{

const d=c.val();

if(!d.timestamp) return;

const dt=new Date(d.timestamp);

if(dt>=fromD && dt<=toD){
db.ref("shipment/"+c.key).remove();
}

});

});

}

alert("Selected Data Deleted");

}

function downloadCSV(csv,name){

const a=document.createElement("a");

a.href=URL.createObjectURL(
new Blob([csv],{type:"text/csv"})
);

a.download=name;

a.click();

}

</script>

</body>
</html>
