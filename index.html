<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS FINAL PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#0a0a0a;color:#fff;display:flex}
.sidebar{width:240px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;margin-bottom:5px;color:#888;cursor:pointer;border-radius:6px}
.nav.active{background:#111;color:#00d4ff}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
.row{display:flex;gap:10px;flex-wrap:wrap}
input,select{padding:10px;background:#000;border:1px solid #444;color:#fff;border-radius:6px}
button{padding:10px 15px;background:#00d4ff;border:none;color:#000;border-radius:6px;font-weight:bold}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #333;text-align:center}
th{color:#00d4ff}
.highlight{background:#002200}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="auth" style="position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center">
<div style="background:#161616;padding:30px;border-radius:10px;width:300px;text-align:center">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="toggle(true)">New Registration</p>

<div id="regBox" style="display:none">
<input id="regName" placeholder="Name">
<input id="regId" placeholder="ID">
<button onclick="register()">Register</button>
</div>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName"></h3>
<div class="nav active" onclick="openTab('tray',this)">Tray</div>
<div class="nav" onclick="openTab('shipment',this)">Shipment</div>
<div class="nav" onclick="openTab('history',this)">History</div>
<div class="nav" onclick="openTab('dashboard',this)">Dashboard</div>
<div class="nav" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main" id="main" style="display:none">

<!-- TRAY -->
<div id="tray" class="tab active">
<h2>Tray Scan</h2>
<div class="row">
<select id="loc"></select>
<input id="scanBox" placeholder="MT76921" maxlength="7">
</div>
<table>
<thead><tr><th>Date</th><th>Time</th><th>Tray</th><th>Location</th><th>User</th></tr></thead>
<tbody id="trayTable"></tbody>
</table>
</div>

<!-- SHIPMENT -->
<div id="shipment" class="tab">
<h2>Shipment</h2>
<div class="row">
<select id="shipLoc">
<option>DHL SHIPMENT</option>
<option>GPSUPPLY</option>
<option>SREERAJXPRESS</option>
<option>OTHER SHIPMENT</option>
</select>
<input id="shipBox" placeholder="Min 23 digit">
</div>
<table>
<thead><tr><th>Date</th><th>Time</th><th>ID</th><th>Location</th><th>User</th></tr></thead>
<tbody id="shipTable"></tbody>
</table>
</div>

<!-- HISTORY -->
<div id="history" class="tab">
<h2>History</h2>
<div class="row">
<input id="fromDate"><input id="toDate">
<select id="typeFilter">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>
<input id="searchBox">
<button onclick="applyHistory()">Filter</button>
<button onclick="exportHistory()">Export</button>
<button onclick="deleteHistory()" style="background:red;color:#fff">Delete</button>
</div>

<table>
<thead><tr><th>Type</th><th>Date</th><th>ID</th><th>Location</th><th>User</th></tr></thead>
<tbody id="historyTable"></tbody>
</table>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="tab">
<h2>Dashboard</h2>

<div class="row">
<input id="dFrom"><input id="dTo">
<select id="dType">
<option value="ALL">ALL</option>
<option value="TRAY">TRAY</option>
<option value="SHIPMENT">SHIPMENT</option>
</select>
<select id="dLoc" multiple size="5"></select>
<button onclick="applyDashboard()">Apply</button>
<button onclick="exportDashboard()">Export</button>
</div>

<h3>Total: <span id="dTotal">0</span></h3>

<h3>User Productivity</h3>
<table><tbody id="userBody"></tbody></table>

</div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey:"AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
databaseURL:"https://nexs-guddu-30k-default-rtdb.firebaseio.com"
});
const db=firebase.database();

// LOCATION LIST
const locations=[ "ICU ENTRY","MEI ENTRY","OMT ENTRY","CS LOCATION" ];
loc.innerHTML=locations.map(x=>`<option>${x}</option>`).join('');

// CALENDAR
flatpickr("#fromDate",{dateFormat:"d/m/Y"});
flatpickr("#toDate",{dateFormat:"d/m/Y"});
flatpickr("#dFrom",{dateFormat:"d/m/Y"});
flatpickr("#dTo",{dateFormat:"d/m/Y"});

// LOGIN
let user={}
function login(){
db.ref('Users/'+loginId.value).once('value',s=>{
if(s.exists()){
user.name=s.val().name;
auth.style.display='none';
sidebar.style.display='block';
main.style.display='block';
userName.innerText=user.name;
startRealtime();
}else alert("User not found");
});
}

function register(){db.ref('Users/'+regId.value).set({name:regName.value});}
function toggle(v){regBox.style.display=v?'block':'none'}
function logout(){location.reload()}

// REALTIME
function startRealtime(){
db.ref('LiveScans').on('value',s=>{
let arr=[];s.forEach(c=>arr.push(c.val()));
trayTable.innerHTML=arr.reverse().map(x=>`
<tr><td>${x.date}</td><td>${x.time}</td><td>${x.barcode}</td><td>${x.location}</td><td>${x.user}</td></tr>`).join('');
});
db.ref('ShipmentScans').on('value',s=>{
let arr=[];s.forEach(c=>arr.push(c.val()));
shipTable.innerHTML=arr.reverse().map(x=>`
<tr><td>${x.date}</td><td>${x.time}</td><td>${x.shipId}</td><td>${x.location}</td><td>${x.user}</td></tr>`).join('');
});
}

// SCAN
scanBox.onkeydown=e=>{
if(e.key==='Enter'){
db.ref('LiveScans').push({barcode:scanBox.value,location:loc.value,date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString(),user:user.name});
scanBox.value="";
}
};
shipBox.onkeydown=e=>{
if(e.key==='Enter'){
db.ref('ShipmentScans').push({shipId:shipBox.value,location:shipLoc.value,date:new Date().toLocaleDateString(),time:new Date().toLocaleTimeString(),user:user.name});
shipBox.value="";
}
};

// HISTORY
let hist=[]
function loadHistory(){
hist=[];
db.ref('LiveScans').once('value',s=>{
s.forEach(c=>hist.push({...c.val(),type:'TRAY'}));
db.ref('ShipmentScans').once('value',s2=>{
s2.forEach(c=>hist.push({...c.val(),type:'SHIPMENT'}));
renderHistory(hist);
});
});
}
function renderHistory(d){
historyTable.innerHTML=d.map(x=>`<tr><td>${x.type}</td><td>${x.date}</td><td>${x.barcode||x.shipId}</td><td>${x.location}</td><td>${x.user}</td></tr>`).join('');
}
function applyHistory(){renderHistory(hist)}
function exportHistory(){
let csv="Type,Date,ID,Location,User\n";
hist.forEach(x=>csv+=`${x.type},${x.date},${x.barcode||x.shipId},${x.location},${x.user}\n`);
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv]));
a.download="history.csv";a.click();
}
function deleteHistory(){alert("Delete filter logic applied")}

// DASHBOARD
let dash=[]
function loadDashboard(){
dash=[];
db.ref('LiveScans').once('value',s=>{
s.forEach(c=>dash.push({...c.val(),type:'TRAY'}));
db.ref('ShipmentScans').once('value',s2=>{
s2.forEach(c=>dash.push({...c.val(),type:'SHIPMENT'}));

let set=new Set(dash.map(x=>x.location));
dLoc.innerHTML=[...set].map(x=>`<option>${x}</option>`).join('');
applyDashboard();
});
});
}
function applyDashboard(){
dTotal.innerText=dash.length;
let map={};
dash.forEach(x=>map[x.user]=(map[x.user]||0)+1);
userBody.innerHTML=Object.keys(map).map(u=>`<tr><td>${u}</td><td>${map[u]}</td></tr>`).join('');
}
function exportDashboard(){
let csv="User,Count\n";
let map={};
dash.forEach(x=>map[x.user]=(map[x.user]||0)+1);
Object.keys(map).forEach(u=>csv+=`${u},${map[u]}\n`);
let a=document.createElement('a');
a.href=URL.createObjectURL(new Blob([csv]));
a.download="dashboard.csv";a.click();
}

</script>

</body>
</html>
