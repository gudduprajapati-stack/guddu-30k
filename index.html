<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NexS System</title>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0a0a0a;color:#fff;display:flex}
#auth{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center}
.card{background:#161616;padding:30px;border-radius:10px;width:300px;text-align:center}
input,select{padding:10px;background:#000;border:1px solid #444;color:#fff}
button{padding:10px;width:100%;background:#00d4ff;border:none;color:#000;font-weight:bold;margin-top:10px}
.sidebar{width:220px;background:#000;height:100vh;padding:20px}
.nav{padding:12px;cursor:pointer;color:#888}
.nav.active{color:#00d4ff;background:#111}
.main{flex:1;padding:20px}
.tab{display:none}
.tab.active{display:block}
.row{display:flex;gap:10px;align-items:center}
#loc{flex:1}
#scanBox{width:260px}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #333}
th{color:#00d4ff}
.highlight{background:#003300}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="auth">
<div class="card" id="loginBox">
<h2>Login</h2>
<input id="loginId" placeholder="Employee ID">
<button onclick="login()">Login</button>
<p onclick="toggle(true)" style="cursor:pointer">New Registration</p>
</div>

<div class="card" id="regBox" style="display:none">
<h2>Register</h2>
<input id="regName" placeholder="Name">
<input id="regId" placeholder="Employee ID">
<button onclick="register()">Register</button>
<p onclick="toggle(false)" style="cursor:pointer">Back</p>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar" style="display:none">
<h3 id="userName">---</h3>
<div class="nav active" onclick="openTab('tray',this)">📦 Tray Scan</div>
<div class="nav" onclick="openTab('shipment',this)">🚛 Shipment</div>
<div class="nav" onclick="openTab('history',this)">🕒 History</div>
<div class="nav" onclick="openTab('dashboard',this)">📊 Dashboard</div>
<div class="nav" onclick="logout()">🔓 Logout</div>
</div>

<!-- MAIN -->
<div class="main" id="main" style="display:none">

<div id="tray" class="tab active">

<h2>Tray Scan</h2>

<div class="row">
<select id="loc">
<option>ICU ENTRY</option>
<option>MEI ENTRY</option>
<option>OMT ENTRY</option>
<option>LO SEND TO ICU</option>
<option>LO SEND TO MEI</option>
<option>ORDER SEND TO MAIN LINE FOR FT</option>
<option>ORDER SEND TO MAIN LINE FOR QC</option>
<option>ORDER SEND TO MAIN LINE FOR PACKING</option>
<option>TLP SEND TO MEI</option>
<option>QC FAIL SEND TO MEI</option>
<option>FRAME QC FAIL SEND TO MAIN LINE</option>
<option>SEND TO MEI FOR REVIEW</option>
<option>CS LOCATION</option>
<option>SMALL DIA LOCATION</option>
<option>LO QC FAIL LOCATION (JIT)</option>
<option>OMT RACK 00</option>
<option>OMT RACK 01</option>
<option>OMT RACK 02</option>
<option>OMT RACK 03</option>
<option>OMT RACK 04</option>
<option>OMT RACK 05</option>
<option>OMT RACK 06</option>
<option>OMT RACK 07</option>
<option>OMT RACK 08</option>
<option>OMT RACK 09</option>
<option>ICU TROLLEY 1</option>
<option>ICU TROLLEY 2</option>
<option>ICU TROLLEY 3</option>
<option>ICU TROLLEY 4</option>
<option>ICU TROLLEY 5</option>
<option>ICU TROLLEY 6</option>
<option>ICU TROLLEY 7</option>
<option>ICU TROLLEY 8</option>
<option>ICU TROLLEY 9</option>
<option>ICU TROLLEY 10</option>
<option>OMT TROLLEY 1</option>
<option>OMT TROLLEY 2</option>
<option>OMT TROLLEY 3</option>
<option>OMT TROLLEY 4</option>
<option>OMT TROLLEY 5</option>
<option>OMT TROLLEY 6</option>
<option>OMT TROLLEY 7</option>
<option>OMT TROLLEY 8</option>
<option>OMT TROLLEY 9</option>
<option>OMT TROLLEY 10</option>
</select>

<input id="scanBox" placeholder="Scan Tray (MT76921)" maxlength="7">
</div>

<p id="msg" style="color:red"></p>

<table>
<thead>
<tr>
<th>Date</th>
<th>Time</th>
<th>Tray</th>
<th>Location</th>
<th>User</th>
<th>User ID</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<div id="shipment" class="tab"><h2>Shipment Page</h2></div>
<div id="history" class="tab"><h2>History Page</h2></div>
<div id="dashboard" class="tab"><h2>Dashboard</h2></div>

</div>

<script>

// FIREBASE
firebase.initializeApp({
apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
authDomain: "nexs-guddu-30k.firebaseapp.com",
databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
projectId: "nexs-guddu-30k",
storageBucket: "nexs-guddu-30k.firebasestorage.app",
messagingSenderId: "634684833271",
appId: "1:634684833271:web:31a25a2c5301fa108142f2"
});

const db = firebase.database();
let user={};

// LOGIN
function login(){
let id=document.getElementById('loginId').value.trim();
db.ref('Users/'+id).once('value',snap=>{
if(snap.exists()){
user.id = id;
user.name = snap.val().name;

document.getElementById('userName').innerText=user.name + " ("+id+")";

document.getElementById('auth').style.display='none';
document.getElementById('sidebar').style.display='block';
document.getElementById('main').style.display='block';

startLive();
}else alert("User not found");
});
}

// REGISTER
function register(){
let n=document.getElementById('regName').value;
let i=document.getElementById('regId').value;
db.ref('Users/'+i).set({name:n});
alert("Registered");
toggle(false);
}

function toggle(v){
document.getElementById('loginBox').style.display=v?'none':'block';
document.getElementById('regBox').style.display=v?'block':'none';
}

function openTab(t,el){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.nav').forEach(x=>x.classList.remove('active'));
document.getElementById(t).classList.add('active');
el.classList.add('active');
}

function logout(){location.reload();}

// SCAN
document.getElementById('scanBox').addEventListener('keydown',e=>{
if(e.key==='Enter'){
let val=e.target.value.toUpperCase().trim();
let msg=document.getElementById('msg');

if(!/^[A-Z]{2}[0-9]{5}$/.test(val)){
msg.innerText="Invalid Format!";
return;
}

msg.innerText="";

db.ref('LiveScans').push({
barcode:val,
location:document.getElementById('loc').value,
time:new Date().toLocaleTimeString(),
date:new Date().toLocaleDateString(),
user:user.name,
userId:user.id,
timestamp:Date.now()
});

e.target.value="";
}
});

// LIVE TABLE
function startLive(){
db.ref('LiveScans').on('value',snap=>{
let data=[];
snap.forEach(c=>{
let d=c.val();

// undefined fix
data.push({
date: d.date || "-",
time: d.time || "-",
barcode: d.barcode || "-",
location: d.location || "-",
user: d.user || "-",
userId: d.userId || "-"
});

});

data.sort((a,b)=>b.timestamp-a.timestamp);

let html="";
data.forEach((d,i)=>{
html+=`<tr class="${i==0?'highlight':''}">
<td>${d.date}</td>
<td>${d.time}</td>
<td>${d.barcode}</td>
<td>${d.location}</td>
<td>${d.user}</td>
<td>${d.userId}</td>
</tr>`;
});

document.getElementById('tableBody').innerHTML=html;
});
}

</script>

</body>
</html>
