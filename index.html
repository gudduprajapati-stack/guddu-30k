<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS Operational Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .auth-container { width: 350px; padding: 40px; background: var(--card); border-radius: 15px; margin-top: 50px; height: fit-content; border: 1px solid #333; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .link-btn { color: var(--primary); background: none; border: none; cursor: pointer; text-decoration: underline; margin-top: 15px; font-size: 14px; width: 100%; }
        
        /* Dashboard */
        #dashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px;}
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border-top: 4px solid var(--primary); }
        select { width: 100%; padding: 8px; background: #000; color: white; border: 1px solid #444; border-radius: 4px; margin-top: 10px;}
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <h2 style="color:var(--primary)">NexS LOGIN</h2>
        <input type="text" id="loginId" placeholder="Enter User ID (e.g. 138663)">
        <button class="btn" onclick="loginUser()">Login to Dashboard</button>
        <button class="link-btn" onclick="toggleAuth(true)">Create New ID / Register</button>
        <p id="loginErr" style="color:#ff4444; font-size:12px; display:none; margin-top:10px;">⚠️ User ID not found!</p>
    </div>

    <div id="registerPage" class="auth-container" style="display:none;">
        <h2 style="color:var(--primary)">NEW REGISTRATION</h2>
        <input type="text" id="newName" placeholder="Full Name">
        <input type="text" id="newId" placeholder="Create Unique ID (Alpha-numeric)">
        <button class="btn" style="background:#28a745; color:white;" onclick="registerUser()">Register & Save</button>
        <button class="link-btn" onclick="toggleAuth(false)">Back to Login</button>
    </div>

    <div id="dashboard">
        <div class="header">
            <div>
                <h2 id="welcomeName" style="margin:0;">Welcome</h2>
                <small id="welcomeId" style="color:var(--primary)"></small>
            </div>
            <button onclick="location.reload()" style="background:none; color:#ff4444; border:1px solid #ff4444; padding:5px 12px; cursor:pointer; border-radius:4px;">Logout</button>
        </div>
        <div class="grid" id="locGrid"></div>
        <button class="btn" style="width:250px; margin: 40px auto; display:block;" onclick="syncData()">SYNC TO FIREBASE</button>
    </div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    let activeUser = null;

    function toggleAuth(showRegister) {
        document.getElementById('loginPage').style.display = showRegister ? 'none' : 'block';
        document.getElementById('registerPage').style.display = showRegister ? 'block' : 'none';
        document.getElementById('loginErr').style.display = 'none';
    }

    // REGISTER
    function registerUser() {
        const name = document.getElementById('newName').value.trim();
        const id = document.getElementById('newId').value.trim();
        
        if(name && id) {
            db.ref('Users/' + id).set({ name: name, empId: id })
            .then(() => {
                alert("User Registered! Ab login karein.");
                toggleAuth(false);
            }).catch(e => alert("Error: " + e.message));
        } else { alert("Name aur ID dono bharein!"); }
    }

    // LOGIN (Check if ID exists)
    function loginUser() {
        const id = document.getElementById('loginId').value.trim();
        if(!id) return;

        db.ref('Users/' + id).once('value', (snap) => {
            if(snap.exists()) {
                activeUser = snap.val();
                showDashboard();
            } else {
                document.getElementById('loginErr').style.display = 'block';
            }
        });
    }

    function showDashboard() {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('welcomeName').innerText = "Hello, " + activeUser.name;
        document.getElementById('welcomeId').innerText = "Active ID: " + activeUser.empId;
        
        const grid = document.getElementById('locGrid');
        grid.innerHTML = "";
        for(let i=1; i<=21; i++) {
            grid.innerHTML += `
                <div class="card">
                    <small style="color:#666">POINT ${i}</small>
                    <div style="font-weight:bold; margin-top:5px;">Location Name</div>
                    <select id="s-${i}">
                        <option>Pending</option>
                        <option>Scanning</option>
                        <option>Completed</option>
                    </select>
                </div>`;
        }
    }

    function syncData() {
        let updates = {};
        for(let i=1; i<=21; i++) { updates[`Loc_${i}`] = document.getElementById(`s-${i}`).value; }
        updates['last_update'] = new Date().toLocaleString();
        
        db.ref('TrackingData/' + activeUser.empId).set(updates)
        .then(() => alert("Data Saved Successfully!"))
        .catch(e => alert("Sync Failed: " + e.message));
    }
</script>
</body>
</html>
