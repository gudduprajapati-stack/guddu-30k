<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - Master Build v19.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #28a745; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: #000; height: 100vh; position: fixed; border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .user-profile { background: #111; padding: 25px 20px; border-bottom: 1px solid #222; }
        .user-profile h4 { margin: 0; color: var(--primary); font-size: 16px; text-transform: capitalize; }
        .nav-list { padding: 15px; flex-grow: 1; }
        .nav-item { padding: 12px 15px; margin-bottom: 5px; cursor: pointer; border-radius: 8px; color: #888; transition: 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #1a1a1a; color: var(--primary); border-left: 4px solid var(--primary); }
        
        /* Layout */
        .main-content { margin-left: 260px; padding: 30px; width: calc(100% - 260px); height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* SCAN BOX UI FIX - Bahr nahi jayega */
        .scan-bar { display: flex; flex-wrap: wrap; gap: 15px; background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 25px; }
        .input-group { flex: 1; min-width: 200px; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 8px; }
        
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; outline: none; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }

        /* Table */
        .data-table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #111; color: var(--primary); text-transform: uppercase; font-size: 11px; }

        /* Login Symmetric Design */
        #authSection { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid #333; width: 380px; text-align: center; }
        .btn-full { width: 100%; padding: 14px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>

    <div id="authSection">
        <div id="loginCard" class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 30px;">NexS LOGIN</h2>
            <input type="text" id="loginId" placeholder="Employee ID">
            <button class="btn-full" onclick="handleLogin()">Login</button>
            <button class="btn-full" style="background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="showReg(true)">New Registration</button>
        </div>
        <div id="regCard" class="auth-card" style="display:none;">
            <h2 style="color:var(--primary); margin-bottom: 30px;">REGISTER</h2>
            <input type="text" id="regName" placeholder="Full Name">
            <input type="text" id="regId" placeholder="Employee ID">
            <button class="btn-full" style="background:var(--accent); color:white;" onclick="handleRegister()">Register</button>
            <button class="btn-full" style="background:transparent; color:var(--primary); border:1px solid var(--primary);" onclick="showReg(false)">Back</button>
        </div>
    </div>

    <div class="sidebar" id="mainSidebar" style="display:none;">
        <div class="user-profile">
            <small style="color:#888;">Active User:</small>
            <h4 id="sideName">---</h4>
            <small id="sideId">ID: ---</small>
        </div>
        <div class="nav-list">
            <div class="nav-item active" onclick="switchTab('scanning', this)">📦 Scanning Page</div>
            <div class="nav-item" onclick="switchTab('shipment', this)">🚛 Shipment Page</div>
            <div class="nav-item" onclick="switchTab('history', this)">🕒 History Page</div>
            <div class="nav-item" onclick="switchTab('productivity', this)">📊 Productivity</div>
        </div>
        <div onclick="location.reload()" style="padding:15px; color:var(--danger); cursor:pointer; text-align:center; border-top:1px solid #222; font-weight:bold;">LOGOUT</div>
    </div>

    <div class="main-content" id="mainContent" style="display:none;">
        <h2 id="tabTitle">Scanning Operations</h2>

        <div id="scanning" class="tab-content active">
            <div class="scan-bar">
                <div class="input-group">
                    <label>LOCATION</label>
                    <select id="locSelect">
                        <option>ICU ENTRY</option><option>MEI ENTRY</option><option>OMT ENTRY</option><option>CS LOCATION</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>FAST SCAN (ENTER)</label>
                    <input type="text" id="trayInput" placeholder="Scan & Save..." autocomplete="off">
                </div>
            </div>
            <table class="data-table">
                <thead><tr><th>DATE</th><th>TIME</th><th>BARCODE</th><th>LOCATION</th><th>USER NAME</th></tr></thead>
                <tbody id="scanLog"></tbody>
            </table>
        </div>

        <div id="productivity" class="tab-content">
            <div style="background:var(--card); padding:40px; border-radius:12px; border:1px solid #333; text-align:center;">
                <h3>Total Scans Loaded</h3>
                <h1 id="totalCount" style="color:var(--primary); font-size:60px;">0</h1>
            </div>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let loggedUser = null;

    function getFormattedDate() {
        const d = new Date();
        return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    }

    function showReg(v) { document.getElementById('loginCard').style.display = v ? 'none' : 'block'; document.getElementById('regCard').style.display = v ? 'block' : 'none'; }

    function handleRegister() {
        const n = document.getElementById('regName').value.trim();
        const i = document.getElementById('regId').value.trim();
        if(n && i) db.ref('Users/' + i).set({ name: n, empId: i }).then(() => { alert("Done!"); showReg(false); });
    }

    function handleLogin() {
        const id = document.getElementById('loginId').value.trim();
        db.ref('Users/' + id).once('value', snap => {
            if(snap.exists()) {
                loggedUser = snap.val();
                document.getElementById('authSection').style.display = 'none';
                document.getElementById('mainSidebar').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('sideName').innerText = loggedUser.name;
                document.getElementById('sideId').innerText = "ID: " + (loggedUser.empId || id);
                loadAllData();
                document.getElementById('trayInput').focus();
            } else { alert("ID Not Found!"); }
        });
    }

    document.getElementById('trayInput').addEventListener('keydown', e => {
        if(e.key === 'Enter' && e.target.value) {
            db.ref('LiveScans').push({
                barcode: e.target.value.toUpperCase().trim(),
                location: document.getElementById('locSelect').value,
                date: getFormattedDate(),
                time: new Date().toLocaleTimeString(),
                user: loggedUser.name
            });
            e.target.value = "";
        }
    });

    function loadAllData() {
        db.ref('LiveScans').limitToLast(35).on('value', snap => {
            const tbody = document.getElementById('scanLog');
            tbody.innerHTML = "";
            let count = 0;
            snap.forEach(child => {
                count++;
                const d = child.val();
                // 🔥 SYNC LOGIC: Name restoration
                const b = d.barcode || d.barcodeID || d.tray || "---";
                const dt = d.date || d.scanDate || "---";
                const tm = d.time || d.scanTime || "---";
                const lc = d.location || d.locName || "---";
                const us = d.user || d.scannedBy || d.userName || loggedUser.name || "---";

                tbody.innerHTML = `<tr><td>${dt}</td><td>${tm}</td><td>${b}</td><td>${lc}</td><td>${us}</td></tr>` + tbody.innerHTML;
            });
            document.getElementById('totalCount').innerText = count;
        });
    }

    function switchTab(tab, el) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(tab).classList.add('active');
        el.classList.add('active');
        if(tab === 'scanning') document.getElementById('trayInput').focus();
    }
</script>
</body>
</html>
