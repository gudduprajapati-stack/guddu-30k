<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - Scanning Expert</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #161616; --text: #f0f0f0; --accent: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar Navigation */
        .sidebar { width: 240px; background: #000; height: 100vh; position: fixed; border-right: 1px solid #222; padding: 20px; box-sizing: border-box; }
        .nav-item { padding: 12px; margin-bottom: 8px; cursor: pointer; border-radius: 6px; color: #888; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1a1a1a; color: var(--primary); border-left: 3px solid var(--primary); }
        
        /* Main Content */
        .main-content { margin-left: 240px; padding: 30px; width: 100%; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Scanning Box UI */
        .scan-header { display: flex; gap: 20px; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        
        select, input { padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; outline: none; font-size: 15px; }
        input:focus { border-color: var(--primary); }
        
        .btn { padding: 12px 25px; background: var(--primary); color: #000; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }

        /* Table UI */
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-top: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #222; }
        th { color: var(--primary); font-size: 12px; text-transform: uppercase; }
        .status-tag { background: #1a1a1a; color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--primary); margin-bottom:40px;">NexS System</h2>
        <div class="nav-item active" onclick="switchTab('scanning')">Scanning Page</div>
        <div class="nav-item" onclick="switchTab('shipment')">Shipment Page</div>
        <div class="nav-item" onclick="switchTab('history')">History Page</div>
        <div class="nav-item" onclick="switchTab('productivity')">Productivity Page</div>
        <div class="nav-item" style="color:#ff4444; margin-top:50px;" onclick="location.reload()">Logout</div>
    </div>

    <div class="main-content">
        <div id="scanning" class="tab-content active">
            <h1>Scanning Operations</h1>
            <div class="scan-header">
                <div class="input-group">
                    <label>Select Location</label>
                    <select id="locationSelect">
                        <option value="ICU ENTRY">ICU ENTRY</option>
                        <option value="MEI ENTRY">MEI ENTRY</option>
                        <option value="OMT ENTRY">OMT ENTRY</option>
                        <option value="LO SEND TO ICU">LO SEND TO ICU</option>
                        <option value="LO SEND TO MEI">LO SEND TO MEI</option>
                        <option value="ORDER SEND TO MAIN LINE FOR FT">ORDER SEND TO MAIN LINE FOR FT</option>
                        <option value="ORDER SEND TO MAIN LINE FOR QC">ORDER SEND TO MAIN LINE FOR QC</option>
                        <option value="ORDER SEND TO MAIN LINE FOR PACKING">ORDER SEND TO MAIN LINE FOR PACKING</option>
                        <option value="TLP SEND TO MEI">TLP SEND TO MEI</option>
                        <option value="QC FAIL SEND TO MEI">QC FAIL SEND TO MEI</option>
                        <option value="FRAME QC FAIL SEND TO MAIN LINE">FRAME QC FAIL SEND TO MAIN LINE</option>
                        <option value="SEND TO MEI FOR REVIEW">SEND TO MEI FOR REVIEW</option>
                        <option value="CS LOCATION">CS LOCATION</option>
                        <option value="SMALL DIA LOCATION">SMALL DIA LOCATION</option>
                        <option value="LO QC FAIL LOCATION (JIT)">LO QC FAIL LOCATION (JIT)</option>
                        <optgroup label="OMT RACKS">
                            <option value="OMT RACK 00">OMT RACK 00</option>
                            <option value="OMT RACK 01">OMT RACK 01</option>
                            <option value="OMT RACK 02">OMT RACK 02</option>
                            <option value="OMT RACK 03">OMT RACK 03</option>
                            <option value="OMT RACK 04">OMT RACK 04</option>
                            <option value="OMT RACK 05">OMT RACK 05</option>
                            <option value="OMT RACK 06">OMT RACK 06</option>
                            <option value="OMT RACK 07">OMT RACK 07</option>
                            <option value="OMT RACK 08">OMT RACK 08</option>
                            <option value="OMT RACK 09">OMT RACK 09</option>
                        </optgroup>
                        <optgroup label="ICU TROLLEYS">
                            <option value="ICU TROLLEY 1">ICU TROLLEY 1</option>
                            <option value="ICU TROLLEY 2">ICU TROLLEY 2</option>
                            <option value="ICU TROLLEY 3">ICU TROLLEY 3</option>
                            <option value="ICU TROLLEY 4">ICU TROLLEY 4</option>
                            <option value="ICU TROLLEY 5">ICU TROLLEY 5</option>
                            <option value="ICU TROLLEY 6">ICU TROLLEY 6</option>
                            <option value="ICU TROLLEY 7">ICU TROLLEY 7</option>
                            <option value="ICU TROLLEY 8">ICU TROLLEY 8</option>
                            <option value="ICU TROLLEY 9">ICU TROLLEY 9</option>
                            <option value="ICU TROLLEY 10">ICU TROLLEY 10</option>
                        </optgroup>
                        <optgroup label="OMT TROLLEYS">
                            <option value="OMT TROLLEY 1">OMT TROLLEY 1</option>
                            <option value="OMT TROLLEY 2">OMT TROLLEY 2</option>
                            <option value="OMT TROLLEY 3">OMT TROLLEY 3</option>
                            <option value="OMT TROLLEY 4">OMT TROLLEY 4</option>
                            <option value="OMT TROLLEY 5">OMT TROLLEY 5</option>
                            <option value="OMT TROLLEY 6">OMT TROLLEY 6</option>
                            <option value="OMT TROLLEY 7">OMT TROLLEY 7</option>
                            <option value="OMT TROLLEY 8">OMT TROLLEY 8</option>
                            <option value="OMT TROLLEY 9">OMT TROLLEY 9</option>
                            <option value="OMT TROLLEY 10">OMT TROLLEY 10</option>
                        </optgroup>
                    </select>
                </div>
                <div class="input-group">
                    <label>Tray Scan (7 Digits)</label>
                    <input type="number" id="trayInput" placeholder="Scan Tray..." oninput="handleScan(this)">
                </div>
                <button class="btn" onclick="manualAdd()">ADD</button>
            </div>

            <div class="card">
                <h3>Live Scans</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Tray ID</th>
                            <th>Location</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="scanTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="shipment" class="tab-content"><h1>Shipment Page Under Construction</h1></div>
        <div id="history" class="tab-content"><h1>History Page Under Construction</h1></div>
        <div id="productivity" class="tab-content"><h1>Productivity Page Under Construction</h1></div>
    </div>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Tab Switching
    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Handle Tray Scanning
    function handleScan(input) {
        if(input.value.length === 7) {
            saveToFirebase(input.value);
            input.value = ""; // Clear for next scan
        }
    }

    function manualAdd() {
        const val = document.getElementById('trayInput').value;
        if(val.length === 7) {
            saveToFirebase(val);
            document.getElementById('trayInput').value = "";
        } else {
            alert("Please enter exactly 7 digits!");
        }
    }

    function saveToFirebase(trayId) {
        const loc = document.getElementById('locationSelect').value;
        const time = new Date().toLocaleTimeString();
        const date = new Date().toLocaleDateString().replace(/\//g, '-');
        
        const scanData = {
            trayId: trayId,
            location: loc,
            time: time,
            timestamp: Date.now()
        };

        // Saving to Firebase
        database.ref('ScanningData/' + date).push(scanData);
        updateTable(scanData);
    }

    // Real-time table update
    function updateTable(data) {
        const tbody = document.getElementById('scanTableBody');
        const row = `<tr>
            <td>${data.time}</td>
            <td style="color:var(--primary); font-weight:bold;">${data.trayId}</td>
            <td>${data.location}</td>
            <td><span class="status-tag">SCANNED</span></td>
        </tr>`;
        tbody.innerHTML = row + tbody.innerHTML; // Add to top
    }
</script>
</body>
</html>
