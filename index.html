<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexS - Final Deployment</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00d4ff; --bg: #0d0d0d; --card: #1a1a1a; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .auth-container { width: 330px; padding: 35px; background: var(--card); border-radius: 15px; margin-top: 50px; height: fit-content; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        #dashboard { display: none; width: 100%; max-width: 1200px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; border-top: 4px solid var(--primary); }
    </style>
</head>
<body>

    <div id="loginPage" class="auth-container">
        <h2 style="color:var(--primary)">NexS LOGIN</h2>
        <input type="text" id="loginId" placeholder="User ID (e.g. 138663)">
        <button class="btn" onclick="loginUser()">Login</button>
        <button onclick="toggleAuth(true)" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:15px; text-decoration:underline;">Create New ID / Register</button>
        <p id="loginErr" style="color:red; display:none; margin-top:10px; font-weight:bold;">⚠️ ID Not Found!</p>
    </div>

    <div id="registerPage" class="auth-container" style="display:none;">
        <h2 style="color:var(--primary)">REGISTER</h2>
        <input type="text" id="newName" placeholder="Full Name">
        <input type="text" id="newId" placeholder="Unique ID (e.g. 138663)">
        <button class="btn" style="background:#28a745; color:white;" onclick="registerUser()">Register Now</button>
        <button onclick="toggleAuth(false)" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:15px;">Back to Login</button>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--primary);">
            <h3 id="welcomeHeader"></h3>
            <button onclick="location.reload()" style="color:red; background:none; border:none; cursor:pointer;">Logout</button>
        </div>
        <div class="grid" id="locGrid"></div>
        <button class="btn" style="width:200px; margin:20px auto; display:block;" onclick="syncData()">SAVE TO CLOUD</button>
    </div>

<script>
    // EXACT CONFIG FROM YOUR IMAGE
    const firebaseConfig = {
        apiKey: "AIzaSyBvyW-kGWwUX4UH9-cpCRORSwccxrFuHQM",
        databaseURL: "https://nexs-guddu-30k-default-rtdb.firebaseio.com",
        projectId: "nexs-guddu-30k",
        appId: "1:634684833271:web:31a25a2c5301fa108142f2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let activeUser = null;

    function toggleAuth(show) {
        document.getElementById('loginPage').style.display = show ? 'none' : 'block';
        document.getElementById('registerPage').style.display = show ? 'block' : 'none';
        document.getElementById('loginErr').style.display = 'none';
    }

    function registerUser() {
        const name = document.getElementById('newName').value.trim();
        const id = document.getElementById('newId').value.trim();
        if(name && id) {
            // Path: Users/138663 (Key based registration)
            db.ref('Users/' + id).set({ name: name, empId: id })
            .then(() => { 
                alert("Success! ID Registered. Ab Login karein."); 
                toggleAuth(false); 
            }).catch(e => alert("Firebase Error: " + e.message));
        } else { alert("Donon bhariye!"); }
    }

    function loginUser() {
        const id = document.getElementById('loginId').value.trim();
        db.ref('Users/' + id).once('value', (snap) => {
            if(snap.exists()) {
                activeUser = snap.val();
                document.getElementById('loginPage').style.display='none';
                document.getElementById('dashboard').style.display='block';
                document.getElementById('welcomeHeader').innerText = "User: " + activeUser.name;
                initGrid();
            } else { 
                document.getElementById('loginErr').style.display='block'; 
            }
        });
    }

    function initGrid() {
        const grid = document.getElementById('locGrid');
        grid.innerHTML = "";
        for(let i=1; i<=21; i++) {
            grid.innerHTML += `<div class="card">Station ${i} <select id="s-${i}"><option>Pending</option><option>Scanning</option><option>Done</option></select></div>`;
        }
    }

    function syncData() {
        let updates = { time: new Date().toLocaleString(), id: activeUser.empId };
        for(let i=1; i<=21; i++) { updates[`St_${i}`] = document.getElementById(`s-${i}`).value; }
        db.ref('Status/' + activeUser.empId).set(updates).then(() => alert("Data Saved Successfully!"));
    }
</script>
</body>
</html>
